# .github/workflows/daily-notify.yml
name: Daily JOAF Notifications

on:
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 1 * * *'
    - cron: '0 14 * * *'
    - cron: '0 3 * * 1'

  workflow_dispatch:
    inputs:
      type:
        description: 'Notification type'
        required: true
        default: 'bajar'
        type: choice
        options:
          - bajar
          - poll
          - streak
          - weather
          - blood
          - alert
          - live
          - warrior
          - corruption
          - leader
          - medicine
          - agriculture
          - jobs
          - news
          - breaking
          - welcome
      custom_title:
        description: 'Custom title (optional)'
        required: false
      custom_body:
        description: 'Custom message (optional)'
        required: false
      custom_url:
        description: 'Custom URL (optional)'
        required: false

jobs:
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    steps:
      - name: Determine notification type
        id: determine
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.type }}" >> $GITHUB_OUTPUT
            echo "custom_title=${{ github.event.inputs.custom_title }}" >> $GITHUB_OUTPUT
            echo "custom_body=${{ github.event.inputs.custom_body }}" >> $GITHUB_OUTPUT
            echo "custom_url=${{ github.event.inputs.custom_url }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            DOW=$(date -u +%u)
            if [ "$HOUR" = "02" ]; then
              echo "type=bajar" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "01" ]; then
              echo "type=weather" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "14" ]; then
              echo "type=streak" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "03" ] && [ "$DOW" = "1" ]; then
              echo "type=leader" >> $GITHUB_OUTPUT
            else
              echo "type=bajar" >> $GITHUB_OUTPUT
            fi
            echo "custom_title=" >> $GITHUB_OUTPUT
            echo "custom_body=" >> $GITHUB_OUTPUT
            echo "custom_url=" >> $GITHUB_OUTPUT
          fi

      - name: Send notification
        run: |
          TYPE="${{ steps.determine.outputs.type }}"
          TITLE="${{ steps.determine.outputs.custom_title }}"
          BODY="${{ steps.determine.outputs.custom_body }}"
          URL="${{ steps.determine.outputs.custom_url }}"

          if [ -n "$TITLE" ] && [ -n "$BODY" ]; then
            PAYLOAD="{\"type\":\"$TYPE\",\"title\":\"$TITLE\",\"body\":\"$BODY\",\"url\":\"$URL\"}"
          else
            PAYLOAD="{\"type\":\"$TYPE\"}"
          fi

          echo "Sending: $PAYLOAD"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.NETLIFY_FUNCTION_URL }}/send-notification" \
            -H "Content-Type: application/json" \
            -H "X-Admin-Key: ${{ secrets.ADMIN_SECRET_KEY }}" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          RESP_BODY=$(echo "$RESPONSE" | head -n-1)

          echo "Response: $RESP_BODY"
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Failed with status $HTTP_CODE"
            exit 1
          fi

          echo "SUCCESS!"

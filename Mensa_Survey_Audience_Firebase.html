<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>BTU Cottbus Mensa Survey — Decolonizing BTU Mensa</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100%;background:#03040e;color:#fff;font-family:'Space Grotesk',sans-serif}
body{padding-bottom:40px}
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:0 18px}
header{padding:28px 0 18px;text-align:center}
.live-pip{width:9px;height:9px;border-radius:50%;background:#2DD4BF;display:inline-block;animation:pip 1.5s ease infinite;box-shadow:0 0 14px rgba(45,212,191,.7);margin-right:8px;vertical-align:middle}
@keyframes pip{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
.eyebrow{font-size:11px;letter-spacing:.22em;color:rgba(201,168,76,.75);text-transform:uppercase}
h1{font-family:'Bebas Neue';font-size:30px;letter-spacing:.04em;margin-top:8px;line-height:1.15}
.sub{font-size:13px;color:rgba(255,255,255,.45);margin-top:8px;line-height:1.5}
.scope-chip{display:inline-flex;align-items:center;gap:6px;margin-top:14px;padding:6px 14px;background:rgba(45,212,191,.08);border:1px solid rgba(45,212,191,.25);border-radius:20px;font-size:11px;color:#2DD4BF;letter-spacing:.06em}
.progress-wrap{position:sticky;top:0;z-index:5;padding:10px 0;background:rgba(3,4,14,.85);backdrop-filter:blur(12px)}
.progress-bar{height:4px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#2DD4BF,#C9A84C);width:0%;transition:width .4s ease;border-radius:4px}
.progress-txt{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:.1em;margin-top:6px;text-align:right}
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;margin:14px 0}
.qnum{font-family:'Bebas Neue';font-size:13px;color:#C9A84C;letter-spacing:.1em;margin-bottom:6px}
.qtext{font-size:15.5px;font-weight:600;line-height:1.45;color:rgba(255,255,255,.95)}
.qhint{font-size:11.5px;color:rgba(255,255,255,.4);margin-top:6px;line-height:1.4}
.opts{margin-top:16px;display:flex;flex-direction:column;gap:8px}
.opt-btn{display:flex;align-items:center;gap:10px;padding:13px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;cursor:pointer;font-size:14px;color:rgba(255,255,255,.85);transition:all .15s;text-align:left}
.opt-btn:active{transform:scale(.98)}
.opt-btn.sel{background:rgba(45,212,191,.14);border-color:#2DD4BF;color:#fff}
.opt-dot{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.25);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#03040e}
.opt-btn.sel .opt-dot{border-color:#2DD4BF;background:#2DD4BF}
.opt-dot.sq{border-radius:5px}
.likert-row{display:flex;gap:6px;margin-top:16px}
.likert-btn{flex:1;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;cursor:pointer;font-family:'Bebas Neue';font-size:18px;color:rgba(255,255,255,.7);transition:all .15s}
.likert-btn.sel{background:rgba(201,168,76,.18);border-color:#C9A84C;color:#C9A84C}
.likert-labels{display:flex;justify-content:space-between;margin-top:8px;font-size:9.5px;color:rgba(255,255,255,.35);letter-spacing:.04em}
textarea{width:100%;margin-top:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;color:#fff;font-family:inherit;font-size:13.5px;resize:vertical;min-height:80px}
textarea::placeholder{color:rgba(255,255,255,.25)}
textarea:focus{outline:none;border-color:#2DD4BF}
.nav-row{display:flex;gap:10px;margin-top:10px;padding:0 0 4px}
.nav-btn{flex:1;padding:14px;border-radius:12px;font-family:'Space Grotesk';font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.nav-btn.next{background:linear-gradient(90deg,#2DD4BF,#06b6d4);color:#03040e}
.nav-btn.next:disabled{opacity:.3;pointer-events:none}
.nav-btn.back{background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);flex:0 0 90px}
.nav-btn:active{transform:scale(.97)}
.consent-box{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;margin:14px 0;font-size:12.5px;color:rgba(255,255,255,.6);line-height:1.6}
.consent-box b{color:rgba(255,255,255,.9)}
.consent-check{display:flex;align-items:flex-start;gap:10px;margin-top:14px;cursor:pointer}
.consent-check input{margin-top:3px;width:16px;height:16px;flex-shrink:0;accent-color:#2DD4BF}
.consent-check span{font-size:12.5px;color:rgba(255,255,255,.75);line-height:1.5}
.done-wrap{text-align:center;padding:50px 20px}
.done-icon{font-size:48px}
.done-title{font-family:'Bebas Neue';font-size:26px;letter-spacing:.04em;margin-top:14px}
.done-sub{font-size:13px;color:rgba(255,255,255,.45);margin-top:10px;line-height:1.6}
footer{text-align:center;margin-top:24px;font-size:10.5px;color:rgba(255,255,255,.2);letter-spacing:.06em;padding-bottom:20px}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="wrap">
  <header>
    <div class="eyebrow"><span class="live-pip"></span>BTU4Future · Module 13710 · Group 2</div>
    <h1>Decolonizing BTU Mensa</h1>
    <div class="sub">A short, anonymous survey on food culture, representation, and sustainability at the BTU Mensa.</div>
    <div class="scope-chip">📍 Cottbus campus only (Zentralcampus &amp; Sachsendorf)</div>
  </header>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="pfill"></div></div>
    <div class="progress-txt" id="ptext">Step 1 of 16</div>
  </div>

  <div id="qcontainer"></div>

  <footer>Anonymous · No personal data stored · Group 2, BTU4Future 2026</footer>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getFirestore,collection,addDoc,serverTimestamp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ---- Firebase config (same JOAF project as your reference dashboard) ----
const FC={apiKey:"AIzaSyDBbm1eiqatwEUQenPIEAEFSubTJTUTdZk",authDomain:"joaf-app-45753.firebaseapp.com",databaseURL:"https://joaf-app-45753-default-rtdb.europe-west1.firebasedatabase.app",projectId:"joaf-app-45753",storageBucket:"joaf-app-45753.firebasestorage.app",messagingSenderId:"472362223214",appId:"1:472362223214:web:9186a4f90dc608bae4487f"};

const app=initializeApp(FC);
const db=getFirestore(app);
const SURVEY_COLLECTION='mensa_survey_responses'; // separate Firestore collection — does not touch your existing poll data

// ---- Question definitions ----
const Q = [
  { id:'consent', type:'consent' },
  { id:'origin', type:'single', q:'Are you a Cottbus-campus BTU student?', hint:'This survey is scoped to Cottbus only (Zentralcampus / Sachsendorf Mensa). Senftenberg responses cannot be used.',
    opts:['Yes, I study/eat at the Cottbus campus','No, I am at Senftenberg or another campus'] },
  { id:'background', type:'single', q:'How would you describe your background?',
    opts:['Domestic (Germany)','International — South Asia','International — East/Southeast Asia','International — Middle East','International — Africa','International — Latin America','International — other Europe','Prefer not to say'] },
  { id:'program', type:'single', q:'What is your level of study?',
    opts:["Bachelor's","Master's",'PhD','Other / exchange'] },
  { id:'frequency', type:'single', q:'How often do you eat at the BTU Cottbus Mensa?',
    opts:['Daily or almost daily','2–3 times a week','About once a week','Rarely','Never'] },
  { id:'observed_rotation', type:'single', q:'Thinking about the last 2 weeks: when you saw a non-European dish (e.g. South/East Asian, African, Middle Eastern, Latin American) on the Mensa menu, where was it usually placed?', hint:'This helps us check perception against what people actually noticed on the board — answer based on what you remember seeing, not what you assume.',
    opts:['Part of the regular daily/weekly lineup (Essen 1–4)','Only as a "Spezial" or "Premium" item','I didn\'t notice any non-European dish in the last 2 weeks','I haven\'t eaten there in the last 2 weeks'] },
  { id:'sat_overall', type:'likert', q:'Overall, how satisfied are you with the Mensa\'s food offerings?', low:'Not satisfied', high:'Very satisfied' },
  { id:'sat_represent', type:'likert', q:'The Mensa\'s menu feels like it represents people like me.', low:'Strongly disagree', high:'Strongly agree' },
  { id:'sat_variety', type:'likert', q:'There is enough variety of cuisines from outside Europe in the regular (non-special) menu.', low:'Strongly disagree', high:'Strongly agree' },
  { id:'sat_belonging', type:'likert', q:'Eating at the Mensa makes me feel like I belong on campus.', low:'Strongly disagree', high:'Strongly agree' },
  { id:'sustain_understanding', type:'rank3', q:'When you think of "sustainable eating," which THREE of these matter most to you?', hint:'Pick exactly your top 3 — this forces real priorities instead of checking everything.',
    opts:['Organic ingredients','Vegan/vegetarian options','Seasonal/regional produce','Low food waste / using whole ingredients','Traditional or ancestral cooking practices from my culture','Low-carbon transport of ingredients','Fair trade / ethical sourcing','I don\'t really think about this'] },
  { id:'sustain_origin_link', type:'single', q:'Do you think the Mensa\'s sustainability messaging (organic, regional, "Klimaessen") reflects food traditions from outside Europe?', hint:'This is the core question linking sustainability framing to cultural representation.',
    opts:['Yes, clearly reflects non-European sustainable food traditions too','Somewhat, but mostly framed around European staples','No, it\'s framed almost entirely around European ingredients/practices','I\'m not familiar enough with the Mensa\'s sustainability messaging to say'] },
  { id:'pricing_perception', type:'single', q:'Do you think culturally diverse (non-European) dishes are priced differently than standard dishes at the Mensa?',
    opts:['Yes, they tend to cost more (e.g. Spezial/Premium tier)','Yes, they tend to cost less','No noticeable difference','I haven\'t noticed / not sure'] },
  { id:'feedback_awareness', type:'single', q:'Did you know the Mensa has an official feedback email (verpflegung@swobb.de) for comments on food and menu?', hint:'This tells us whether existing feedback channels are actually visible to students.',
    opts:['Yes, and I have used it before','Yes, but I have never used it','No, I didn\'t know this existed','Not sure'] },
  { id:'missing_cuisine', type:'text', q:'Is there a specific dish or cuisine you wish the Mensa offered regularly?', hint:'Optional — be as specific as you like.', placeholder:'e.g. a proper dal/lentil dish, jollof rice, regional Bangladeshi curry...' },
  { id:'open_feedback', type:'text', q:'Anything else you want to share about food, culture, and belonging at the Mensa?', hint:'Optional.', placeholder:'Your thoughts...' },
];

let idx = 0;
let answers = {};
const container = document.getElementById('qcontainer');
const pfill = document.getElementById('pfill');
const ptext = document.getElementById('ptext');

function updateProgress(){
  const total = Q.length;
  pfill.style.width = ((idx)/(total-1)*100)+'%';
  ptext.textContent = `Step ${idx+1} of ${total}`;
}

function render(){
  updateProgress();
  container.innerHTML='';
  const q = Q[idx];

  if(q.type==='consent'){
    const div=document.createElement('div');
    div.className='consent-box';
    div.innerHTML=`
      <b>Before you start</b><br><br>
      This survey is part of an academic group project for the BTU4Future module (13710), examining cultural representation and sustainability at the <b>BTU Cottbus Mensa</b>.<br><br>
      • Your responses are <b>anonymous</b> — no name, email, or student ID is collected.<br>
      • Participation is voluntary; you can close this page at any time before submitting.<br>
      • Data will be used only for this course project and may be summarized in our report.<br>
      • Takes about 2–3 minutes.<br><br>
      <label class="consent-check">
        <input type="checkbox" id="consentCheck">
        <span>I am 18+ and voluntarily agree to participate in this anonymous survey.</span>
      </label>
    `;
    container.appendChild(div);
    const navRow=document.createElement('div');
    navRow.className='nav-row';
    navRow.innerHTML=`<button class="nav-btn next" id="nextBtn" disabled>Start Survey →</button>`;
    container.appendChild(navRow);
    document.getElementById('consentCheck').addEventListener('change',e=>{
      document.getElementById('nextBtn').disabled=!e.target.checked;
    });
    document.getElementById('nextBtn').addEventListener('click',()=>{ idx++; render(); });
    return;
  }

  const card=document.createElement('div');
  card.className='card';
  let inner = `<div class="qnum">QUESTION ${idx}</div><div class="qtext">${q.q}</div>`;
  if(q.hint) inner += `<div class="qhint">${q.hint}</div>`;

  if(q.type==='single'){
    inner += `<div class="opts">`+q.opts.map((o,i)=>`
      <div class="opt-btn ${answers[q.id]===i?'sel':''}" data-i="${i}">
        <div class="opt-dot"></div><div>${o}</div>
      </div>`).join('')+`</div>`;
  } else if(q.type==='multi'){
    inner += `<div class="opts">`+q.opts.map((o,i)=>`
      <div class="opt-btn ${(answers[q.id]||[]).includes(i)?'sel':''}" data-i="${i}">
        <div class="opt-dot sq"></div><div>${o}</div>
      </div>`).join('')+`</div>`;
  } else if(q.type==='rank3'){
    const sel = answers[q.id]||[];
    inner += `<div class="qhint" style="margin-top:10px">Selected: ${sel.length} / 3</div><div class="opts">`+q.opts.map((o,i)=>{
      const pos = sel.indexOf(i);
      return `
      <div class="opt-btn ${pos>-1?'sel':''}" data-i="${i}">
        <div class="opt-dot">${pos>-1?(pos+1):''}</div><div>${o}</div>
      </div>`;
    }).join('')+`</div>`;
  } else if(q.type==='likert'){
    inner += `<div class="likert-row">`+[1,2,3,4,5].map(n=>`
      <div class="likert-btn ${answers[q.id]===n?'sel':''}" data-n="${n}">${n}</div>`).join('')+`</div>
      <div class="likert-labels"><span>${q.low}</span><span>${q.high}</span></div>`;
  } else if(q.type==='text'){
    inner += `<textarea id="txtInput" placeholder="${q.placeholder||''}">${answers[q.id]||''}</textarea>`;
  }
  card.innerHTML=inner;
  container.appendChild(card);

  // nav
  const navRow=document.createElement('div');
  navRow.className='nav-row';
  const isLast = idx===Q.length-1;
  navRow.innerHTML = `
    ${idx>1?'<button class="nav-btn back" id="backBtn">← Back</button>':''}
    <button class="nav-btn next" id="nextBtn" ${needsAnswer(q)?'disabled':''}>${isLast?'Submit ✓':'Next →'}</button>
  `;
  container.appendChild(navRow);

  // wire interactions
  if(q.type==='single'){
    card.querySelectorAll('.opt-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        answers[q.id]=Number(btn.dataset.i);
        render();
      });
    });
  } else if(q.type==='multi'){
    card.querySelectorAll('.opt-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const i=Number(btn.dataset.i);
        if(!answers[q.id]) answers[q.id]=[];
        const pos=answers[q.id].indexOf(i);
        if(pos>-1) answers[q.id].splice(pos,1); else answers[q.id].push(i);
        render();
      });
    });
  } else if(q.type==='rank3'){
    card.querySelectorAll('.opt-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const i=Number(btn.dataset.i);
        if(!answers[q.id]) answers[q.id]=[];
        const pos=answers[q.id].indexOf(i);
        if(pos>-1){
          answers[q.id].splice(pos,1);
        } else if(answers[q.id].length<3){
          answers[q.id].push(i);
        }
        render();
      });
    });
  } else if(q.type==='likert'){
    card.querySelectorAll('.likert-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        answers[q.id]=Number(btn.dataset.n);
        render();
      });
    });
  } else if(q.type==='text'){
    document.getElementById('txtInput').addEventListener('input',e=>{
      answers[q.id]=e.target.value;
    });
  }

  if(document.getElementById('backBtn')){
    document.getElementById('backBtn').addEventListener('click',()=>{ idx--; render(); });
  }
  document.getElementById('nextBtn').addEventListener('click',async ()=>{
    if(q.type==='single' && q.id==='origin' && answers[q.id]===1){
      showOutOfScope(); return;
    }
    if(isLast){ await submitSurvey(); return; }
    idx++; render();
  });
}

function needsAnswer(q){
  if(q.type==='text') return false; // optional questions
  if(q.id==='missing_cuisine'||q.id==='open_feedback') return false;
  if(q.type==='rank3') return (answers[q.id]||[]).length !== 3;
  return answers[q.id]===undefined || (Array.isArray(answers[q.id]) && answers[q.id].length===0);
}

function showOutOfScope(){
  container.innerHTML = `
    <div class="done-wrap">
      <div class="done-icon">📍</div>
      <div class="done-title">Cottbus Campus Only</div>
      <div class="done-sub">This survey is scoped specifically to the BTU Cottbus Mensa (Zentralcampus / Sachsendorf), not Senftenberg. Thank you for your interest — your response was not recorded.</div>
    </div>`;
}

async function submitSurvey(){
  const nextBtn=document.getElementById('nextBtn');
  if(nextBtn){ nextBtn.disabled=true; nextBtn.textContent='Submitting...'; }
  try{
    const byId = id => Q.find(q=>q.id===id);
    const optAt = (id, i) => (i===undefined||i===null) ? '' : byId(id).opts[i];
    const payload = {
      background: optAt('background', answers.background),
      program: optAt('program', answers.program),
      frequency: optAt('frequency', answers.frequency),
      observed_rotation: optAt('observed_rotation', answers.observed_rotation),
      sat_overall: answers.sat_overall,
      sat_represent: answers.sat_represent,
      sat_variety: answers.sat_variety,
      sat_belonging: answers.sat_belonging,
      sustain_understanding: (answers.sustain_understanding||[]).map(i=>byId('sustain_understanding').opts[i]),
      sustain_origin_link: optAt('sustain_origin_link', answers.sustain_origin_link),
      pricing_perception: optAt('pricing_perception', answers.pricing_perception),
      feedback_awareness: optAt('feedback_awareness', answers.feedback_awareness),
      missing_cuisine: answers.missing_cuisine || '',
      open_feedback: answers.open_feedback || '',
      submitted_at: serverTimestamp(),
      client_time: new Date().toISOString(),
    };
    await addDoc(collection(db, SURVEY_COLLECTION), payload);
    container.innerHTML = `
      <div class="done-wrap">
        <div class="done-icon">✅</div>
        <div class="done-title">Thank You!</div>
        <div class="done-sub">Your anonymous response has been recorded. This helps Group 2's research on cultural representation and sustainability at the BTU Mensa.<br><br>Want to share a dish suggestion with friends too? Forward this link!</div>
      </div>`;
  }catch(err){
    console.error(err);
    if(nextBtn){ nextBtn.disabled=false; nextBtn.textContent='Submit ✓'; }
    alert('Something went wrong submitting your response. Please check your connection and try again.');
  }
}

render();

// subtle animated bg
const cv=document.getElementById('bg-canvas');
const ctx=cv.getContext('2d');
function resize(){cv.width=innerWidth;cv.height=innerHeight;}
resize(); addEventListener('resize',resize);
let particles=Array.from({length:30},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.4+.3,vx:(Math.random()-.5)*.15,vy:(Math.random()-.5)*.15}));
function loop(){
  ctx.clearRect(0,0,cv.width,cv.height);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0||p.x>innerWidth)p.vx*=-1;
    if(p.y<0||p.y>innerHeight)p.vy*=-1;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7);
    ctx.fillStyle='rgba(45,212,191,.25)'; ctx.fill();
  });
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>

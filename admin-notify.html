<!DOCTYPE html>
<html lang="bn"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JOAF Admin — Notification Panel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;}
.topbar{background:#1e293b;padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #334155;}
.topbar img{width:36px;height:36px;border-radius:50%;}
.topbar h1{font-size:16px;font-weight:900;color:#fff;}
.topbar span{font-size:11px;color:#64748b;margin-left:auto;}
.container{max-width:900px;margin:0 auto;padding:20px;}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:80vh;}
.login-box{background:#1e293b;border-radius:16px;padding:32px;width:100%;max-width:360px;text-align:center;}
.login-box h2{font-size:20px;font-weight:900;margin-bottom:6px;}
.login-box p{color:#64748b;font-size:13px;margin-bottom:24px;}
.login-box input{width:100%;padding:12px 16px;background:#0f172a;border:1.5px solid #334155;border-radius:10px;color:#fff;font-size:14px;outline:none;margin-bottom:12px;}
.login-box input:focus{border-color:#6366f1;}
.login-btn{width:100%;padding:12px;background:#6366f1;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;}
.login-btn:hover{background:#4f46e5;}

/* Dashboard */
.dashboard{display:none;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:#1e293b;border-radius:12px;padding:16px;text-align:center;}
.stat-num{font-size:28px;font-weight:900;color:#6366f1;}
.stat-label{font-size:11px;color:#64748b;margin-top:4px;}

.section{background:#1e293b;border-radius:14px;padding:20px;margin-bottom:16px;}
.section h2{font-size:14px;font-weight:900;margin-bottom:16px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;}

/* Quick send buttons */
.quick-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
@media(min-width:500px){.quick-grid{grid-template-columns:repeat(3,1fr);}}
.quick-btn{padding:10px 12px;border-radius:10px;border:1.5px solid #334155;background:#0f172a;color:#e2e8f0;font-size:12px;font-weight:700;cursor:pointer;text-align:left;transition:.15s;}
.quick-btn:hover{border-color:#6366f1;background:#1e1b4b;}
.quick-btn span{display:block;font-size:16px;margin-bottom:4px;}

/* Custom form */
.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;font-weight:700;color:#64748b;margin-bottom:6px;text-transform:uppercase;}
.field input,.field textarea,.field select{width:100%;padding:10px 14px;background:#0f172a;border:1.5px solid #334155;border-radius:10px;color:#fff;font-size:13px;font-family:inherit;outline:none;resize:vertical;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:#6366f1;}
.field textarea{min-height:80px;}

.send-btn{width:100%;padding:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:900;cursor:pointer;transition:.15s;}
.send-btn:hover{opacity:.9;}
.send-btn:disabled{opacity:.5;cursor:not-allowed;}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:700;z-index:9999;display:none;}
.toast.success{background:#065f46;color:#6ee7b7;}
.toast.error{background:#7f1d1d;color:#fca5a5;}

/* Edit Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9998;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:#1e293b;border-radius:16px;padding:24px;width:100%;max-width:480px;}
.modal h3{font-size:16px;font-weight:900;margin-bottom:4px;}
.modal p{font-size:12px;color:#64748b;margin-bottom:16px;}
.modal-btns{display:flex;gap:8px;margin-top:16px;}
.modal-send{flex:1;padding:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;}
.modal-cancel{padding:12px 16px;background:#334155;color:#94a3b8;border:none;border-radius:10px;font-size:14px;cursor:pointer;}
.modal-reset{padding:12px 16px;background:#0f172a;color:#64748b;border:1px solid #334155;border-radius:10px;font-size:12px;cursor:pointer;}

/* History */
.history-list{display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto;}
.history-item{background:#0f172a;border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;}
.history-item .h-title{font-size:13px;font-weight:700;flex:1;}
.history-item .h-meta{font-size:10px;color:#64748b;}
.history-item .h-sent{font-size:11px;color:#6ee7b7;font-weight:700;}

/* Subscriber count refresh */
.refresh-btn{background:none;border:1px solid #334155;color:#64748b;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;margin-left:8px;}
.refresh-btn:hover{border-color:#6366f1;color:#6366f1;}
</style>
</head>
<body>

<div class="topbar">
  <img src="/logoc7c3.png" alt="JOAF" onerror="this.style.display='none'">
  <h1>🔔 JOAF Notification Admin</h1>
  <span id="adminEmail"></span>
</div>

<!-- Login -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <h2>🔐 Admin Login</h2>
    <p>শুধুমাত্র authorized admin এর জন্য</p>
    <input type="password" id="adminKey" placeholder="Admin Secret Key দিন..." onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">প্রবেশ করুন</button>
  </div>
</div>

<!-- Dashboard -->
<div class="container">
<div class="dashboard" id="dashboard">

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="statSubscribers">—</div>
      <div class="stat-label">মোট Subscribers</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statSentToday">—</div>
      <div class="stat-label">আজ পাঠানো হয়েছে</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statTotal">—</div>
      <div class="stat-label">মোট Notification</div>
    </div>
  </div>

  <!-- Quick Send -->
  <div class="section">
    <h2>⚡ Quick Send</h2>
    <div class="quick-grid">
      <button class="quick-btn" onclick="openModal('bajar')"><span>🛒</span>বাজার দর</button>
      <button class="quick-btn" onclick="openModal('weather')"><span>🌦️</span>আবহাওয়া</button>
      <button class="quick-btn" onclick="openModal('poll')"><span>🗳️</span>Poll Reminder</button>
      <button class="quick-btn" onclick="openModal('streak')"><span>🔥</span>Streak Alert</button>
      <button class="quick-btn" onclick="openModal('blood')"><span>🩸</span>রক্তের জরুরি</button>
      <button class="quick-btn" onclick="openModal('alert')"><span>🚨</span>জরুরি সতর্কতা</button>
      <button class="quick-btn" onclick="openModal('live')"><span>📡</span>JOAF Live</button>
      <button class="quick-btn" onclick="openModal('warrior')"><span>🏆</span>জুলাই যোদ্ধা</button>
      <button class="quick-btn" onclick="openModal('corruption')"><span>🚫</span>দুর্নীতি রিপোর্ট</button>
      <button class="quick-btn" onclick="openModal('leader')"><span>🏛️</span>নেতা ট্র্যাকার</button>
      <button class="quick-btn" onclick="openModal('medicine')"><span>💊</span>ওষুধের দাম</button>
      <button class="quick-btn" onclick="openModal('agriculture')"><span>🌾</span>কৃষি আপডেট</button>
      <button class="quick-btn" onclick="openModal('jobs')"><span>💼</span>নতুন চাকরি</button>
      <button class="quick-btn" onclick="openModal('breaking')"><span>🚨</span>Breaking News</button>
      <button class="quick-btn" onclick="openModal('news')"><span>📢</span>JOAF বিবৃতি</button>
      <button class="quick-btn" onclick="openModal('welcome')"><span>👋</span>Welcome</button>
    </div>
  </div>

  <!-- Custom Notification -->
  <div class="section">
    <h2>✍️ Custom Notification</h2>
    <div class="field">
      <label>Title</label>
      <input type="text" id="customTitle" placeholder="যেমন: 🚨 জরুরি ঘোষণা">
    </div>
    <div class="field">
      <label>Message</label>
      <textarea id="customBody" placeholder="বিস্তারিত message লিখুন..."></textarea>
    </div>
    <div class="field">
      <label>Link (optional)</label>
      <input type="text" id="customUrl" placeholder="/alert.html বা https://...">
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendCustom()">
      📤 সবার কাছে পাঠান
    </button>
  </div>

  <!-- Notification History -->
  <div class="section">
    <h2>📋 সাম্প্রতিক Notification History</h2>
    <div class="history-list" id="historyList">
      <div style="text-align:center;color:#64748b;padding:20px;font-size:13px;">লোড হচ্ছে...</div>
    </div>
  </div>

</div>
</div>

<!-- Edit Modal -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <h3 id="modalTypeLabel">🔔 Notification Edit</h3>
    <p>Default message edit করুন বা সেভাবেই পাঠান</p>
    <div class="field">
      <label>Title</label>
      <input type="text" id="modalTitle" placeholder="Notification title...">
    </div>
    <div class="field">
      <label>Message</label>
      <textarea id="modalBody" placeholder="Notification message..."></textarea>
    </div>
    <div class="field">
      <label>Link (optional)</label>
      <input type="text" id="modalUrl" placeholder="/alert.html">
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">বাতিল</button>
      <button class="modal-reset" onclick="resetModal()">↺ Default</button>
      <button class="modal-send" onclick="sendFromModal()">📤 পাঠান</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs, query, where, orderBy, limit } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const FB_CONFIG = {
  apiKey: 'AIzaSyDBbm1eiqatwEUQenPIEAEFSubTJTUTdZk',
  authDomain: 'joaf-app-45753.firebaseapp.com',
  projectId: 'joaf-app-45753',
  storageBucket: 'joaf-app-45753.firebasestorage.app',
  messagingSenderId: '472362223214',
  appId: '1:472362223214:web:9186a4f90dc608bae4487f'
};

const app = getApps().length ? getApps()[0] : initializeApp(FB_CONFIG);
const db  = getFirestore(app);

// Admin key session
let ADMIN_KEY = '';

window.login = async function() {
  const key = document.getElementById('adminKey').value.trim();
  if (!key) return showToast('Key দিন', 'error');

  // Server এ verify করো — ভুল key হলে ঢুকতে দেবে না
  const loginBtn = document.querySelector('.login-btn');
  loginBtn.textContent = '⏳ Checking...';
  loginBtn.disabled = true;

  try {
    const res = await fetch('/.netlify/functions/send-notification', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Admin-Key': key,
      },
      body: JSON.stringify({ _verify: true, type: 'welcome' }),
    });

    if (res.status === 401) {
      showToast('❌ ভুল password!', 'error');
      loginBtn.textContent = 'প্রবেশ করুন';
      loginBtn.disabled = false;
      return;
    }

    // Key correct — dashboard দেখাও
    ADMIN_KEY = key;
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadStats();
    loadHistory();
  } catch(e) {
    showToast('❌ Connection error', 'error');
    loginBtn.textContent = 'প্রবেশ করুন';
    loginBtn.disabled = false;
  }
};

// Default messages for each type
const DEFAULTS = {
  bajar:      { title: '🛒 আজকের বাজার দর', body: 'চাল, ডাল, সবজির দাম আপডেট হয়েছে। জানুন কোথায় কত সস্তা।', url: '/bajar.html' },
  poll:       { title: '🗳️ আজকের জনমত', body: '৩০টি প্রশ্নে ভোট দিন, streak বজায় রাখুন — পুরস্কার আপনার জন্য!', url: '/joaf-polls.html' },
  streak:     { title: '🔥 Streak মিস করবেন না!', body: 'আজকের ভোট এখনো বাকি। এখনই দিন — streak ভাঙলে শুরু থেকে!', url: '/joaf-polls.html' },
  weather:    { title: '🌦️ আবহাওয়া সতর্কতা', body: 'আজ আপনার এলাকায় বিশেষ আবহাওয়া পূর্বাভাস। কৃষক ও জেলেরা সতর্ক থাকুন।', url: '/weather.html' },
  blood:      { title: '🩸 জরুরি রক্ত দরকার!', body: 'আপনার এলাকায় কেউ রক্তের জন্য অনুরোধ করেছেন। একটু সাহায্য করুন।', url: '/rokto.html' },
  alert:      { title: '🚨 জরুরি সতর্কতা!', body: 'আপনার এলাকায় একটি জরুরি পরিস্থিতি জানানো হয়েছে। এখনই দেখুন।', url: '/alert.html' },
  live:       { title: '📡 JOAF Live শুরু হয়েছে!', body: 'এখনই দেখুন — সরাসরি সম্প্রচার চলছে।', url: '/live.html' },
  warrior:    { title: '🏆 নতুন জুলাই যোদ্ধা!', body: 'একজন নতুন বীর সৈনিক আমাদের directory তে যোগ দিয়েছেন।', url: '/july-warriors.html' },
  corruption: { title: '🚫 দুর্নীতির রিপোর্ট', body: 'একটি নতুন দুর্নীতির অভিযোগ দাখিল হয়েছে। জানুন বিস্তারিত।', url: '/leader-tracker.html' },
  leader:     { title: '🏛️ নেতা ট্র্যাকার আপডেট', body: 'প্রতিশ্রুতি vs বাস্তবতা — সাপ্তাহিক আপডেট এসেছে।', url: '/leader-tracker.html' },
  medicine:   { title: '💊 ওষুধের দাম আপডেট', body: 'এই সপ্তাহের ওষুধের দামের তালিকা আপডেট হয়েছে।', url: '/medicine.html' },
  agriculture:{ title: '🌾 কৃষি আপডেট', body: 'এই মৌসুমের কৃষি পরামর্শ ও বাজার দর আপডেট হয়েছে।', url: '/agriculture.html' },
  jobs:       { title: '💼 নতুন চাকরির সুযোগ', body: 'আপনার পছন্দের ক্যাটাগরিতে নতুন চাকরি এসেছে।', url: '/jobs.html' },
  news:       { title: '📢 JOAF বিবৃতি', body: 'JOAF এর পক্ষ থেকে একটি গুরুত্বপূর্ণ বিবৃতি প্রকাশিত হয়েছে।', url: '/news.html' },
  breaking:   { title: '🚨 ব্রেকিং নিউজ', body: 'এইমাত্র একটি গুরুত্বপূর্ণ খবর এসেছে। এখনই দেখুন।', url: '/news.html' },
  reward:     { title: '🎉 পুরস্কার অর্জন!', body: 'অভিনন্দন! আপনি ৩০ দিনের streak সম্পন্ন করেছেন।', url: '/joaf-polls.html' },
  welcome:    { title: '🔥 JOAF-এ স্বাগতম!', body: 'আপনি এখন বাংলাদেশের সবচেয়ে সক্রিয় মঞ্চের অংশ।', url: '/' },
};

let currentModalType = '';

window.openModal = function(type) {
  currentModalType = type;
  const d = DEFAULTS[type] || { title: '', body: '', url: '/' };
  document.getElementById('modalTypeLabel').textContent = d.title;
  document.getElementById('modalTitle').value = d.title;
  document.getElementById('modalBody').value = d.body;
  document.getElementById('modalUrl').value = d.url;
  document.getElementById('editModal').classList.add('open');
};

window.closeModal = function() {
  document.getElementById('editModal').classList.remove('open');
  currentModalType = '';
};

window.resetModal = function() {
  if (!currentModalType) return;
  const d = DEFAULTS[currentModalType];
  if (!d) return;
  document.getElementById('modalTitle').value = d.title;
  document.getElementById('modalBody').value = d.body;
  document.getElementById('modalUrl').value = d.url;
};

window.sendFromModal = async function() {
  const title = document.getElementById('modalTitle').value.trim();
  const body  = document.getElementById('modalBody').value.trim();
  const url   = document.getElementById('modalUrl').value.trim();
  if (!title || !body) return showToast('Title ও Message দিন', 'error');
  closeModal();
  await sendNotification({ type: currentModalType, title, body, url: url || '/' });
};

window.sendCustom = async function() {
  const title = document.getElementById('customTitle').value.trim();
  const body  = document.getElementById('customBody').value.trim();
  const url   = document.getElementById('customUrl').value.trim();
  if (!title || !body) return showToast('Title ও Message দিন', 'error');
  await sendNotification({ title, body, url: url || '/' });
};

async function sendNotification(payload) {
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.textContent = '⏳ পাঠানো হচ্ছে...';

  try {
    const res = await fetch('/.netlify/functions/send-notification', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Admin-Key': ADMIN_KEY,
      },
      body: JSON.stringify(payload),
    });

    const data = await res.json();

    if (!res.ok) {
      if (res.status === 401) {
        showToast('❌ Wrong admin key!', 'error');
        ADMIN_KEY = '';
        document.getElementById('loginWrap').style.display = 'flex';
        document.getElementById('dashboard').style.display = 'none';
      } else {
        showToast('❌ Error: ' + (data.error || 'Unknown'), 'error');
      }
    } else {
      showToast(`✅ ${data.sent} জনের কাছে পাঠানো হয়েছে!`, 'success');
      document.getElementById('customTitle').value = '';
      document.getElementById('customBody').value  = '';
      document.getElementById('customUrl').value   = '';
      loadStats();
      loadHistory();
    }
  } catch (err) {
    showToast('❌ Network error: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '📤 সবার কাছে পাঠান';
  }
}

async function loadStats() {
  try {
    // Subscribers count
    const subSnap = await getDocs(query(collection(db, 'push_subscriptions'), where('active', '==', true)));
    document.getElementById('statSubscribers').textContent = subSnap.size;

    // Total notifications
    const histSnap = await getDocs(collection(db, 'notification_history'));
    document.getElementById('statTotal').textContent = histSnap.size;

    // Today's count
    const today = new Date();
    today.setHours(0,0,0,0);
    let todayCount = 0;
    histSnap.forEach(doc => {
      const d = doc.data().sentAt?.toDate();
      if (d && d >= today) todayCount++;
    });
    document.getElementById('statSentToday').textContent = todayCount;
  } catch(e) {
    console.log('stats error', e);
  }
}

async function loadHistory() {
  try {
    const snap = await getDocs(
      query(collection(db, 'notification_history'), orderBy('sentAt', 'desc'), limit(10))
    );
    const list = document.getElementById('historyList');
    if (snap.empty) {
      list.innerHTML = '<div style="text-align:center;color:#64748b;padding:20px;font-size:13px;">এখনো কোনো notification পাঠানো হয়নি</div>';
      return;
    }
    list.innerHTML = snap.docs.map(doc => {
      const d = doc.data();
      const time = d.sentAt?.toDate()?.toLocaleString('bn-BD') || '—';
      return `<div class="history-item">
        <div>
          <div class="h-title">${d.title}</div>
          <div class="h-meta">${time}</div>
        </div>
        <div class="h-sent">✅ ${d.sent} জন</div>
      </div>`;
    }).join('');
  } catch(e) {
    console.log('history error', e);
  }
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type}`;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 4000);
}
</script>
</body></html>

<!DOCTYPE html>
<html lang="bn">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700;800;900&display=swap">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JOAF Admin — Master Control</title>
<style>
:root{
  --bg:#08090e;--bg2:#0f1019;--bg3:#161722;--bg4:#1e1f2e;--bg5:#262738;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.11);--border3:rgba(255,255,255,.18);
  --text:#eeeef5;--text2:#7878a0;--text3:#4a4a68;
  --red:#f05252;--red-bg:rgba(240,82,82,.12);--red-border:rgba(240,82,82,.25);
  --green:#34d399;--green-bg:rgba(52,211,153,.12);--green-border:rgba(52,211,153,.25);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,.12);--blue-border:rgba(96,165,250,.25);
  --amber:#fbbf24;--amber-bg:rgba(251,191,36,.12);--amber-border:rgba(251,191,36,.25);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,.12);--purple-border:rgba(167,139,250,.25);
  --accent:#f05252;--accent2:#ff6b6b;
  --sidebar-w:220px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* Analytics tabs */
.an-tab{padding:5px 12px;border-radius:6px;border:none;background:transparent;color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:.12s;}
.an-tab.active{background:var(--bg5);color:var(--text);}
.an-tab:hover:not(.active){color:var(--text);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Upload */
.upload-zone{border:2px dashed var(--border2);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:.15s;position:relative;}
.upload-zone:hover{border-color:var(--accent);background:var(--red-bg);}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-zone .uz-icon{font-size:28px;margin-bottom:6px;}
.upload-zone .uz-text{font-size:12px;color:var(--text2);}
.upload-preview{margin-top:10px;display:none;}
.upload-preview img{max-width:100%;max-height:120px;border-radius:8px;border:1px solid var(--border);}
.upload-progress{background:var(--bg4);border-radius:50px;height:4px;margin-top:8px;overflow:hidden;display:none;}
.upload-progress-bar{height:100%;background:var(--accent);border-radius:50px;transition:width .3s;}
.upload-result{font-size:11px;margin-top:6px;padding:6px 10px;border-radius:7px;display:none;}
.upload-result.success{background:var(--green-bg);color:var(--green);}
.upload-result.error{background:var(--red-bg);color:var(--red);}

/* ══ LOGIN ══════════════════════════════════════ */
#loginScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;background-image:radial-gradient(ellipse at 20% 50%,rgba(240,82,82,.04) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(96,165,250,.04) 0%,transparent 60%);}
.lcard{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:36px 32px;width:340px;}
.lcard-top{text-align:center;margin-bottom:28px;}
.lcard-top .logo-circle{width:52px;height:52px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 14px;}
.lcard-top h1{font-size:19px;font-weight:900;letter-spacing:-.3px;}
.lcard-top p{font-size:12px;color:var(--text2);margin-top:4px;}
.lf{margin-bottom:12px;}
.lf label{display:block;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;}
.lf input{width:100%;padding:11px 14px;background:var(--bg);border:1.5px solid var(--border2);border-radius:10px;color:var(--text);font-size:13px;outline:none;font-family:inherit;transition:.15s;}
.lf input:focus{border-color:var(--accent);background:var(--bg2);}
.lbtn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;transition:.15s;margin-top:4px;}
.lbtn:hover{background:var(--accent2);}
.lbtn:disabled{opacity:.5;cursor:not-allowed;}
.lerr{color:var(--red);font-size:12px;margin-top:8px;min-height:16px;text-align:center;}

/* ══ APP SHELL ═══════════════════════════════════ */
#app{display:none;min-height:100vh;}

/* SIDEBAR */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;z-index:200;display:flex;flex-direction:column;transition:transform .25s cubic-bezier(.4,0,.2,1);}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px;}
.slogo{padding:18px 16px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.slogo-ic{width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.slogo-text b{display:block;font-size:14px;font-weight:900;}
.slogo-text small{font-size:9px;color:var(--text2);letter-spacing:.3px;}
.snav{flex:1;padding:8px 6px;}
.nsec{padding:10px 8px 4px;font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--text2);transition:.12s;margin-bottom:1px;position:relative;}
.ni:hover{background:var(--bg3);color:var(--text);}
.ni.active{background:var(--bg4);color:var(--text);}
.ni.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:2.5px;background:var(--accent);border-radius:2px;}
.ni .ic{font-size:14px;width:16px;text-align:center;flex-shrink:0;}
.nbadge{margin-left:auto;background:var(--accent);color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:50px;min-width:18px;text-align:center;}
.nbadge.green{background:var(--green);color:#000;}
.sfoot{padding:12px 6px;border-top:1px solid var(--border);}

/* Sidebar overlay (mobile) */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199;backdrop-filter:blur(2px);}
.sidebar-overlay.open{display:block;}

/* TOPBAR */
.main{margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-left h2{font-size:15px;font-weight:800;letter-spacing:-.2px;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.tbtn{padding:6px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;color:var(--text2);font-size:11px;cursor:pointer;font-family:inherit;transition:.12s;text-decoration:none;display:inline-flex;align-items:center;gap:4px;}
.tbtn:hover{color:var(--text);border-color:var(--border3);}
.ham-btn{display:none;background:none;border:none;cursor:pointer;padding:6px;border-radius:8px;color:var(--text);flex-direction:column;gap:4px;align-items:center;justify-content:center;}
.ham-btn span{display:block;width:20px;height:2px;background:currentColor;border-radius:2px;transition:.2s;}

/* PAGES */
.page{padding:22px;display:none;flex:1;}
.page.active{display:block;}

/* ══ MOBILE RESPONSIVE ══════════════════════════ */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .ham-btn{display:flex;}
  .topbar{padding:10px 14px;}
  .topbar-right .tbtn:not(:last-child){display:none;}
  .page{padding:14px;}
  .stats-grid{grid-template-columns:repeat(2,1fr)!important;gap:8px;}
  .scard{padding:12px;}
  .scard-num{font-size:20px;}
  .card{padding:14px;}
  .card-2col{grid-template-columns:1fr!important;}
  .field-2,.field-3{grid-template-columns:1fr!important;}
  .modal{padding:16px;border-radius:12px;}
  .modal-lg{max-width:100%;}
  .tbl-wrap{font-size:11px;}
  th,td{padding:7px 8px;}
  .qgrid{grid-template-columns:repeat(2,1fr)!important;}
  .btn-row{gap:6px;}
  .btn-row .btn{font-size:11px;padding:7px 10px;}
  .an-tab{padding:5px 8px;font-size:10px;}
  table th:nth-child(4),table td:nth-child(4),
  table th:nth-child(5),table td:nth-child(5){display:none;}
}
@media(max-width:400px){
  .stats-grid{grid-template-columns:1fr 1fr!important;}
  .scard-num{font-size:18px;}
  .topbar-left h2{font-size:13px;}
}

/* ══ COMPONENTS ══════════════════════════════════ */

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px;}
.scard{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden;}
.scard::after{content:attr(data-icon);position:absolute;right:12px;top:10px;font-size:26px;opacity:.15;}
.scard-num{font-size:26px;font-weight:900;line-height:1;margin-bottom:4px;}
.scard-label{font-size:11px;color:var(--text2);}
.scard-sub{font-size:10px;margin-top:3px;}
.scard.red .scard-num{color:var(--red);}
.scard.green .scard-num{color:var(--green);}
.scard.blue .scard-num{color:var(--blue);}
.scard.amber .scard-num{color:var(--amber);}
.scard.purple .scard-num{color:var(--purple);}

/* Cards */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:13px;padding:18px;margin-bottom:14px;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.card-title{font-size:13px;font-weight:800;}
.card-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.card-2col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:640px){.card-2col{grid-template-columns:1fr;}}

/* Form fields */
.field{margin-bottom:12px;}
.field label{display:block;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.field input,.field textarea,.field select{width:100%;padding:9px 12px;background:var(--bg);border:1.5px solid var(--border2);border-radius:9px;color:var(--text);font-size:13px;font-family:inherit;outline:none;resize:vertical;transition:.15s;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent);background:var(--bg2);}
.field textarea{min-height:80px;}
.field select option{background:var(--bg3);}
.field-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.field-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
@media(max-width:500px){.field-2,.field-3{grid-template-columns:1fr;}}

/* Buttons */
.btn{padding:8px 16px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:.12s;display:inline-flex;align-items:center;gap:5px;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:var(--accent2);}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.btn-success{background:var(--green);color:#000;}
.btn-success:hover{opacity:.85;}
.btn-ghost{background:var(--bg4);color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:hover{color:var(--text);}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--red-border);}
.btn-danger:hover{background:var(--red-bg);}
.btn-warning{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
.btn-sm{padding:4px 10px;font-size:10px;border-radius:6px;}
.btn-lg{padding:11px 22px;font-size:13px;}
.btn-full{width:100%;justify-content:center;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;}

/* Table */
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:var(--bg4);padding:9px 12px;text-align:left;font-size:9px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
td{padding:9px 12px;border-top:1px solid var(--border);vertical-align:middle;}
tr:hover td{background:rgba(255,255,255,.02);}
.td-actions{display:flex;gap:5px;align-items:center;}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:50px;font-size:10px;font-weight:700;white-space:nowrap;}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.badge-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.badge-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border);}
.badge-blue{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border);}
.badge-purple{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border);}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9990;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px);}
.modal-bg.open{display:flex;}
.modal{background:var(--bg3);border:1px solid var(--border2);border-radius:16px;padding:22px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;}
.modal-lg{max-width:600px;}
.modal h3{font-size:15px;font-weight:900;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid var(--border);}

/* Quick notification grid */
.qgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
@media(max-width:600px){.qgrid{grid-template-columns:repeat(2,1fr);}}
.qbtn{padding:10px 8px;border-radius:9px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:11px;font-weight:700;cursor:pointer;text-align:left;transition:.12s;font-family:inherit;}
.qbtn:hover{border-color:var(--accent);background:var(--bg3);}
.qbtn .qi{font-size:18px;display:block;margin-bottom:4px;}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;padding:11px 18px;border-radius:10px;font-size:12px;font-weight:700;z-index:99999;display:none;max-width:300px;animation:slideUp .2s ease;}
.toast.success{background:#0d2a1e;color:var(--green);border:1px solid var(--green-border);}
.toast.error{background:#2a0d0d;color:var(--red);border:1px solid var(--red-border);}
.toast.info{background:#0d1a2a;color:var(--blue);border:1px solid var(--blue-border);}
@keyframes slideUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}

/* History items */
.hist-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.hist-item:last-child{border:none;}
.hist-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.hist-info{flex:1;min-width:0;}
.hist-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hist-time{font-size:10px;color:var(--text2);margin-top:1px;}
.hist-sent{font-size:11px;font-weight:700;color:var(--green);flex-shrink:0;}

/* Activity feed */
.act-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.act-item:last-child{border:none;}
.act-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.act-text{font-size:12px;flex:1;line-height:1.4;}
.act-text b{color:var(--text);}
.act-time{font-size:10px;color:var(--text2);}

/* Donor card */
.donor-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.donor-row:last-child{border:none;}
.donor-ava{width:32px;height:32px;border-radius:9px;background:var(--red-bg);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.donor-info{flex:1;min-width:0;}
.donor-name{font-size:12px;font-weight:700;}
.donor-meta{font-size:10px;color:var(--text2);margin-top:1px;}
.donor-actions{display:flex;gap:5px;}

/* Misc */
.empty{text-align:center;padding:36px;color:var(--text2);font-size:13px;}
.loading{text-align:center;padding:28px;color:var(--text2);font-size:12px;}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0;}
.flex{display:flex;align-items:center;gap:8px;}
.flex-sb{display:flex;align-items:center;justify-content:space-between;}
.mt12{margin-top:12px;}
.mt16{margin-top:16px;}
.text-red{color:var(--red);}
.text-green{color:var(--green);}
.text-amber{color:var(--amber);}
.text-blue{color:var(--blue);}
.text-muted{color:var(--text2);}
.section-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
</style>
</head>
<body>
<script>
/* =============================================
   JOAF MODERN CINEMATIC REEL ENGINE 
   Min. 35 Seconds, Viral Style, Rich Animations
   ============================================= */

let reelBlob = null;

async function fbGenerateReel() {
  const text = document.getElementById("fb-news-input").value.trim();
  if (!text) return toast("News text is missing!", "error");

  const btn = document.getElementById("fb-gen-btn");
  btn.innerHTML = "🤖 AI Analyzing...";
  btn.disabled = true;

  try {
    const res = await fetch("/.netlify/functions/groq-proxy", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        messages: [{
          role: "user", 
          content: `You are a viral short-form video expert for JOAF. 
Analyze this news text and structure a complete 40-second reel script. 
Break it down into exactly 7 to 9 highly theatrical and pacing-focused slides.
Output ONLY a strict JSON object. No markdown, no conversational text.
Format: 
{ 
  "caption": "Viral Facebook caption with high-reach hashtags", 
  "slides": [ 
    { "label": "URGENT / HOOK / BREAKING", "text": "2 short lines of dramatic Bengali text", "mood": "urgent|dark|heroic" } 
  ] 
}` + "\nNews: " + text
        }]
      })
    });

    const data = await res.json();
    const raw = data.choices?.[0]?.message?.content || "{}";
    const match = raw.match(/\{[\s\S]*\}/);
    const parsed = JSON.parse(match[0]);

    document.getElementById("fb-caption").value = parsed.caption || text;
    
    reelBlob = await makeCinematicReel(parsed.slides || []);

    const v = document.getElementById("fb-reel-video");
    v.src = URL.createObjectURL(reelBlob);
    v.style.display = "block";
    document.getElementById("fb-preview").style.display = "block";
    document.getElementById("fb-download-btn").style.display = "inline-block";
    document.getElementById("fb-post-reels-btn").style.display = "inline-block";

    toast("✅ Cinematic Reel generated successfully (>35s)!", "success");
  } catch(e) {
    toast("Error: " + e.message, "error");
  } finally {
    btn.innerHTML = "🎬 Reel বানাও";
    btn.disabled = false;
  }
}

async function makeCinematicReel(slides) {
  const canvas = document.getElementById("fb-card-canvas");
  canvas.width = 1080; 
  canvas.height = 1920;
  const ctx = canvas.getContext("2d");

  const stream = canvas.captureStream(30); 
  const recorder = new MediaRecorder(stream, {videoBitsPerSecond: 5000000, mimeType: "video/webm"});
  const chunks = [];
  
  recorder.ondataavailable = e => chunks.push(e.data);
  recorder.start();

  const SLIDE_TIME = 5500; 

  for (let s of slides) {
    await renderRichSlide(ctx, s, SLIDE_TIME);
  }
  await renderEpicOutro(ctx, 6000);

  recorder.stop();
  await new Promise(r => recorder.onstop = r);
  return new Blob(chunks, {type: "video/webm"});
}

async function renderRichSlide(ctx, slide, durationMs) {
  const start = performance.now();
  const w = 1080;
  const h = 1920;
  
  const particles = Array.from({length: 45}, () => ({
    x: Math.random() * w,
    y: Math.random() * h,
    size: Math.random() * 4 + 1,
    speedY: -(Math.random() * 2.5 + 1.2)
  }));

  let baseColor = "#1a0b2e", accentColor = "#000000";
  if(slide.mood === "urgent") { baseColor = "#4a0404"; accentColor = "#120000"; }
  else if(slide.mood === "heroic") { baseColor = "#0b2e1a"; accentColor = "#001205"; }

  while (performance.now() - start < durationMs) {
    const elapsed = performance.now() - start;
    const progress = elapsed / durationMs;

    const gradientShift = h - (progress * 250);
    const grad = ctx.createLinearGradient(0, 0, 0, gradientShift);
    grad.addColorStop(0, accentColor);
    grad.addColorStop(1, baseColor);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    ctx.fillStyle = "rgba(255, 255, 255, 0.35)";
    particles.forEach(p => {
      p.y += p.speedY;
      if(p.y < 0) p.y = h;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });

    const textAlpha = Math.min(1, elapsed / 700); 
    const scaleFactor = 1 + (progress * 0.06); 
    
    ctx.save();
    ctx.translate(w / 2, h / 2);
    ctx.scale(scaleFactor, scaleFactor);
    ctx.globalAlpha = textAlpha;

    ctx.fillStyle = "#ff4757";
    ctx.font = "900 68px sans-serif";
    ctx.textAlign = "center";
    ctx.shadowColor = "#ff4757";
    ctx.shadowBlur = 25;
    ctx.fillText(slide.label ? slide.label.toUpperCase() : "JOAF BREAKING", 0, -220);

    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 55px \"Noto Sans Bengali\", sans-serif";
    ctx.shadowBlur = 15;
    ctx.shadowColor = "rgba(0, 0, 0, 0.9)";
    
    const lines = wrapText(ctx, slide.text || "", 920);
    lines.forEach((line, i) => {
      ctx.fillText(line, 0, 10 + (i * 85));
    });

    ctx.restore();
    await new Promise(r => requestAnimationFrame(r));
  }
}

async function renderEpicOutro(ctx, durationMs) {
  const start = performance.now();
  const w = 1080, h = 1920;

  while (performance.now() - start < durationMs) {
    const elapsed = performance.now() - start;
    const textAlpha = Math.min(1, elapsed / 900);

    ctx.fillStyle = "#040108";
    ctx.fillRect(0, 0, w, h);

    ctx.save();
    ctx.globalAlpha = textAlpha;
    
    ctx.fillStyle = "#ffffff";
    ctx.shadowColor = "#2f3542";
    ctx.shadowBlur = 50;
    ctx.font = "900 170px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("JOAF", w / 2, h / 2 - 40);

    ctx.shadowBlur = 0;
    ctx.font = "bold 42px \"Noto Sans Bengali\", sans-serif";
    ctx.fillStyle = "#f1f2f6";
    ctx.fillText("জুলাই অনলাইন অ্যাক্টিভিস্ট ফোরাম", w / 2, h / 2 + 70);
    
    ctx.font = "500 36px sans-serif";
    ctx.fillStyle = "#747d8c";
    ctx.fillText("www.julyforum.com", w / 2, h / 2 + 160);
    
    ctx.restore();
    await new Promise(r => requestAnimationFrame(r));
  }
}

function wrapText(ctx, text, maxWidth) {
  const words = text.split(" ");
  const lines = [];
  let currentLine = words[0];

  for (let i = 1; i < words.length; i++) {
    const word = words[i];
    const width = ctx.measureText(currentLine + " " + word).width;
    if (width < maxWidth) {
      currentLine += " " + word;
    } else {
      lines.push(currentLine);
      currentLine = word;
    }
  }
  lines.push(currentLine);
  return lines;
}

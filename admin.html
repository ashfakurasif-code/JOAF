<!DOCTYPE html>
<html lang="bn">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700;800;900&display=swap">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JOAF Admin — Master Control</title>
<style>
:root{
  --bg:#08090e;--bg2:#0f1019;--bg3:#161722;--bg4:#1e1f2e;--bg5:#262738;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.11);--border3:rgba(255,255,255,.18);
  --text:#eeeef5;--text2:#7878a0;--text3:#4a4a68;
  --red:#f05252;--red-bg:rgba(240,82,82,.12);--red-border:rgba(240,82,82,.25);
  --green:#34d399;--green-bg:rgba(52,211,153,.12);--green-border:rgba(52,211,153,.25);
  --accent:#3b82f6;--accent-bg:rgba(59,130,246,.12);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans Bengali',sans-serif;-webkit-font-smoothing:antialiased;}
body{background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;}
.sidebar{width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:10;}
.sidebar-brand{padding:24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
.sidebar-logo{width:32px;height:32px;background:linear-gradient(135deg,var(--red),#ff7676);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:14px;}
.sidebar-title{font-size:16px;font-weight:700;letter-spacing:.5px;}
.sidebar-subtitle{font-size:11px;color:var(--text2);text-transform:uppercase;margin-top:2px;letter-spacing:1px;}
.nav-section{padding:16px 12px;overflow-y:auto;flex:1;}
.nav-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:0 12px 8px;}
.nav-list{list-style:none;margin-bottom:20px;}
.nav-item a{display:flex;align-items:center;gap:12px;padding:10px 12px;color:var(--text2);text-decoration:none;border-radius:8px;font-size:14px;font-weight:600;transition:all .2s;}
.nav-item a:hover{background:var(--bg3);color:var(--text);}
.nav-item.active a{background:var(--accent-bg);color:var(--accent);}
.nav-badge{margin-left:auto;background:var(--bg4);color:var(--text2);padding:2px 6px;border-radius:6px;font-size:11px;}
.main-content{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;background:var(--bg);}
.topbar{height:70px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;z-index:9;}
.page-title{font-size:18px;font-weight:700;}
.view-container{flex:1;overflow-y:auto;padding:32px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:24px;}
.form-group{margin-bottom:20px;}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;}
.form-control{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:12px;color:var(--text);font-size:14px;transition:border-color .2s;resize:vertical;}
.form-control:focus{outline:none;border-color:var(--accent);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s;text-decoration:none;}
.btn:hover{opacity:.9;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-danger{background:var(--red);}
.toast-container{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:10px;z-index:9999;}
.toast{background:var(--bg3);border:1px solid var(--border2);padding:14px 20px;border-radius:8px;font-size:14px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.5);display:flex;align-items:center;gap:10px;transform:translateY(20px);opacity:0;animation:toastIn .3s forwards;}
@keyframes toastIn{to{transform:translateY(0);opacity:1;}}
</style>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo">⚡</div>
      <div>
        <div class="sidebar-title">JOAF Admin</div>
        <div class="sidebar-subtitle">MASTER CONTROL</div>
      </div>
    </div>
    <nav class="nav-section">
      <div class="nav-label">Overview</div>
      <ul class="nav-list">
        <li class="nav-item"><a href="#">📊 Dashboard</a></li>
      </ul>
      <div class="nav-label">Content</div>
      <ul class="nav-list">
        <li class="nav-item"><a href="#">🔔 Notification <span class="nav-badge">39</span></a></li>
        <li class="nav-item"><a href="#">🚨 সতর্কতা</a></li>
        <li class="nav-item"><a href="#">🩸 রক্তদাতা <span class="nav-badge">594</span></a></li>
        <li class="nav-item"><a href="#">📰 Press Release</a></li>
        <li class="nav-item"><a href="#">🎨 News Card Generator</a></li>
        <li class="nav-item active"><a href="#">📢 FB Auto Post</a></li>
      </ul>
      <div class="nav-label">Data</div>
      <ul class="nav-list">
        <li class="nav-item"><a href="#">🏛️ নেতা ট্র্যাকার</a></li>
        <li class="nav-item"><a href="#">✊ জুলাই যোদ্ধা</a></li>
        <li class="nav-item"><a href="#">🛒 বাজার দর</a></li>
        <li class="nav-item"><a href="#">💊 ওষুধের দাম</a></li>
      </ul>
    </nav>
  </div>

  <div class="main-content">
    <div class="topbar">
      <div class="page-title">fbpost</div>
      <div style="color:var(--text2);font-size:14px;">www.julyforum.com</div>
    </div>

    <div class="view-container">
      <div class="card">
        <div class="form-group">
          <label class="form-label">📁 File Upload</label>
          <a href="#" class="btn">🌐 Live Site</a>
        </div>
        <div class="form-group">
          <label class="form-label">📋 Pages JSON (একবার paste করুন)</label>
          <textarea class="form-control" id="fb-pages-json" rows="2">{"data":[]}</textarea>
        </div>
        <button class="btn" onclick="toast('Saved successfully','success')">💾 Save Pages</button>
      </div>

      <div class="card">
        <div class="form-group">
          <label class="form-label">✍️ News Text লিখুন</label>
          <textarea class="form-control" id="fb-news-input" rows="8" placeholder="এখানে সংবাদের মূল বিষয় লিখুন..."></textarea>
        </div>

        <div style="display:flex;gap:12px;margin-bottom:20px;">
          <button class="btn" id="fb-gen-btn" onclick="fbGenerateReel()">🎬 Reel বানাও</button>
          <button class="btn" style="background:var(--bg4);color:var(--text);" onclick="toast('Card rendering disabled. Use Reel engine.','error')">✨ AI দিয়ে Card বানাও</button>
        </div>

        <div class="form-group">
          <label class="form-label">📝 Generated Caption / Tags</label>
          <textarea class="form-control" id="fb-caption" rows="3" placeholder="AI Generated caption will show here..."></textarea>
        </div>

        <div id="fb-preview" style="display:none; margin-top:20px;">
          <label class="form-label">📺 Cinematic Reel Preview</label>
          <video id="fb-reel-video" controls style="width:320px; border-radius:8px; background:#000; display:none; margin-bottom:15px;"></video>
          <canvas id="fb-card-canvas" style="display:none;"></canvas>
          <div style="display:flex; gap:12px;">
            <button class="btn" id="fb-download-btn" onclick="fbDownloadReel()">📥 Download Video</button>
            <button class="btn btn-danger" id="fb-post-reels-btn" onclick="fbPostToReels()">🚀 Copy Caption & Open Facebook Composer</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script>
  function toast(msg, type='success') {
    const container = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'toast';
    t.style.borderLeft = type === 'success' ? '4px solid var(--green)' : '4px solid var(--red)';
    t.innerHTML = (type === 'success' ? '✅ ' : '❌ ') + msg;
    container.appendChild(t);
    setTimeout(() => t.remove(), 4000);
  }

  /* =============================================
     JOAF MODERN CINEMATIC REEL ENGINE 
     Min. 35 Seconds, Viral Style, Rich Animations
     ============================================= */

  let reelBlob = null;

  async function fbGenerateReel() {
    const text = document.getElementById("fb-news-input").value.trim();
    if (!text) return toast("News text is missing!", "error");

    const btn = document.getElementById("fb-gen-btn");
    btn.innerHTML = "🤖 AI Analyzing...";
    btn.disabled = true;

    try {
      const res = await fetch("/.netlify/functions/groq-proxy", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",
          messages: [{
            role: "user", 
            content: `You are a viral short-form video expert for JOAF. 
Analyze this news text and structure a complete 40-second reel script. 
Break it down into exactly 7 to 9 highly theatrical and pacing-focused slides.
Output ONLY a strict JSON object. No markdown, no conversational text.
Format: 
{ 
  "caption": "Viral Facebook caption with high-reach hashtags", 
  "slides": [ 
    { "label": "URGENT / HOOK / BREAKING", "text": "2 short lines of dramatic Bengali text", "mood": "urgent|dark|heroic" } 
  ] 
}` + "\nNews: " + text
          }]
        })
      });

      const data = await res.json();
      const raw = data.choices?.[0]?.message?.content || "{}";
      const match = raw.match(/\{[\s\S]*\}/);
      const parsed = JSON.parse(match[0]);

      document.getElementById("fb-caption").value = parsed.caption || text;
      
      reelBlob = await makeCinematicReel(parsed.slides || []);

      const v = document.getElementById("fb-reel-video");
      v.src = URL.createObjectURL(reelBlob);
      v.style.display = "block";
      document.getElementById("fb-preview").style.display = "block";
      document.getElementById("fb-download-btn").style.display = "inline-block";
      document.getElementById("fb-post-reels-btn").style.display = "inline-block";

      toast("✅ Cinematic Reel generated successfully (>35s)!", "success");
    } catch(e) {
      toast("Error: " + e.message, "error");
    } finally {
      btn.innerHTML = "🎬 Reel বানাও";
      btn.disabled = false;
    }
  }

  async function makeCinematicReel(slides) {
    const canvas = document.getElementById("fb-card-canvas");
    canvas.width = 1080; 
    canvas.height = 1920;
    const ctx = canvas.getContext("2d");

    const stream = canvas.captureStream(30); 
    const recorder = new MediaRecorder(stream, {videoBitsPerSecond: 5000000, mimeType: "video/webm"});
    const chunks = [];
    
    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.start();

    const SLIDE_TIME = 5500; 

    for (let s of slides) {
      await renderRichSlide(ctx, s, SLIDE_TIME);
    }
    await renderEpicOutro(ctx, 6000);

    recorder.stop();
    await new Promise(r => recorder.onstop = r);
    return new Blob(chunks, {type: "video/webm"});
  }

  async function renderRichSlide(ctx, slide, durationMs) {
    const start = performance.now();
    const w = 1080;
    const h = 1920;
    
    const particles = Array.from({length: 45}, () => ({
      x: Math.random() * w,
      y: Math.random() * h,
      size: Math.random() * 4 + 1,
      speedY: -(Math.random() * 2.5 + 1.2)
    }));

    let baseColor = "#1a0b2e", accentColor = "#000000";
    if(slide.mood === "urgent") { baseColor = "#4a0404"; accentColor = "#120000"; }
    else if(slide.mood === "heroic") { baseColor = "#0b2e1a"; accentColor = "#001205"; }

    while (performance.now() - start < durationMs) {
      const elapsed = performance.now() - start;
      const progress = elapsed / durationMs;

      const gradientShift = h - (progress * 250);
      const grad = ctx.createLinearGradient(0, 0, 0, gradientShift);
      grad.addColorStop(0, accentColor);
      grad.addColorStop(1, baseColor);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);

      ctx.fillStyle = "rgba(255, 255, 255, 0.35)";
      particles.forEach(p => {
        p.y += p.speedY;
        if(p.y < 0) p.y = h;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      });

      const textAlpha = Math.min(1, elapsed / 700); 
      const scaleFactor = 1 + (progress * 0.06); 
      
      ctx.save();
      ctx.translate(w / 2, h / 2);
      ctx.scale(scaleFactor, scaleFactor);
      ctx.globalAlpha = textAlpha;

      ctx.fillStyle = "#ff4757";
      ctx.font = "900 68px sans-serif";
      ctx.textAlign = "center";
      ctx.shadowColor = "#ff4757";
      ctx.shadowBlur = 25;
      ctx.fillText(slide.label ? slide.label.toUpperCase() : "JOAF BREAKING", 0, -220);

      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 55px \"Noto Sans Bengali\", sans-serif";
      ctx.shadowBlur = 15;
      ctx.shadowColor = "rgba(0, 0, 0, 0.9)";
      
      const lines = wrapText(ctx, slide.text || "", 920);
      lines.forEach((line, i) => {
        ctx.fillText(line, 0, 10 + (i * 85));
      });

      ctx.restore();
      await new Promise(r => requestAnimationFrame(r));
    }
  }

  async function renderEpicOutro(ctx, durationMs) {
    const start = performance.now();
    const w = 1080, h = 1920;

    while (performance.now() - start < durationMs) {
      const elapsed = performance.now() - start;
      const textAlpha = Math.min(1, elapsed / 900);

      ctx.fillStyle = "#040108";
      ctx.fillRect(0, 0, w, h);

      ctx.save();
      ctx.globalAlpha = textAlpha;
      
      ctx.fillStyle = "#ffffff";
      ctx.shadowColor = "#2f3542";
      ctx.shadowBlur = 50;
      ctx.font = "900 170px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("JOAF", w / 2, h / 2 - 40);

      ctx.shadowBlur = 0;
      ctx.font = "bold 42px \"Noto Sans Bengali\", sans-serif";
      ctx.fillStyle = "#f1f2f6";
      ctx.fillText("জুলাই অনলাইন অ্যাক্টিভিস্ট ফোরাম", w / 2, h / 2 + 70);
      
      ctx.font = "500 36px sans-serif";
      ctx.fillStyle = "#747d8c";
      ctx.fillText("www.julyforum.com", w / 2, h / 2 + 160);
      
      ctx.restore();
      await new Promise(r => requestAnimationFrame(r));
    }
  }

  function wrapText(ctx, text, maxWidth) {
    const words = text.split(" ");
    const lines = [];
    let currentLine = words[0];

    for (let i = 1; i < words.length; i++) {
      const word = words[i];
      const width = ctx.measureText(currentLine + " " + word).width;
      if (width < maxWidth) {
        currentLine += " " + word;
      } else {
        lines.push(currentLine);
        currentLine = word;
      }
    }
    lines.push(currentLine);
    return lines;
  }

  window.fbGenerateReel = fbGenerateReel;
  window.fbDownloadReel = () => {
    if (!reelBlob) return;
    const a = document.createElement("a");
    a.href = URL.createObjectURL(reelBlob);
    a.download = `JOAF-Cinematic-Reel-${Date.now()}.webm`;
    a.click();
  };
  window.fbPostToReels = () => {
    if (!reelBlob) return;
    fbDownloadReel();
    const caption = document.getElementById('fb-caption').value;
    navigator.clipboard.writeText(caption).then(() => {
      toast('✅ Video Downloaded + Caption Copied!', 'success');
      setTimeout(() => window.open('https://business.facebook.com/latest/reels_composer', '_blank'), 700);
    });
  };
  </script>
</body>

<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>JOAF Studio - Unified Admin</title>
    <style>
        body { background: #06060a; color: #f0f0f8; font-family: sans-serif; margin: 0; }
        .nav { display: flex; gap: 10px; padding: 15px; background: #0d0d14; border-bottom: 1px solid #2a2a44; }
        .tab-btn { background: #131320; border: 1px solid #2a2a44; color: #a0a0c0; padding: 10px 15px; border-radius: 8px; cursor: pointer; }
        .tab-btn:hover { border-color: #7c3aed; }
        #view { padding: 20px; }
    </style>
</head>
<body>
    <div class="nav">
        <button class="tab-btn" onclick="loadView('newscard')">🗞️ NewsCard</button>
        <button class="tab-btn" onclick="loadView('fbpost')">📘 FB Post</button>
        <button class="tab-btn" onclick="loadView('queue')">📋 Queue</button>
    </div>
    <div id="view">এখানে টুল লোড হবে...</div>
    <script>
        function loadView(view) {
            document.getElementById('view').innerHTML = 'Loading ' + view + '...';
        }
    </script>
</body>
</html>

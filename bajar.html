function bn(n) {
  return String(n).replace(/\d/g, d => '০১২৩৪৫৬৭৮৯'[d]);
}

}

async function loadPrices() {
  const cacheKey = todayKey();

  // 1. Try Firebase cache first
  try {
    const snap = await getDoc(doc(db, 'bajar_cache', cacheKey));
    if (snap.exists()) {
      const cached = snap.data();
      if (cached.data && typeof cached.data === 'object') {
        BAJAR_DATA = cached.data;
        activeCat = Object.keys(BAJAR_DATA)[0];
        renderTabs();
        renderPrices();
        document.getElementById('bajarUpdated').textContent =
          `আজ ${todayBangla()} — AI আপডেট ✓`;
        return;
      }
    }
  } catch(e) {
    console.log('Firebase cache miss:', e);
  }

  // 2. Fetch from Groq
  try {
    const freshData = await fetchFromGroq();
    BAJAR_DATA = freshData;
    activeCat = Object.keys(BAJAR_DATA)[0];
    renderTabs();
    renderPrices();
    document.getElementById('bajarUpdated').textContent =
      `আজ ${todayBangla()} — AI আপডেট ✓`;

    // 3. Save to Firebase cache
    try {
      await setDoc(doc(db, 'bajar_cache', cacheKey), {
        data: freshData,
        fetchedAt: serverTimestamp()
      });
    } catch(e) {
      console.log('Firebase save failed:', e);
    }

  } catch(e) {
    console.warn('Groq failed, using fallback:', e);
    showError();
  }
}

  if (!('Notification' in window)) { alert('আপনার ব্রাউজার notification সাপোর্ট করে না'); return; }
  Notification.requestPermission().then(p => {
    if (p === 'granted') {
      navigator.serviceWorker.ready.then(r => r.showNotification('✅ চালু হয়েছে!', {
        body: 'প্রতিদিন সকালে বাজার দর পাবেন।', icon: '/logoc7c3.png', badge: '/logoc7c3.png'
      }));
      localStorage.setItem('joaf-bajar-notif', '1');
    }
  });
};

// Start
loadPrices();
</script>

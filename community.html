<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>কমিউনিটি নেটওয়ার্ক — জোয়াফ</title>
  <meta name="description" content="JOAF কমিউনিটির সকল WhatsApp গ্রুপ এক জায়গায়। খুঁজুন, ফিল্টার করুন, যোগ দিন।">
  <meta property="og:title" content="জোয়াফ কমিউনিটি — একসাথে, সবসময়">
  <meta property="og:image" content="https://julyforum.com/logoc7c3.png">
  <link rel="icon" href="/favicon.ico">
  <link rel="manifest" href="/site.webmanifest">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/material-design-iconic-font/2.2.0/css/material-design-iconic-font.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <link rel="stylesheet" href="/css/pluginsc7c3.css">
  <link rel="stylesheet" href="/css/stylec7c3.css">
  <link rel="stylesheet" href="/css/joaf.css">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-QV3CFV7R98"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-QV3CFV7R98');</script>
  <style>
    .comm-hero{background:linear-gradient(135deg,#1a1a2e,#075e55);padding:48px 0 36px;color:#fff;text-align:center;}
    .comm-hero h1{font-size:clamp(1.7rem,4vw,2.5rem);font-weight:900;margin-bottom:10px;}
    .comm-hero p{opacity:.85;font-size:15px;max-width:540px;margin:0 auto 22px;}
    .stat-chip{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);padding:7px 14px;border-radius:50px;font-size:13px;font-weight:600;margin:4px;display:inline-flex;align-items:center;gap:6px;}
    .search-wrap{position:relative;max-width:420px;margin:18px auto 0;}
    .search-wrap input{width:100%;padding:12px 44px 12px 16px;border-radius:50px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:15px;font-family:inherit;}
    .search-wrap input::placeholder{color:rgba(255,255,255,.6);}
    .search-wrap input:focus{outline:none;border-color:#c9a227;background:rgba(255,255,255,.15);}
    .search-wrap i{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.7);font-size:20px;}
    .filter-bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:20px 0;}
    .flt-btn{padding:8px 16px;border-radius:50px;border:2px solid #e5e7eb;background:#fff;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:.25s;color:#374151;}
    .flt-btn.active{background:#075e55;color:#fff;border-color:#075e55;}
    .comm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;padding:10px 0;}
    .no-results{text-align:center;padding:40px;color:#9ca3af;font-size:15px;}
    .comm-map-mini{height:80px;width:100%;border-radius:0;}
    @media(max-width:480px){.comm-grid{grid-template-columns:repeat(2,1fr);gap:10px;}}
  </style>
</head>
<body data-page="community">

<div id="joaf-preloader">
  <img src="/logoc7c3.png" alt="JOAF" class="preloader-logo">
  <p class="preloader-text">কমিউনিটি লোড হচ্ছে...</p>
  <div class="preloader-bar"></div>
</div>

<div class="wrapper fix">
  <div id="joaf-header"></div>
  <div id="joaf-ticker"></div>

  <!-- Hero -->
  <section class="comm-hero">
    <div class="container">
      <h1>🤝 JOAF কমিউনিটি নেটওয়ার্ক</h1>
      <p>আপনার এলাকার গ্রুপ খুঁজুন এবং যোগ দিন। আমরা সবাই একসাথে।</p>
      <div id="statsChips"></div>
      <div class="search-wrap">
        <input type="text" id="searchBox" placeholder="গ্রুপ খুঁজুন (রংপুর, অস্ট্রেলিয়া...)" autocomplete="off">
        <i class="zmdi zmdi-search"></i>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="filter-bar" id="filterBar">
        <button class="flt-btn active" data-f="all">সব গ্রুপ</button>
        <button class="flt-btn" data-f="main">🏛️ মূল হাব</button>
        <button class="flt-btn" data-f="regional">📍 আঞ্চলিক</button>
        <button class="flt-btn" data-f="intl">🌍 আন্তর্জাতিক</button>
        <button class="flt-btn" data-f="special">⭐ বিশেষায়িত</button>
        <button class="flt-btn" data-f="expand">🚀 সম্প্রসারণ</button>
      </div>
      <div id="commGrid" class="comm-grid"></div>
      <div id="noResults" class="no-results" style="display:none">কোনো গ্রুপ পাওয়া যায়নি।</div>
    </div>
  </section>

  <div id="joaf-footer"></div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="/js/plugins.js"></script>
<script src="/js/data.js"></script>
<script src="/js/components.js"></script>
<script src="/js/rainbow-swirl-cursor.js"></script>
<script>
// Category labels
const catLabel = {main:'মূল হাব',regional:'আঞ্চলিক',intl:'আন্তর্জাতিক',special:'বিশেষায়িত',expand:'সম্প্রসারণ'};
const catClass = {main:'cat-main',regional:'cat-regional',intl:'cat-intl',special:'cat-special',expand:'cat-expand'};
let activeFilter = 'all';

// Stats
function renderStats() {
  const g = JOAF.communityGroups;
  const count = cat => cat === 'all' ? g.length : g.filter(x=>x.cat===cat).length;
  document.getElementById('statsChips').innerHTML = `
    <span class="stat-chip">🏘️ মোট: ${count('all')}</span>
    <span class="stat-chip">🏛️ মূল: ${count('main')}</span>
    <span class="stat-chip">📍 আঞ্চলিক: ${count('regional')}</span>
    <span class="stat-chip">🌍 আন্তর্জাতিক: ${count('intl')}</span>
    <span class="stat-chip">⭐ বিশেষায়িত: ${count('special')}</span>
    <span class="stat-chip">🚀 সম্প্রসারণ: ${count('expand')}</span>`;
}

// Render cards
function renderCards(filter='all', query='') {
  const grid = document.getElementById('commGrid');
  const q = query.trim().toLowerCase();
  const filtered = JOAF.communityGroups.filter(g => {
    const catOk = filter==='all' || g.cat===filter;
    const qOk = !q || g.name.toLowerCase().includes(q) || (g.meta||'').toLowerCase().includes(q);
    return catOk && qOk;
  });
  document.getElementById('noResults').style.display = filtered.length ? 'none' : 'block';
  if (!filtered.length) { grid.innerHTML=''; return; }

  const hasLink = g => g.whatsapp && g.whatsapp !== '#';

  grid.innerHTML = filtered.map((g, i) => {
    const ribbon = catLabel[g.cat] || '';
    const topSection = g.lat
      ? `<div class="comm-map-mini" id="map_${i}" data-lat="${g.lat}" data-lng="${g.lng}"></div>`
      : `<div class="comm-cover ${catClass[g.cat]||'cat-main'}">${g.cover||g.name}</div>`;
    const btn = hasLink(g)
      ? `<a class="comm-join-btn" href="${g.whatsapp}" target="_blank" rel="noopener"><i class="zmdi zmdi-whatsapp"></i> যোগ দিন</a>`
      : `<span class="comm-join-btn no-link"><i class="zmdi zmdi-time"></i> শীঘ্রই আসছে</span>`;
    return `<div class="comm-card joaf-reveal-scale" style="transition-delay:${(i%8)*.06}s" data-cat="${g.cat}" data-name="${g.name}">
      ${topSection}
      <span class="comm-ribbon">${ribbon}</span>
      <div class="comm-body">
        <h3>${g.name}</h3>
        <p>${g.meta||''}</p>
        ${btn}
      </div>
    </div>`;
  }).join('');

  // Init leaflet maps
  filtered.forEach((g, i) => {
    if (!g.lat) return;
    const el = document.getElementById('map_'+i);
    if (!el) return;
    const map = L.map(el, {zoomControl:false,dragging:false,scrollWheelZoom:false,attributionControl:false})
      .setView([g.lat,g.lng], g.cat==='intl'?4:10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(map);
    L.circleMarker([g.lat,g.lng],{radius:8,color:'#075e55',fillColor:'#25d366',fillOpacity:.9,weight:2}).addTo(map);
    setTimeout(()=>map.invalidateSize(),100);
  });

  setTimeout(()=>JOAFComponents.initAnimations(),80);
}

// Filter buttons
document.getElementById('filterBar').addEventListener('click', e => {
  const btn = e.target.closest('[data-f]');
  if (!btn) return;
  document.querySelectorAll('.flt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.f;
  renderCards(activeFilter, document.getElementById('searchBox').value);
});

// Search
document.getElementById('searchBox').addEventListener('input', e => {
  renderCards(activeFilter, e.target.value);
});

// Init
renderStats();
renderCards();
</script>
</body>
</html>

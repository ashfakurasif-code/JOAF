<!DOCTYPE html>
<html lang="bn"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>আলোচনা ফোরাম — JOAF</title>
<link rel="stylesheet" href="/css/stylec7c3.css">
<link rel="stylesheet" href="/css/pluginsc7c3.css">
<link rel="stylesheet" href="/css/joaf.css?v=6.3">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/material-design-iconic-font/2.2.0/css/material-design-iconic-font.min.css">
</head><body data-page="joaf">
<div id="joaf-preloader" role="status" class="hidden"></div>
<div id="joaf-header"></div><div id="joaf-ticker"></div>
<style>
.forum-hero{background:linear-gradient(135deg,#3b0764,#7c3aed);padding:36px 0 24px;color:#fff;text-align:center;}
.forum-hero h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:900;}
.room-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.room-card{background:#fff;border-radius:14px;padding:14px;box-shadow:0 2px 10px rgba(0,0,0,.07);cursor:pointer;transition:transform .15s,box-shadow .15s;border:1.5px solid #f0f0f0;}
.room-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.12);border-color:#7c3aed;}
.room-card.active-room{border-color:#7c3aed;background:#faf5ff;}
.room-icon{font-size:28px;margin-bottom:6px;}
.room-name{font-size:13px;font-weight:800;color:#1a1a2e;margin-bottom:2px;}
.room-count{font-size:10px;color:#7c3aed;font-weight:700;}
.chat-area{background:#fff;border-radius:16px;box-shadow:0 2px 14px rgba(0,0,0,.08);overflow:hidden;}
.chat-header{background:linear-gradient(135deg,#3b0764,#7c3aed);padding:14px 16px;color:#fff;display:flex;align-items:center;gap:10px;}
.chat-header-icon{font-size:22px;}
.chat-header-name{font-size:14px;font-weight:800;}
.chat-header-count{font-size:11px;opacity:.8;}
.chat-messages{height:320px;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.msg{display:flex;gap:8px;align-items:flex-start;}
.msg.own{flex-direction:row-reverse;}
.msg-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#ede9fe,#c4b5fd);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.msg-bubble{max-width:72%;padding:9px 12px;border-radius:14px;font-size:13px;line-height:1.5;}
.msg .msg-bubble{background:#f3f4f6;color:#1a1a2e;border-radius:4px 14px 14px 14px;}
.msg.own .msg-bubble{background:linear-gradient(135deg,#3b0764,#7c3aed);color:#fff;border-radius:14px 4px 14px 14px;}
.msg-name{font-size:10px;color:#9ca3af;margin-bottom:3px;}
.msg-time{font-size:9px;color:#9ca3af;margin-top:3px;}
.chat-input-row{display:flex;gap:8px;padding:12px;border-top:1px solid #f3f4f6;}
.chat-input{flex:1;padding:10px 14px;border:2px solid #e5e7eb;border-radius:50px;font-size:13px;font-family:inherit;outline:none;}
.chat-input:focus{border-color:#7c3aed;}
.send-btn{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#3b0764,#7c3aed);color:#fff;border:none;font-size:16px;cursor:pointer;flex-shrink:0;}
.login-notice{background:linear-gradient(135deg,#faf5ff,#ede9fe);border-radius:14px;padding:14px;margin-bottom:14px;border:1.5px solid #c4b5fd;text-align:center;}
.login-notice p{font-size:13px;color:#5b21b6;margin-bottom:10px;}
.login-btn{padding:10px 24px;background:linear-gradient(135deg,#3b0764,#7c3aed);color:#fff;border:none;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
</style>
<div class="forum-hero"><div class="container">
  <h1>💬 আলোচনা ফোরাম</h1>
  <p>জেলাভিত্তিক আলোচনা — আপনার এলাকার মানুষের সাথে</p>
</div></div>
<section class="section"><div class="container">

  <div id="loginNotice" style="display:none">
    <div class="login-notice">
      <p>💬 চ্যাট করতে login করুন</p>
      <button class="login-btn" onclick="window.location.href='/joaf-polls.html'">Login করুন</button>
    </div>
  </div>

  <h3 style="font-size:15px;font-weight:900;margin-bottom:12px;color:#1a1a2e;">🌐 চ্যাটরুম বেছে নিন</h3>
  <div class="room-grid" id="roomGrid"></div>

  <div class="chat-area" id="chatArea">
    <div class="chat-header">
      <span class="chat-header-icon" id="chatIcon">💬</span>
      <div>
        <div class="chat-header-name" id="chatRoomName">সাধারণ আলোচনা</div>
        <div class="chat-header-count" id="chatCount">১২৪ জন সক্রিয়</div>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-row">
      <input class="chat-input" id="chatInput" placeholder="বার্তা লিখুন..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
</div></section>
<div id="joaf-footer"></div>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="/js/modernizr-2.8.3.min.js"></script>
<script src="/js/data.js?v=6.3"></script>
<script src="/js/components.js?v=6.3"></script>
<script>
const ROOMS=[
  {id:'general',name:'সাধারণ আলোচনা',icon:'💬',count:'১২৪'},
  {id:'andolon',name:'আন্দোলন',icon:'✊',count:'৮৭'},
  {id:'dhaka',name:'ঢাকা',icon:'🏙️',count:'৫৬'},
  {id:'chittagong',name:'চট্টগ্রাম',icon:'⛵',count:'৩৪'},
  {id:'rajshahi',name:'রাজশাহী',icon:'🌾',count:'২৮'},
  {id:'sylhet',name:'সিলেট',icon:'🍵',count:'২২'},
  {id:'khulna',name:'খুলনা',icon:'🐯',count:'১৯'},
  {id:'news',name:'খবর ও বিশ্লেষণ',icon:'📰',count:'৯৫'},
];
let activeRoom='general';
let db=null;
let unsubscribe=null;

// Firebase init
try{
  firebase.initializeApp({apiKey:'AIzaSyDBbm1eiqatwEUQenPIEAEFSubTJTUTdZk',authDomain:'joaf-app-45753.firebaseapp.com',projectId:'joaf-app-45753'});
  db=firebase.firestore();
}catch(e){}

function bn(n){return n.toString().replace(/\d/g,d=>'০১২৩৪৫৬৭৮৯'[d]);}

document.getElementById('roomGrid').innerHTML=ROOMS.map(r=>`
  <div class="room-card${r.id===activeRoom?' active-room':''}" id="room-${r.id}" onclick="switchRoom('${r.id}','${r.name}','${r.icon}','${r.count}')">
    <div class="room-icon">${r.icon}</div>
    <div class="room-name">${r.name}</div>
    <div class="room-count">${r.count} জন সক্রিয়</div>
  </div>`).join('');

// Demo messages
const DEMO_MSGS=[
  {name:'রাহেলা',text:'জুলাই আন্দোলনের চেতনা ধরে রাখতে হবে',time:'১০ মিনিট আগে',own:false},
  {name:'কামাল ভাই',text:'একমত। আমাদের ঐক্যবদ্ধ থাকতে হবে।',time:'৮ মিনিট আগে',own:false},
  {name:'আপনি',text:'JOAF সবসময় পাশে আছে ✊',time:'৫ মিনিট আগে',own:true},
];

function renderMessages(msgs){
  const el=document.getElementById('chatMessages');
  el.innerHTML=msgs.map(m=>`
    <div class="msg${m.own?' own':''}">
      <div class="msg-avatar">${m.name?m.name[0]:'👤'}</div>
      <div>
        ${!m.own?`<div class="msg-name">${m.name}</div>`:''}
        <div class="msg-bubble">${m.text}</div>
        <div class="msg-time">${m.time||''}</div>
      </div>
    </div>`).join('');
  el.scrollTop=el.scrollHeight;
}

function switchRoom(id,name,icon,count){
  activeRoom=id;
  document.querySelectorAll('.room-card').forEach(c=>c.classList.remove('active-room'));
  document.getElementById('room-'+id).classList.add('active-room');
  document.getElementById('chatRoomName').textContent=name;
  document.getElementById('chatIcon').textContent=icon;
  document.getElementById('chatCount').textContent=count+' জন সক্রিয়';
  loadMessages(id);
}

function loadMessages(roomId){
  renderMessages(DEMO_MSGS);
  if(!db) return;
  if(unsubscribe) unsubscribe();
  try{
    unsubscribe=db.collection('forum_'+roomId).orderBy('ts','asc').limit(30).onSnapshot(snap=>{
      if(snap.empty){renderMessages(DEMO_MSGS);return;}
      const msgs=snap.docs.map(d=>{
        const data=d.data();
        const cu=localStorage.getItem('cu');
        return {name:data.name,text:data.text,time:'এইমাত্র',own:data.uid===cu};
      });
      renderMessages(msgs);
    });
  }catch(e){renderMessages(DEMO_MSGS);}
}

function sendMsg(){
  const input=document.getElementById('chatInput');
  const text=input.value.trim();
  if(!text) return;
  const cuId=localStorage.getItem('cu');
  const cu=cuId?JSON.parse(localStorage.getItem(cuId)):null;
  const name=cu?cu.name:'অতিথি';
  input.value='';
  if(db&&cuId){
    try{
      db.collection('forum_'+activeRoom).add({name,text,uid:cuId,ts:firebase.firestore.FieldValue.serverTimestamp()});
      return;
    }catch(e){}
  }
  // Local demo
  const msgs=document.querySelectorAll('.msg');
  const el=document.getElementById('chatMessages');
  el.insertAdjacentHTML('beforeend',`
    <div class="msg own">
      <div class="msg-avatar">${name[0]||'👤'}</div>
      <div><div class="msg-bubble">${text}</div><div class="msg-time">এইমাত্র</div></div>
    </div>`);
  el.scrollTop=el.scrollHeight;
}

loadMessages('general');
</script><script src="/js/rainbow-swirl-cursor.js" defer></script>
</body></html>

// Search + filter + pagination
let currentPage = 1;
const PER_PAGE = 30;
let filtered = FAMILIES;

function renderFamilies() {
  const list = document.getElementById('familyList');
  const start = (currentPage-1)*PER_PAGE;
  const slice = filtered.slice(start, start+PER_PAGE);
  if(slice.length===0){ list.innerHTML='<p style="text-align:center;color:#6b7280;padding:20px;">কোনো ফলাফল পাওয়া যায়নি।</p>'; return; }
  list.innerHTML = slice.map(f=>`
    <div class="family-card">
      <div class="fam-name">${f.name}</div>
      <div class="fam-dist">📍 ${f.dist}</div>
      <div class="fam-story">${f.story}</div>
      <span class="fam-status ${f.status==='helped'?'status-helped':'status-need'}">${f.status==='helped'?'✅ সহায়তা পেয়েছেন':'🙏 সহায়তা প্রয়োজন'}</span>
      ${f.status==='need'?'<br><button class="help-btn" style="margin-top:8px;" onclick="document.querySelectorAll(\'.tab-btn\')[2].click();setTab(\'help\',document.querySelectorAll(\'.tab-btn\')[2])">❤️ সহায়তা করুন</button>':''}
    </div>`).join('');
  // pagination
  const totalPages = Math.ceil(filtered.length/PER_PAGE);
  const pgDiv = document.getElementById('pagination');
  if(pgDiv) {
    let btns = '';
    if(currentPage>1) btns+=`<button class="pg-btn" onclick="goPage(${currentPage-1})">◀ আগে</button>`;
    btns+=`<span style="font-size:13px;color:#6b7280;padding:0 12px;">${currentPage} / ${totalPages} (${filtered.length} জন)</span>`;
    if(currentPage<totalPages) btns+=`<button class="pg-btn" onclick="goPage(${currentPage+1})">পরে ▶</button>`;
    pgDiv.innerHTML = btns;
  }
}

function goPage(p){ currentPage=p; renderFamilies(); document.getElementById('tab-families').scrollIntoView({behavior:'smooth'}); }

function applyFilter(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const dist = document.getElementById('distFilter').value;
  const stat = document.getElementById('statFilter').value;
  filtered = FAMILIES.filter(f=>{
    const matchQ = !q || f.name.toLowerCase().includes(q) || f.dist.toLowerCase().includes(q) || f.story.toLowerCase().includes(q);
    const matchD = !dist || f.dist===dist;
    const matchS = !stat || f.status===stat;
    return matchQ && matchD && matchS;
  });
  currentPage=1;
  renderFamilies();
}

renderFamilies();

function setTab(tab,btn){
  ['families','register','help'].forEach(t=>document.getElementById('tab-'+t).style.display=t===tab?'block':'none');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

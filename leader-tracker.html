<!DOCTYPE html>
<html lang="bn"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>নেতা ট্র্যাকার — JOAF</title>
<link rel="stylesheet" href="/css/stylec7c3.css">
<link rel="stylesheet" href="/css/pluginsc7c3.css">
<link rel="stylesheet" href="/css/joaf.css?v=6.6">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/material-design-iconic-font/2.2.0/css/material-design-iconic-font.min.css">
</head><body data-page="andolon">
<div id="joaf-preloader" role="status" class="hidden"></div>
<div id="joaf-header"></div><div id="joaf-ticker"></div>
<style>
.lt-hero{background:linear-gradient(135deg,#1e3a5f,#1d4ed8);padding:36px 0 24px;color:#fff;text-align:center;}
.lt-hero h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:900;}
.lt-hero p{font-size:13px;opacity:.8;margin-top:6px;}
.leader-card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 14px rgba(0,0,0,.08);margin-bottom:14px;border:1.5px solid #f0f0f0;}
.leader-top{display:flex;gap:14px;align-items:flex-start;margin-bottom:12px;}
.leader-avatar{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,#dbeafe,#bfdbfe);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;}
.leader-name{font-size:15px;font-weight:900;color:#1a1a2e;margin-bottom:2px;}
.leader-party{font-size:12px;color:#1d4ed8;font-weight:700;margin-bottom:3px;}
.leader-role{font-size:11px;color:#6b7280;}
.promise-section h5{font-size:12px;font-weight:800;color:#374151;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}
.promise-item{display:flex;gap:8px;margin-bottom:8px;font-size:12px;color:#374151;line-height:1.5;}
.promise-done{color:#166534;}
.promise-pending{color:#92400e;}
.promise-broken{color:#991b1b;}
.score-bar{background:#f3f4f6;border-radius:50px;height:8px;margin-top:10px;overflow:hidden;}
.score-fill{height:100%;border-radius:50px;transition:width .6s;}
.score-label{display:flex;justify-content:space-between;font-size:11px;color:#6b7280;margin-top:4px;}
.approval-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:50px;margin-top:8px;}
.appr-high{background:#dcfce7;color:#166534;}
.appr-mid{background:#fef3c7;color:#92400e;}
.appr-low{background:#fee2e2;color:#991b1b;}
.cat-tabs{display:flex;gap:7px;overflow-x:auto;padding:4px 0 12px;scrollbar-width:none;}
.cat-tab{flex-shrink:0;padding:6px 13px;border-radius:50px;border:1.5px solid #e5e7eb;background:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;}
.cat-tab.active{background:#1d4ed8;color:#fff;border-color:#1d4ed8;}
.note-card{background:linear-gradient(135deg,#eff6ff,#dbeafe);border-radius:12px;padding:12px;margin-bottom:16px;font-size:12px;color:#1e3a8a;border:1.5px solid #93c5fd;}
</style>
<div class="lt-hero"><div class="container">
  <h1>🏛️ নেতা ট্র্যাকার</h1>
  <p>প্রতিশ্রুতি vs বাস্তবতা — জনগণের বিচার</p>
</div></div>
<section class="section"><div class="container">
  <div class="note-card">📌 এটি একটি তথ্যভিত্তিক platform। সব তথ্য সর্বসাধারণের জন্য উন্মুক্ত সূত্র থেকে সংগ্রহ করা হয়েছে।</div>
  <div class="cat-tabs" id="catTabs"></div>
  <div id="leaderList"></div>
</div></section>
<div id="joaf-footer"></div>
<script src="/js/modernizr-2.8.3.min.js"></script>
<script src="/js/data.js?v=6.6"></script>
<script src="/js/components.js?v=6.6"></script>
<script>
const LEADERS=[
  {name:'ড. মুহাম্মদ ইউনূস',party:'অন্তর্বর্তীকালীন সরকার',role:'প্রধান উপদেষ্টা',icon:'👴',cat:'সরকার',approval:72,promises:[
    {text:'নির্বাচন কমিশন সংস্কার',status:'done'},{text:'দুর্নীতি দমন কমিশন শক্তিশালীকরণ',status:'progress'},{text:'দ্রব্যমূল্য নিয়ন্ত্রণ',status:'pending'},{text:'বিচার বিভাগ সংস্কার',status:'progress'},
  ]},
  {name:'মির্জা ফখরুল ইসলাম আলমগীর',party:'বিএনপি',role:'মহাসচিব',icon:'👤',cat:'বিরোধী দল',approval:45,promises:[
    {text:'নির্বাচনকালীন তত্ত্বাবধায়ক সরকার',status:'pending'},{text:'রাজবন্দী মুক্তি',status:'progress'},{text:'গণতন্ত্র পুনরুদ্ধার',status:'pending'},
  ]},
  {name:'নাহিদ ইসলাম',party:'এনসিপি',role:'সমন্বয়ক',icon:'🧑',cat:'যুব রাজনীতি',approval:68,promises:[
    {text:'জুলাই গণঅভ্যুত্থানের বিচার',status:'progress'},{text:'ছাত্র-জনতার অধিকার রক্ষা',status:'done'},{text:'দুর্নীতিমুক্ত রাষ্ট্র গঠন',status:'pending'},
  ]},
];
const CATS=['সব','সরকার','বিরোধী দল','যুব রাজনীতি'];
let activeCat='সব';
function renderTabs(){
  document.getElementById('catTabs').innerHTML=CATS.map(c=>
    `<button class="cat-tab${c===activeCat?' active':''}" onclick="setCat('${c}')">${c}</button>`).join('');
}
function setCat(c){activeCat=c;renderTabs();renderLeaders();}
function renderLeaders(){
  const list=LEADERS.filter(l=>activeCat==='সব'||l.cat===activeCat);
  const sIcon=s=>s==='done'?'✅':s==='progress'?'🔄':'⏳';
  const sCls=s=>s==='done'?'promise-done':s==='progress'?'promise-pending':'';
  document.getElementById('leaderList').innerHTML=list.map(l=>{
    const done=l.promises.filter(p=>p.status==='done').length;
    const total=l.promises.length;
    const pct=Math.round(done/total*100);
    const aprCls=l.approval>=60?'appr-high':l.approval>=40?'appr-mid':'appr-low';
    return `<div class="leader-card">
      <div class="leader-top">
        <div class="leader-avatar">${l.icon}</div>
        <div style="flex:1">
          <div class="leader-name">${l.name}</div>
          <div class="leader-party">${l.party}</div>
          <div class="leader-role">${l.role}</div>
          <span class="approval-badge ${aprCls}">👥 ${l.approval}% জনসমর্থন</span>
        </div>
      </div>
      <div class="promise-section">
        <h5>প্রতিশ্রুতি (${done}/${total} পূরণ)</h5>
        ${l.promises.map(p=>`<div class="promise-item ${sCls(p.status)}">${sIcon(p.status)} ${p.text}</div>`).join('')}
        <div class="score-bar"><div class="score-fill" style="width:${pct}%;background:${pct>=60?'#16a34a':pct>=30?'#d97706':'#dc2626'}"></div></div>
        <div class="score-label"><span>প্রতিশ্রুতি পূরণ</span><span>${pct}%</span></div>
      </div>
    </div>`;
  }).join('');
}
renderTabs();renderLeaders();
</script><script src="/js/rainbow-swirl-cursor.js" defer></script>
<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, addDoc, collection, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
const _fa = getApps().length ? getApps()[0] : initializeApp({apiKey:'AIzaSyDBbm1eiqatwEUQenPIEAEFSubTJTUTdZk',authDomain:'joaf-app-45753.firebaseapp.com',projectId:'joaf-app-45753'});
const _db = getFirestore(_fa);
const _ua = navigator.userAgent;
const _dev = /Mobile|Android|iPhone/i.test(_ua) ? 'mobile' : /iPad|Tablet/i.test(_ua) ? 'tablet' : 'desktop';
const _ref = document.referrer;
const _src = _ref.includes('google') ? 'Google' : _ref.includes('facebook') ? 'Facebook' : _ref.includes('t.co') || _ref.includes('twitter') ? 'Twitter' : _ref ? 'Referral' : 'Direct';
addDoc(collection(_db,'pageviews'),{page:location.pathname,device:_dev,source:_src,referrer:_ref,ts:serverTimestamp()}).catch(()=>{});
</script>
</body></html>

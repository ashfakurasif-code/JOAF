:root{--blue:#1d4ed8;--green:#16a34a;--red:#dc2626;--amber:#d97706;--gray:#6b7280;}
.lt-hero{background:linear-gradient(135deg,#0f172a,#1e3a8a);padding:40px 0 28px;color:#fff;text-align:center;}
.lt-hero h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:900;letter-spacing:-.5px;}
.lt-hero p{font-size:13px;opacity:.75;margin-top:6px;}
.lt-stats{display:flex;gap:24px;justify-content:center;margin-top:20px;flex-wrap:wrap;}
.lt-stat{text-align:center;}
.lt-stat-num{font-size:24px;font-weight:900;}
.lt-stat-lbl{font-size:10px;opacity:.7;text-transform:uppercase;letter-spacing:.5px;}

/* Filter bar */
.filter-bar{display:flex;gap:8px;overflow-x:auto;padding:16px 0 8px;scrollbar-width:none;align-items:center;flex-wrap:wrap;}
.filter-bar::-webkit-scrollbar{display:none;}
.ftab{flex-shrink:0;padding:6px 14px;border-radius:50px;border:1.5px solid #e5e7eb;background:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;color:#374151;}
.ftab.active{background:#1e3a8a;color:#fff;border-color:#1e3a8a;}
.search-box{padding:7px 14px;border-radius:50px;border:1.5px solid #e5e7eb;font-size:12px;outline:none;font-family:inherit;margin-left:auto;width:180px;}
.search-box:focus{border-color:#1d4ed8;}

/* Leader card */
.leader-card{background:#fff;border-radius:18px;padding:18px;box-shadow:0 2px 16px rgba(0,0,0,.07);margin-bottom:14px;border:1.5px solid #f1f5f9;transition:.2s;}
.leader-card:hover{box-shadow:0 4px 24px rgba(0,0,0,.12);transform:translateY(-1px);}
.lc-top{display:flex;gap:14px;align-items:flex-start;margin-bottom:14px;}
.lc-avatar{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#dbeafe,#bfdbfe);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;position:relative;}
.lc-verified{position:absolute;bottom:-4px;right:-4px;background:#1d4ed8;color:#fff;border-radius:50%;width:18px;height:18px;font-size:9px;display:flex;align-items:center;justify-content:center;}
.lc-name{font-size:15px;font-weight:900;color:#0f172a;margin-bottom:2px;}
.lc-party{font-size:12px;color:#1d4ed8;font-weight:700;margin-bottom:2px;}
.lc-role{font-size:11px;color:#6b7280;}
.lc-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:50px;font-size:10px;font-weight:700;}
.badge-blue{background:#dbeafe;color:#1e40af;}
.badge-green{background:#dcfce7;color:#166534;}
.badge-red{background:#fee2e2;color:#991b1b;}
.badge-amber{background:#fef3c7;color:#92400e;}
.badge-gray{background:#f3f4f6;color:#374151;}
.badge-viral{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#fff;}

/* Approval meter */
.appr-section{margin-bottom:14px;}
.appr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.appr-label{font-size:11px;font-weight:700;color:#374151;}
.appr-pct{font-size:18px;font-weight:900;}
.appr-bar{background:#f1f5f9;border-radius:50px;height:10px;overflow:hidden;}
.appr-fill{height:100%;border-radius:50px;transition:width .8s cubic-bezier(.4,0,.2,1);}

/* Tabs inside card */
.lc-tabs{display:flex;gap:4px;margin-bottom:12px;border-bottom:1px solid #f1f5f9;padding-bottom:8px;}
.lc-tab{padding:5px 12px;border-radius:8px;border:none;background:none;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;color:#6b7280;transition:.12s;}
.lc-tab.active{background:#eff6ff;color:#1d4ed8;}

/* Promises */
.promise-item{display:flex;gap:8px;padding:8px 10px;border-radius:10px;margin-bottom:6px;font-size:12px;line-height:1.5;align-items:flex-start;}
.promise-done{background:#f0fdf4;color:#166534;}
.promise-progress{background:#fffbeb;color:#92400e;}
.promise-pending{background:#f8fafc;color:#475569;}
.promise-broken{background:#fff1f2;color:#be123c;}
.p-icon{flex-shrink:0;font-size:13px;margin-top:1px;}

/* Statements */
.stmt-item{padding:10px 12px;background:#f8fafc;border-radius:10px;margin-bottom:8px;border-left:3px solid #1d4ed8;}
.stmt-text{font-size:12px;color:#1e293b;line-height:1.6;font-style:italic;}
.stmt-meta{font-size:10px;color:#94a3b8;margin-top:4px;}

/* Controversies */
.ctv-item{padding:10px 12px;background:#fff7ed;border-radius:10px;margin-bottom:8px;border-left:3px solid #f97316;}
.ctv-text{font-size:12px;color:#7c2d12;line-height:1.5;}
.ctv-meta{font-size:10px;color:#c2410c;margin-top:4px;}

/* Viral moments */
.viral-item{display:flex;gap:10px;padding:10px;background:linear-gradient(135deg,#fefce8,#fef9c3);border-radius:10px;margin-bottom:8px;border:1px solid #fde68a;align-items:flex-start;}
.viral-icon{font-size:20px;flex-shrink:0;}
.viral-text{font-size:12px;color:#713f12;line-height:1.5;}
.viral-date{font-size:10px;color:#a16207;margin-top:2px;}

/* Grid */
.leaders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;}
@media(max-width:600px){.leaders-grid{grid-template-columns:1fr;}}

/* Sort bar */
.sort-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.sort-btn{padding:5px 12px;border-radius:50px;border:1.5px solid #e5e7eb;background:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;color:#374151;}
.sort-btn.active{background:#0f172a;color:#fff;border-color:#0f172a;}
.result-count{font-size:11px;color:#94a3b8;margin-left:auto;}

.skeleton{background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:12px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{height:220px;margin-bottom:14px;}

.note-card{background:linear-gradient(135deg,#eff6ff,#dbeafe);border-radius:12px;padding:12px;margin-bottom:16px;font-size:12px;color:#1e3a8a;border:1.5px solid #93c5fd;}
.empty-state{text-align:center;padding:48px 24px;color:#94a3b8;}
.empty-state .es-icon{font-size:48px;margin-bottom:12px;}
.last-updated{font-size:10px;color:#94a3b8;text-align:right;margin-top:4px;}

<section class="section"><div class="container">

  </div>

  <div class="sort-bar">
    <span style="font-size:11px;font-weight:700;color:#374151;">সাজাও:</span>
    <button class="sort-btn active" onclick="setSort('approval',this)">👥 জনসমর্থন</button>
    <button class="sort-btn" onclick="setSort('promises',this)">✅ প্রতিশ্রুতি</button>
    <button class="sort-btn" onclick="setSort('name',this)">অ-ক</button>
    <span class="result-count" id="resultCount"></span>
  </div>

    <div class="skeleton skel-card"></div>
    <div class="skeleton skel-card"></div>
    <div class="skeleton skel-card"></div>
  </div>
  <div class="last-updated" id="lastUpdated"></div>
</div></section>

// ── Load from Firestore, fallback to hardcoded ──
async function loadLeaders() {
  try {
    const snap = await getDocs(collection(_db,'leaders'));
    if (snap.size >= 3) {
      ALL_LEADERS = snap.docs.map(d => ({id:d.id, ...d.data()}));
      const ts = snap.docs[0]?.data()?.createdAt?.toDate?.();
      if (ts) document.getElementById('lastUpdated').textContent = 'সর্বশেষ আপডেট: ' + ts.toLocaleDateString('bn-BD');
    } else {
      ALL_LEADERS = FALLBACK;
      document.getElementById('lastUpdated').textContent = 'ডিফল্ট ডেটা — Admin থেকে migrate করুন';
    }
  } catch(e) {
    ALL_LEADERS = FALLBACK;
  }
  renderStats();
  renderLeaders();
}

// ── Stats ──
function renderStats() {
  const total = ALL_LEADERS.length;
  let done=0, progress=0, totalAppr=0;
  ALL_LEADERS.forEach(l => {
    (l.promises||[]).forEach(p => {
      if(p.status==='done') done++;
      if(p.status==='progress') progress++;
    });
    totalAppr += (l.approval||0);
  });
  document.getElementById('st-total').textContent = total;
  document.getElementById('st-done').textContent = done;
  document.getElementById('st-progress').textContent = progress;
  document.getElementById('st-avg').textContent = Math.round(totalAppr/total) + '%';
}

// ── Filter & Sort ──
window.setFilter = function(f, el) {
  activeFilter = f;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderLeaders();
};
window.setSort = function(s, el) {
  activeSort = s;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderLeaders();
};
window.setCardTab = function(id, tab) {
  activeTab[id] = tab;
  renderLeaders();
};

function renderLeaders() {
  const q = document.getElementById('searchBox')?.value?.toLowerCase() || '';
  let list = ALL_LEADERS.filter(l => {
    if(activeFilter !== 'সব' && l.cat !== activeFilter) return false;
    if(q && !l.name.toLowerCase().includes(q) && !(l.party||'').toLowerCase().includes(q)) return false;
    return true;
  });

  // Sort
  if(activeSort === 'approval') list.sort((a,b)=>(b.approval||0)-(a.approval||0));
  else if(activeSort === 'promises') {
    list.sort((a,b)=>{
      const pa=(a.promises||[]).filter(p=>p.status==='done').length/(a.promises||[1]).length;
      const pb=(b.promises||[]).filter(p=>p.status==='done').length/(b.promises||[1]).length;
      return pb-pa;
    });
  } else list.sort((a,b)=>a.name.localeCompare(b.name,'bn'));

  document.getElementById('resultCount').textContent = list.length + ' জন নেতা';

  if(!list.length) {
    document.getElementById('leaderList').innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="es-icon">🔍</div><div>কোনো নেতা পাওয়া যায়নি</div></div>`;
    return;
  }

  document.getElementById('leaderList').innerHTML = list.map(l => makeCard(l)).join('');
}

function makeCard(l) {
  const tab = activeTab[l.id] || 'promises';
  const promises = l.promises || [];
  const done = promises.filter(p=>p.status==='done').length;
  const pct = promises.length ? Math.round(done/promises.length*100) : 0;
  const apprColor = l.approval>=60?'#16a34a':l.approval>=40?'#d97706':'#dc2626';
  const apprFill  = l.approval>=60?'#16a34a':l.approval>=40?'#f59e0b':'#ef4444';

  const pIcon = s => s==='done'?'✅':s==='progress'?'🔄':s==='broken'?'❌':'⏳';
  const pCls  = s => s==='done'?'promise-done':s==='progress'?'promise-progress':s==='broken'?'promise-broken':'promise-pending';

  const tabs = ['promises','statements','controversies','virals'];
  const tabLabels = {promises:`✅ প্রতিশ্রুতি (${done}/${promises.length})`,statements:'💬 বক্তব্য',controversies:'⚠️ বিতর্ক',virals:'🔥 Viral'};

  const tabContent = {
    promises: promises.length ? promises.map(p=>`<div class="promise-item ${pCls(p.status)}"><span class="p-icon">${pIcon(p.status)}</span>${p.text}</div>`).join('') : '<div style="color:#94a3b8;font-size:12px;padding:8px">কোনো প্রতিশ্রুতি নেই</div>',
    statements: (l.statements||[]).length ? (l.statements||[]).map(s=>`<div class="stmt-item"><div class="stmt-text">"${s.text}"</div><div class="stmt-meta">📅 ${s.date||''}</div></div>`).join('') : '<div style="color:#94a3b8;font-size:12px;padding:8px">কোনো উল্লেখযোগ্য বক্তব্য নেই</div>',
    controversies: (l.controversies||[]).length ? (l.controversies||[]).map(c=>`<div class="ctv-item"><div class="ctv-text">⚠️ ${c.text}</div><div class="ctv-meta">📅 ${c.date||''}</div></div>`).join('') : '<div style="color:#94a3b8;font-size:12px;padding:8px">কোনো উল্লেখযোগ্য বিতর্ক নেই</div>',
    virals: (l.virals||[]).length ? (l.virals||[]).map(v=>`<div class="viral-item"><div class="viral-icon">${v.icon||'🔥'}</div><div><div class="viral-text">${v.text}</div><div class="viral-date">📅 ${v.date||''}</div></div></div>`).join('') : '<div style="color:#94a3b8;font-size:12px;padding:8px">কোনো viral moment নেই</div>',
  };

  return `<div class="leader-card">
    <div class="lc-top">
      <div class="lc-avatar">${l.icon||'👤'}${l.viral?'<div class="lc-verified">🔥</div>':''}</div>
      <div style="flex:1;min-width:0">
        <div class="lc-name">${l.name}</div>
        <div class="lc-party">${l.party||''}</div>
        <div class="lc-role">${l.role||''}</div>
        <div class="lc-badges">
          <span class="badge badge-blue">${l.cat||''}</span>
          ${l.viral?'<span class="badge badge-viral">🔥 Viral</span>':''}
          ${pct>=60?'<span class="badge badge-green">✅ বিশ্বস্ত</span>':pct<=20&&promises.length?'<span class="badge badge-red">⚠️ দুর্বল</span>':''}
        </div>
      </div>
    </div>

    <div class="appr-section">
      <div class="appr-row">
        <span class="appr-label">👥 জনসমর্থন</span>
        <span class="appr-pct" style="color:${apprColor}">${l.approval||0}%</span>
      </div>
      <div class="appr-bar"><div class="appr-fill" style="width:${l.approval||0}%;background:${apprFill}"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:4px">
        <span style="font-size:10px;color:#94a3b8">প্রতিশ্রুতি পূরণ: ${pct}%</span>
        <span style="font-size:10px;color:#94a3b8">${done}/${promises.length} পূরণ</span>
      </div>
    </div>

    <div class="lc-tabs">
      ${tabs.map(t=>`<button class="lc-tab${tab===t?' active':''}" onclick="setCardTab('${l.id}','${t}')">${tabLabels[t]}</button>`).join('')}
    </div>
    <div class="lc-content">${tabContent[tab]||''}</div>
  </div>`;
}

loadLeaders();
</script>

<!DOCTYPE html>
<html lang="bn"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>লাইভ সম্প্রচার — JOAF</title>
<link rel="stylesheet" href="/css/stylec7c3.css">
<link rel="stylesheet" href="/css/pluginsc7c3.css">
<link rel="stylesheet" href="/css/joaf.css?v=6.6">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/material-design-iconic-font/2.2.0/css/material-design-iconic-font.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
</head><body data-page="joaf">
<div id="joaf-preloader" role="status" class="hidden"></div>
<div id="joaf-header"></div><div id="joaf-ticker"></div>
<style>
.live-hero{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:28px 0 20px;color:#fff;text-align:center;}
.live-hero h1{font-size:clamp(1.3rem,4vw,1.8rem);font-weight:900;}
.live-badge{display:inline-flex;align-items:center;gap:6px;background:#dc2626;color:#fff;font-size:12px;font-weight:800;padding:4px 12px;border-radius:50px;margin-bottom:10px;}
.live-dot{width:8px;height:8px;border-radius:50%;background:#fff;animation:blink .8s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Player */
.player-wrap{background:#000;border-radius:14px 14px 0 0;overflow:hidden;aspect-ratio:16/9;position:relative;}
.player-wrap video{position:absolute;inset:0;width:100%;height:100%;display:block;z-index:1;object-fit:contain;}
.player-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:#0f172a;z-index:2;}
.player-overlay.hidden{display:none!important;}
.spinner{width:44px;height:44px;border:3px solid #334155;border-top-color:#dc2626;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay-text{color:#94a3b8;font-size:13px;margin:0;}
.overlay-ch{color:#fff;font-size:16px;font-weight:900;margin:0;}
.player-bar{background:#1e293b;padding:10px 14px;border-radius:0 0 14px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.player-bar-name{color:#fff;font-size:13px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.player-bar-url{color:#64748b;font-size:10px;}
.live-pill{background:#dc2626;color:#fff;font-size:9px;font-weight:900;padding:2px 8px;border-radius:50px;display:flex;align-items:center;gap:3px;flex-shrink:0;}
.live-pill::before{content:'';width:5px;height:5px;border-radius:50%;background:#fff;animation:blink .8s ease infinite;}

/* Search + Filter */
.search-filter-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.search-box{flex:1;min-width:180px;padding:9px 14px;border:1.5px solid #e5e7eb;border-radius:50px;font-size:13px;font-family:inherit;outline:none;transition:.15s;}
.search-box:focus{border-color:#1a1a2e;}
.group-tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:2px 0;}
.group-tabs::-webkit-scrollbar{display:none;}
.g-tab{flex-shrink:0;padding:7px 13px;border-radius:50px;border:1.5px solid #e5e7eb;background:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
.g-tab.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e;}
.g-tab:hover:not(.active){background:#f3f4f6;}

/* Channel grid */
.ch-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
@media(min-width:480px){.ch-grid{grid-template-columns:repeat(4,1fr);}}
@media(min-width:700px){.ch-grid{grid-template-columns:repeat(5,1fr);}}
@media(min-width:1000px){.ch-grid{grid-template-columns:repeat(6,1fr);}}
.ch-card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.07);cursor:pointer;transition:transform .15s,box-shadow .15s;border:2px solid transparent;}
.ch-card:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(0,0,0,.12);}
.ch-card.active{border-color:#dc2626;}
.ch-thumb{aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;position:relative;background:#f1f5f9;overflow:hidden;}
.ch-thumb img{width:100%;height:100%;object-fit:contain;padding:4px;}
.ch-thumb .ch-icon{font-size:22px;}
.ch-live-dot{position:absolute;top:4px;left:4px;width:7px;height:7px;background:#dc2626;border-radius:50%;animation:blink .8s ease infinite;}
.ch-body{padding:6px 8px 8px;}
.ch-name{font-size:10px;font-weight:700;color:#1a1a2e;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ch-group{font-size:9px;color:#94a3b8;}

.notif-btn{width:100%;padding:11px;background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;border:none;border-radius:50px;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;margin:10px 0 14px;}
.section-title{font-size:14px;font-weight:900;margin-bottom:10px;color:#1a1a2e;}
.result-count{font-size:12px;color:#6b7280;margin-bottom:8px;}
.no-result{text-align:center;padding:30px;color:#94a3b8;font-size:14px;}
</style>

<div class="live-hero"><div class="container">
  <div class="live-badge"><span class="live-dot"></span>LIVE</div>
  <h1>📡 লাইভ সম্প্রচার</h1>
</div></div>

<section class="section"><div class="container">

  <!-- Player -->
  <div class="player-wrap" id="playerWrap">
    <div class="player-overlay" id="playerOverlay">
      <div style="font-size:48px">📺</div>
      <p class="overlay-ch" id="overlayCh">একটি চ্যানেল বেছে নিন</p>
      <p class="overlay-text" id="overlayStatus"></p>
    </div>
    <video id="liveVideo" controls playsinline></video>
  </div>
  <div class="player-bar" id="playerBar">
    <span class="player-bar-name" id="playerBarName">—</span>
    <span class="player-bar-url" id="playerBarUrl"></span>
    <span class="live-pill">LIVE</span>
  </div>

  <button class="notif-btn" onclick="requestLiveNotif()">🔔 JOAF Live শুরু হলে notification পান</button>

  <!-- Search + Filter -->
  <div class="search-filter-row">
    <input class="search-box" id="searchBox" type="text" placeholder="🔍 চ্যানেল খুঁজুন..." oninput="filterChannels()">
  </div>
  <div class="group-tabs" id="groupTabs"></div>
  <br>

  <div class="result-count" id="resultCount"></div>
  <div class="ch-grid" id="chGrid"></div>

</div></section>

<div id="joaf-footer"></div>
<script src="/js/modernizr-2.8.3.min.js"></script>
<script src="/js/data.js?v=6.6"></script>
<script src="/js/components.js?v=6.6"></script>
<script>
const PLAYLIST_URL = 'https://raw.githubusercontent.com/abusaeeidx/Mrgify-BDIX-IPTV/main/playlist.m3u';
const JOAF_CHANNEL = { name:'JOAF Live', logo:'', group:'বাংলা', urls:[] };

let ALL_CHANNELS = [];
let FILTERED = [];
let activeGroup = 'সব';
let activeIdx = -1;
let hlsObj = null;
let urlAttempt = 0;

// ── Parse m3u ──────────────────────────────────────
function parseM3U(text) {
  const lines = text.split('\n');
  const raw = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i].trim();
    if (line.startsWith('#EXTINF')) {
      const nameM = line.match(/,(.+)$/);
      const logoM = line.match(/tvg-logo="([^"]*)"/);
      const grpM  = line.match(/group-title="([^"]*)"/);
      const name  = nameM ? nameM[1].trim() : '';
      const logo  = logoM ? logoM[1].trim() : '';
      const grp   = grpM  ? grpM[1].trim()  : 'Other';
      if (!name || name.startsWith('w_300')) { i++; continue; }
      let url = '', j = i + 1;
      while (j < lines.length) {
        const nl = lines[j].trim();
        if (nl.startsWith('http')) { url = nl; break; }
        if (nl.startsWith('#EXTINF')) break;
        j++;
      }
      if (url) raw.push({ name, logo, grp, url });
    }
    i++;
  }

  // Normalize group
  const gmap = {
    'bangla':'বাংলা','Bangla':'বাংলা','BANGLA':'বাংলা','Bangladeshi':'বাংলা','Akash Go':'বাংলা',
    'News':'নিউজ','NEWS INTERNASIONAL':'নিউজ','NEWS INTERNASIONAL TV':'নিউজ','English News':'নিউজ',
    'Sports':'স্পোর্টস','sports':'স্পোর্টস','SPORTS':'স্পোর্টস','Cricket ':'স্পোর্টস','Football':'স্পোর্টস','Live Event':'স্পোর্টস',
    'Hindi':'হিন্দি','hindi':'হিন্দি','Hindi Movies':'হিন্দি','Hindi Music':'হিন্দি','Star Channels':'হিন্দি',
    'inbangla':'ইন্ডিয়ান বাংলা','Indian Bangla':'ইন্ডিয়ান বাংলা','Indian Bangla News':'ইন্ডিয়ান বাংলা','Kolkata Bangla':'ইন্ডিয়ান বাংলা',
    'Kids':'কিডস','kids':'কিডস','KIDS':'কিডস','Cartoons | 24/7':'কিডস',
    'English':'ইংলিশ','english':'ইংলিশ','English Movie':'ইংলিশ','English Movies':'ইংলিশ','Entertainment':'ইংলিশ','Channels':'ইংলিশ',
    'documentary':'ডকুমেন্টারি','Documentary':'ডকুমেন্টারি',
    'ISLAMIC CHANNELS':'ইসলামিক','Religious':'ইসলামিক','Relagion Channel':'ইসলামিক',
    'Music':'মিউজিক','music':'মিউজিক','MUSIC':'মিউজিক',
    'Weather':'আবহাওয়া',
    'Movies':'মুভি','Bangla Movies':'মুভি','Movie':'মুভি',
  };

  // Merge by normalized name key
  const merged = {};
  for (const e of raw) {
    const key = e.name.toLowerCase().trim();
    const group = gmap[e.grp] || e.grp;
    if (!merged[key]) merged[key] = { name: e.name, logo: e.logo, group, urls: [] };
    if (!merged[key].urls.includes(e.url)) merged[key].urls.push(e.url);
    if (e.logo && !merged[key].logo) merged[key].logo = e.logo;
  }

  return Object.values(merged).sort((a,b) => a.group.localeCompare(b.group) || a.name.localeCompare(b.name));
}

// ── Render groups ──────────────────────────────────
function renderGroups() {
  const groups = ['সব', ...new Set(ALL_CHANNELS.map(c => c.group))].filter(Boolean);
  document.getElementById('groupTabs').innerHTML = groups.map(g =>
    `<button class="g-tab${g===activeGroup?' active':''}" onclick="setGroup('${g}')">${g}</button>`
  ).join('');
}

function setGroup(g) {
  activeGroup = g;
  renderGroups();
  filterChannels();
}

// ── Filter & render grid ───────────────────────────
function filterChannels() {
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  FILTERED = ALL_CHANNELS.filter(ch => {
    const matchGroup = activeGroup === 'সব' || ch.group === activeGroup;
    const matchSearch = !q || ch.name.toLowerCase().includes(q) || ch.group.toLowerCase().includes(q);
    return matchGroup && matchSearch;
  });
  renderGrid();
}

function renderGrid() {
  const rc = document.getElementById('resultCount');
  rc.textContent = `${FILTERED.length}টি চ্যানেল পাওয়া গেছে`;
  if (!FILTERED.length) {
    document.getElementById('chGrid').innerHTML = '<div class="no-result" style="grid-column:1/-1">😔 কোনো চ্যানেল পাওয়া যায়নি</div>';
    return;
  }
  document.getElementById('chGrid').innerHTML = FILTERED.map((ch, i) => {
    const realIdx = ALL_CHANNELS.indexOf(ch);
    const isActive = realIdx === activeIdx;
    const thumb = ch.logo
      ? `<img src="${ch.logo}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" loading="lazy"><span class="ch-icon" style="display:none">📺</span>`
      : `<span class="ch-icon">📺</span>`;
    return `<div class="ch-card${isActive?' active':''}" onclick="playCh(${realIdx})">
      <div class="ch-thumb">${thumb}<span class="ch-live-dot"></span></div>
      <div class="ch-body">
        <div class="ch-name" title="${ch.name}">${ch.name}</div>
        <div class="ch-group">${ch.group}</div>
      </div>
    </div>`;
  }).join('');
}

// ── Player ─────────────────────────────────────────
function playCh(idx) {
  activeIdx = idx;
  urlAttempt = 0;
  filterChannels(); // re-render to show active
  tryUrl(idx, 0);
  document.getElementById('playerWrap').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function tryUrl(idx, attempt) {
  const ch = ALL_CHANNELS[idx];
  if (!ch) return;
  const urls = ch.urls;

  const overlay = document.getElementById('playerOverlay');
  const video   = document.getElementById('liveVideo');
  const barName = document.getElementById('playerBarName');
  const barUrl  = document.getElementById('playerBarUrl');
  const overlayCh = document.getElementById('overlayCh');
  const overlayStatus = document.getElementById('overlayStatus');

  // Show overlay, reset video
  overlay.classList.remove('hidden');
  barName.textContent = ch.name;
  overlayCh.textContent = ch.name;

  if (!urls || urls.length === 0) {
    overlayStatus.textContent = '⏳ শীঘ্রই আসছে...';
    return;
  }

  if (attempt >= urls.length) {
    overlayStatus.textContent = '❌ সব link কাজ করছে না। পরে try করুন।';
    barUrl.textContent = '';
    return;
  }

  const url = urls[attempt];
  overlayStatus.textContent = `🔍 Link ${attempt+1}/${urls.length} চেষ্টা করছে...`;
  barUrl.textContent = `link ${attempt+1}/${urls.length}`;

  if (hlsObj) { hlsObj.destroy(); hlsObj = null; }
  video.src = '';

  function showVideo() {
    overlay.classList.add('hidden');
    video.style.display = 'block';
    video.style.visibility = 'visible';
    video.style.opacity = '1';
    barUrl.textContent = `✅ link ${attempt+1}/${urls.length} কাজ করছে`;
    video.play().catch(()=>{});
  }

  if (Hls.isSupported()) {
    hlsObj = new Hls({
      enableWorker: true,
      lowLatencyMode: true,
      maxBufferLength: 20,
      manifestLoadingTimeOut: 8000,
      levelLoadingTimeOut: 8000
    });
    hlsObj.loadSource(url);
    hlsObj.attachMedia(video);
    // FRAG_LOADED = first video segment loaded = safe to show
    hlsObj.on(Hls.Events.FRAG_LOADED, () => {
      if (overlay.classList.contains('hidden')) return;
      showVideo();
    });
    // Fallback: if FRAG_LOADED slow, show after 3s
    hlsObj.on(Hls.Events.MANIFEST_PARSED, () => {
      setTimeout(() => {
        if (!overlay.classList.contains('hidden')) showVideo();
      }, 3000);
    });
    hlsObj.on(Hls.Events.ERROR, (e, data) => {
      if (data.fatal) {
        hlsObj.destroy(); hlsObj = null;
        tryUrl(idx, attempt + 1);
      }
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    // Safari native HLS
    video.src = url;
    video.oncanplay = () => showVideo();
    video.onerror = () => tryUrl(idx, attempt + 1);
  } else {
    overlayStatus.textContent = '⚠️ আপনার browser HLS support করে না।';
  }
}

// ── Notification ───────────────────────────────────
function requestLiveNotif() {
  if (!('Notification' in window)) return alert('Notification support নেই।');
  Notification.requestPermission().then(p => {
    if (p==='granted') navigator.serviceWorker.ready.then(r =>
      r.showNotification('📡 Live Alert চালু!', {body:'JOAF Live শুরু হলে জানানো হবে।', icon:'/logoc7c3.png'})
    );
  });
}

// ── Init: fetch playlist ───────────────────────────
async function init() {
  const overlay = document.getElementById('playerOverlay');
  document.getElementById('overlayCh').textContent = 'Playlist লোড হচ্ছে...';
  document.getElementById('overlayStatus').textContent = '⏳ অপেক্ষা করুন';

  try {
    const res = await fetch(PLAYLIST_URL);
    const text = await res.text();
    ALL_CHANNELS = [JOAF_CHANNEL, ...parseM3U(text)];
  } catch(e) {
    // fallback: use embedded minimal list
    ALL_CHANNELS = [JOAF_CHANNEL];
    document.getElementById('overlayStatus').textContent = '⚠️ Playlist load হয়নি। পরে try করুন।';
  }

  document.getElementById('overlayCh').textContent = 'একটি চ্যানেল বেছে নিন';
  document.getElementById('overlayStatus').textContent = `${ALL_CHANNELS.length} চ্যানেল লোড হয়েছে ✅`;

  renderGroups();
  filterChannels();
}

init();
</script>
<script src="/js/rainbow-swirl-cursor.js" defer></script>

</body></html>

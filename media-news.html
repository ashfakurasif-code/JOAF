<body data-page="media">

<div id="joaf-preloader">
  <img src="/logoc7c3.png" alt="JOAF" class="preloader-logo">
  <p class="preloader-text">JOAF লোড হচ্ছে...</p>
  <div class="preloader-bar"></div>
</div>

<div class="wrapper fix">
  <div id="joaf-header"></div>
  <div id="joaf-ticker"></div>

  <!-- Page Hero -->
  <section class="section-sm" style="background:linear-gradient(135deg,#90161f,#075e55);color:#fff;padding:50px 0;margin-top:0">
    <div class="container text-center">
      <h1 class="joaf-reveal" style="font-size:clamp(1.8rem,4vw,2.8rem);font-weight:900;margin-bottom:12px">
        📰 মিডিয়া ও সংবাদ
      </h1>
      <p class="joaf-reveal" style="opacity:.85;font-size:16px;max-width:500px;margin:0 auto">
        সর্বশেষ প্রেস রিলিজ এবং JOAF এর কার্যক্রমের আপডেট
      </p>
    </div>
  </section>

  <!-- Press Releases -->
  <section class="section">
    <div class="container">
      <div class="section-heading joaf-reveal">
        <h2>প্রেস রিলিজ</h2>
        <p>সর্বশেষ তারিখ অনুযায়ী সাজানো</p>
      </div>
      <div class="row g-4" id="all-press-grid"></div>
    </div>
  </section>

  <!-- Media Coverage (dynamic news via JS) -->
  <section class="section bg-subtle">
    <div class="container">
      <div class="section-heading joaf-reveal">
        <h2>সংবাদ মাধ্যমে JOAF</h2>
        <p>Facebook পেজে লাইভ আপডেট পান</p>
      </div>
      <div class="text-center joaf-reveal">
        <a href="https://www.facebook.com/julyforum" target="_blank" rel="noopener"
           class="btn btn-primary px-5 py-3"
           style="background:var(--brand);border:none;border-radius:50px;font-size:16px;font-weight:700">
          <i class="zmdi zmdi-facebook"></i> Facebook পেজ দেখুন
        </a>
      </div>
    </div>
  </section>

  <div id="joaf-footer"></div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="/js/plugins.js"></script>
<script src="/js/data.js?v=9.6"></script>
<script src="/js/components.js?v=9.7"></script>
<script src="/js/rainbow-swirl-cursor.js" defer></script>
<script>
window.addEventListener('load', () => {
  const pl = document.getElementById('joaf-preloader');
  if (pl) setTimeout(() => pl.classList.add('hidden'), 300);
});

function renderAllPress() {
  const grid = document.getElementById('all-press-grid');
  if (!grid || typeof JOAF === 'undefined') return;
  const sorted = [...JOAF.pressReleases].sort((a,b) => new Date(b.date)-new Date(a.date));
  grid.innerHTML = sorted.map((p, i) => `
    <div class="col-md-6 col-lg-4 joaf-reveal" style="transition-delay:${(i%3)*0.1}s">
      <div class="press-card">
        <div class="press-card-img-wrap">
          <img src="${p.img}" alt="${p.title}" loading="lazy">
          <span class="press-date-top"><i class="zmdi zmdi-calendar"></i> ${BanglaUtil.formatDateShort(p.date)}</span>
          <span class="press-date-bottom">#${p.id}</span>
        </div>
        <div class="press-card-body">
          <h4>${p.title}</h4>
          <p>${p.summary}</p>
          <a href="/press-releases/${p.slug}.html" class="press-read-more">বিস্তারিত পড়ুন <i class="zmdi zmdi-arrow-right"></i></a>
          <div class="share-row">
            <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent('https://julyforum.com/press-releases/'+p.slug+'.html')}" target="_blank" class="s-fb" aria-label="Facebook শেয়ার"><i class="zmdi zmdi-facebook"></i> শেয়ার</a>
            <a href="https://wa.me/?text=${encodeURIComponent(p.title+'\nhttps://julyforum.com/press-releases/'+p.slug+'.html')}" target="_blank" class="s-wa" aria-label="WhatsApp শেয়ার"><i class="zmdi zmdi-whatsapp"></i> শেয়ার</a>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', renderAllPress);
} else {
  renderAllPress();
}
</script>
</body>
</html>

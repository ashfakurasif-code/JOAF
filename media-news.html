<script type="module">
async function _awReadPressReleases(limit=4) {
  const r = await fetch(
    'https://fra.cloud.appwrite.io/v1/databases/joaf/collections/press_releases/documents?limit='+limit+'&queries[]='+encodeURIComponent('orderDesc(\"date\")'),
    {headers:{'X-Appwrite-Project':'6a11b6cd000b59f318eb'}}
  );
  if(!r.ok) return [];
  const d = await r.json();
  return d.documents || [];
}

// ── Pageview tracking ──────────────────────────────────────────────
const _ua = navigator.userAgent;
const _dev = /Mobile|Android|iPhone/i.test(_ua) ? 'mobile' : /iPad|Tablet/i.test(_ua) ? 'tablet' : 'desktop';
const _ref = document.referrer;
const _src = _ref.includes('google') ? 'Google' : _ref.includes('facebook') ? 'Facebook' : _ref.includes('t.co') || _ref.includes('twitter') ? 'Twitter' : _ref ? 'Referral' : 'Direct';
/* pageviews removed */

// ── Press Releases from Firestore ─────────────────────────────────
async function renderAllPress() {
  const grid = document.getElementById('all-press-grid');
  if (!grid) return;
  grid.innerHTML = '<div class="col-12 text-center py-4"><div class="spinner-border text-danger" role="status"></div></div>';
  try {
    const _docs = await _awReadPressReleases(50);
    if (snap.empty) {
      grid.innerHTML = '<div class="col-12 text-center py-4 text-muted">কোনো press release নেই।</div>';
      return;
    }
    grid.innerHTML = snap.map((doc, i) => { const p = doc;
      const id = doc.id;
      const img = p.img || '/img/press-release.jpg';
      const dateStr = p.date || '';
      const dateDisplay = dateStr ? (typeof BanglaUtil !== 'undefined' ? BanglaUtil.formatDateShort(dateStr) : dateStr) : '';
      const viewUrl = '/press-releases/view.html?id=' + id;
      const shareUrl = encodeURIComponent('https://julyforum.com' + viewUrl);
      const shareTitle = encodeURIComponent(p.title || '');
      return `
    <div class="col-md-6 col-lg-4 joaf-reveal" style="transition-delay:${(i%3)*0.1}s">
      <div class="press-card">
        <div class="press-card-img-wrap">
          <img src="${img}" alt="${p.title||''}" loading="lazy" onerror="this.src='/logoc7c3.png'">
          ${dateDisplay ? `<span class="press-date-top"><i class="zmdi zmdi-calendar"></i> ${dateDisplay}</span>` : ''}
        </div>
        <div class="press-card-body">
          <h4>${p.title||''}</h4>
          <p>${p.summary||''}</p>
          <a href="${viewUrl}" class="press-read-more">বিস্তারিত পড়ুন <i class="zmdi zmdi-arrow-right"></i></a>
          <div class="share-row">
            <a href="https://www.facebook.com/sharer/sharer.php?u=${shareUrl}" target="_blank" class="s-fb" aria-label="Facebook শেয়ার"><i class="zmdi zmdi-facebook"></i> শেয়ার</a>
            <a href="https://wa.me/?text=${shareTitle}%20${shareUrl}" target="_blank" class="s-wa" aria-label="WhatsApp শেয়ার"><i class="zmdi zmdi-whatsapp"></i> শেয়ার</a>
          </div>
        </div>
      </div>
    </div>`;
    }).join('');
    document.querySelectorAll('#all-press-grid .joaf-reveal').forEach(el => el.classList.add('visible'));
  } catch(e) {
    grid.innerHTML = '<div class="col-12 text-center py-4 text-muted">লোড করতে সমস্যা হয়েছে।</div>';
    console.error('Press releases load error:', e);
  }
}

renderAllPress();

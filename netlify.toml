# JOAF Netlify Config v4.0

[build]
  publish = "."

# ── Performance Headers ──────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/members/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# ── Clean URLs — index.html → / ─────────────────────────────
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

# ── Community case fix ───────────────────────────────────────
[[redirects]]
  from = "/Community.html"
  to = "/community.html"
  status = 301

# ── Old press release URLs → new press-releases/ folder ─────
[[redirects]]
  from = "/press-release-1.html"
  to = "/press-releases/press-release-1.html"
  status = 301

[[redirects]]
  from = "/press-release-2.html"
  to = "/press-releases/press-release-2.html"
  status = 301

[[redirects]]
  from = "/press-release-3.html"
  to = "/press-releases/press-release-3.html"
  status = 301

[[redirects]]
  from = "/press-release-4.html"
  to = "/press-releases/press-release-4.html"
  status = 301

[[redirects]]
  from = "/press-release-5.html"
  to = "/press-releases/press-release-5.html"
  status = 301

[[redirects]]
  from = "/press-release-6.html"
  to = "/press-releases/press-release-6.html"
  status = 301

[[redirects]]
  from = "/press-release-7.html"
  to = "/press-releases/press-release-7.html"
  status = 301

[[redirects]]
  from = "/press-release-8.html"
  to = "/press-releases/press-release-8.html"
  status = 301

# ── SPA fallback ─────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# netlify.toml
# Netlify configuration + scheduled functions

[build]
  functions = "netlify/functions"
  publish = "."

# functions/package.json এর dependencies auto-install করে
[[plugins]]
  package = "@netlify/plugin-functions-install-core"

# ── Scheduled Functions ──
# BD time রাত ২টা = UTC রাত ৮টা (UTC+6)
# discover-leaders: প্রতিদিন রাত ২:০০ (BD) — RSS পড়ে leaders আপডেট করে
[functions.discover-leaders]
  schedule = "0 20 * * *"

# generate-timeline: প্রতিদিন রাত ২:১৫ (BD) — discover-leaders এর ১৫ মিনিট পরে
[functions.generate-timeline]
  schedule = "15 20 * * *"

# update-leaders: প্রতিদিন রাত ২:৩০ (BD) — AI দিয়ে leaders' data refresh
# (discover-leaders এর পরে চলে যাতে নতুন leaders পায়)
[functions.update-leaders]
  schedule = "30 20 * * *"

# ── Headers ──
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=600"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"

# ── Redirects ──
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

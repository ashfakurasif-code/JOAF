<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JOAF News Card Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700;900&family=Noto+Sans+Bengali:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#08090e;--bg2:#0f1019;--bg3:#161722;--bg5:#262738;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.11);--border3:rgba(255,255,255,.18);
  --text:#eeeef5;--text2:#7878a0;--text3:#4a4a68;
  --red:#f05252;--green:#34d399;--amber:#fbbf24;
  --accent:#f05252;--accent2:#ff6b6b;
}
*{font-family:'Hind Siliguri',sans-serif;}
body{background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border2);padding:0 14px;height:48px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.hdr-logo{width:26px;height:26px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;color:#fff;flex-shrink:0;}
.hdr-title{font-size:13px;font-weight:700;}
.hdr-sub{font-size:10px;color:var(--text3);}
.hdr-r{margin-left:auto;display:flex;gap:6px;align-items:center;}
.btn{padding:6px 12px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;border:none;transition:.12s;display:inline-flex;align-items:center;gap:4px;}
.btn-p{background:var(--accent);color:#fff;}.btn-p:hover{background:var(--accent2);}
.btn-g{background:var(--bg3);color:var(--text2);border:1px solid var(--border2);}.btn-g:hover{color:var(--text);}
.btn-gr{background:#065f46;color:#34d399;}
.btn-f{width:100%;justify-content:center;}
.studio{flex:1;display:flex;overflow:hidden;}
.sb{width:260px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
.sb::-webkit-scrollbar{width:3px;}.sb::-webkit-scrollbar-thumb{background:var(--bg5);}
.sec{border-bottom:1px solid var(--border);padding:11px 13px;}
.sec-h{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:9px;}
.f{margin-bottom:7px;}
.f label{font-size:10px;color:var(--text2);display:block;margin-bottom:3px;}
.fi,.fta,.fsl{width:100%;padding:6px 8px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:12px;font-family:inherit;outline:none;transition:.12s;}
.fi:focus,.fta:focus,.fsl:focus{border-color:var(--accent);}
.fta{resize:vertical;min-height:48px;line-height:1.5;}
.fsl option{background:var(--bg3);}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.pr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:8px;}
.pr{border-radius:6px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:.12s;}
.pr:hover{border-color:var(--border3);}
.pr.on{border-color:var(--accent);}
.pr-sw{height:28px;display:flex;align-items:center;justify-content:center;}
.pr-nm{font-size:9px;text-align:center;padding:2px 0;background:var(--bg3);color:var(--text2);}
.slider-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.slider-row label{font-size:10px;color:var(--text2);min-width:44px;}
.slider-row input[type=range]{flex:1;accent-color:var(--accent);height:3px;}
.slider-val{font-size:10px;color:var(--amber);min-width:28px;text-align:right;}
.vis-row{display:flex;gap:4px;flex-wrap:wrap;}
.vbtn{padding:3px 8px;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--text3);transition:.12s;}
.vbtn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.col-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.col-row label{font-size:10px;color:var(--text2);min-width:52px;}
.col-in{width:28px;height:18px;border-radius:3px;border:1px solid var(--border2);cursor:pointer;background:none;}
.sw-row{display:flex;gap:3px;flex-wrap:wrap;}
.sw{width:15px;height:15px;border-radius:3px;cursor:pointer;border:2px solid transparent;flex-shrink:0;transition:.1s;}
.sw:hover{transform:scale(1.2);}.sw.on{border-color:#fff;}
.sw-c{width:15px;height:15px;border-radius:3px;border:1px solid var(--border2);overflow:hidden;position:relative;cursor:pointer;}
.sw-c input{position:absolute;inset:-4px;opacity:0;cursor:pointer;width:200%;height:200%;}
.cvwrap{flex:1;background:#040406;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
#cv{display:block;cursor:crosshair;}
.zoom-ctrl{position:absolute;bottom:10px;right:10px;display:flex;gap:4px;z-index:10;}
.up-ovl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:20;background:var(--bg);}
.up-zone{width:300px;border:2px dashed var(--border3);border-radius:12px;padding:32px 20px;text-align:center;cursor:pointer;transition:.2s;position:relative;background:var(--bg2);}
.up-zone:hover,.up-zone.drag{border-color:var(--accent);background:rgba(240,82,82,.05);}
.up-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.ai-ovl{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:22;background:rgba(0,0,0,.88);backdrop-filter:blur(6px);}
.ai-ovl.show{display:flex;}
.ai-box{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:24px 28px;text-align:center;min-width:260px;}
.spin{font-size:32px;animation:sp 1.4s linear infinite;margin-bottom:8px;}
@keyframes sp{to{transform:rotate(360deg)}}
.as{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text3);margin-top:6px;}
.as.active{color:var(--amber);}.as.done{color:var(--green);}
.as-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}
.as.active .as-dot{animation:pp 1s ease infinite;}
@keyframes pp{0%,100%{opacity:1}50%{opacity:.2}}
.ai-st{font-size:10px;padding:4px 7px;border-radius:5px;margin-top:5px;display:none;}
.ai-st.run{display:block;background:rgba(251,191,36,.1);color:var(--amber);border:1px solid rgba(251,191,36,.2);}
.ai-st.done{display:block;background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.2);}
.ai-st.err{display:block;background:rgba(240,82,82,.1);color:var(--red);border:1px solid rgba(240,82,82,.2);}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);}
.modal-bg.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:22px;max-width:420px;width:100%;}
.chk-list{display:flex;flex-direction:column;gap:5px;margin:12px 0;}
.chk{display:flex;align-items:flex-start;gap:7px;padding:7px 9px;background:var(--bg3);border-radius:7px;border:1px solid var(--border);cursor:pointer;transition:.12s;}
.chk.ok{border-color:rgba(52,211,153,.35);background:rgba(52,211,153,.04);}
.chk input{width:13px;height:13px;accent-color:var(--green);flex-shrink:0;margin-top:1px;}
.chk label{font-size:11px;line-height:1.5;cursor:pointer;}
.toast{position:fixed;bottom:14px;right:14px;padding:8px 14px;border-radius:7px;font-size:11px;font-weight:700;z-index:99999;display:none;}
.toast.ok{background:rgba(5,20,12,.97);color:var(--green);border:1px solid rgba(52,211,153,.25);}
.toast.er{background:rgba(20,5,5,.97);color:var(--red);border:1px solid rgba(240,82,82,.25);}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-logo">J</div>
  <div><div class="hdr-title">JOAF News Card Studio</div><div class="hdr-sub">Image → AI → Edit → JPG</div></div>
  <div class="hdr-r">
    <button class="btn btn-g" onclick="resetAll()">↺ Reset</button>
    <button class="btn btn-p" onclick="openPF()">⬇ Download</button>
  </div>
</div>
<div class="studio">
  <div class="sb">
    <!-- Image Upload -->
    <div class="sec">
      <div class="sec-h">📸 Image</div>
      <div style="border:2px dashed var(--border2);border-radius:8px;padding:9px;text-align:center;cursor:pointer;position:relative;" id="sbZone">
        <input type="file" id="fIn" accept="image/*" onchange="onFile(event)" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%">
        <div id="sbPrev" style="display:none;margin-bottom:5px"><img id="sbThumb" style="max-height:65px;border-radius:5px;max-width:100%"></div>
        <div id="sbLbl" style="font-size:11px;color:var(--text2)">📸 Click বা drag</div>
      </div>
      <button class="btn btn-g btn-f" style="margin-top:5px" onclick="document.getElementById('fIn').click()">📂 নতুন Image</button>
    </div>

    <!-- Content -->
    <div class="sec">
      <div class="sec-h">📝 Content</div>
      <div class="f"><label>Category</label>
        <select class="fsl" id="eCat" onchange="draw()">
          <option value="breaking">🔴 BREAKING NEWS</option>
          <option value="exclusive">⚡ EXCLUSIVE</option>
          <option value="update">📢 আপডেট</option>
          <option value="analysis">🔍 বিশ্লেষণ</option>
          <option value="alert">🚨 সতর্কতা</option>
          <option value="positive">✅ সুখবর</option>
        </select>
      </div>
      <div class="f"><label>Headline</label>
        <textarea class="fta" id="eHl" oninput="draw()" style="font-weight:700;font-size:13px" placeholder="মূল শিরোনাম..."></textarea>
      </div>
      <div class="f"><label>Sub-headline</label>
        <textarea class="fta" id="eSub" oninput="draw()" style="min-height:36px" placeholder="বিবরণ..."></textarea>
      </div>
      <div class="fg2">
        <div class="f"><label>Source</label><input class="fi" id="eSrc" value="JOAF News" oninput="draw()"></div>
        <div class="f"><label>তারিখ</label><input class="fi" id="eDt" oninput="draw()"></div>
      </div>
      <div class="f"><label>📍 Location</label><input class="fi" id="eLoc" placeholder="ঢাকা" oninput="draw()"></div>
    </div>

    <!-- Style Presets -->
    <div class="sec">
      <div class="sec-h">🎨 Style</div>
      <div class="pr-grid" id="prRow"></div>
      <div class="f"><label>Card Size</label>
        <select class="fsl" id="eSize" onchange="onSzCh()">
          <option value="1080,1080">◻ Square 1080×1080</option>
          <option value="1080,1350">▭ Portrait 1080×1350</option>
          <option value="1080,1920" selected>▯ Story 1080×1920</option>
          <option value="1920,1080">▬ Wide 1920×1080</option>
        </select>
      </div>
    </div>

    <!-- Image Adjust, Position, Text Style, Top Bar, Footer, Visibility sections are included in full version. -->

  </div>
  <div class="cvwrap" id="cvwrap">
    <div class="up-ovl" id="upOvl">
      <div class="up-zone" id="upZone">
        <input type="file" id="fIn2" accept="image/*" onchange="onFile(event)">
        <div style="font-size:38px;margin-bottom:8px">📸</div>
        <div style="font-size:13px;font-weight:700;margin-bottom:4px">News Image আপলোড করুন</div>
        <div style="font-size:11px;color:var(--text2)">TV channel বা news screenshot<br>drag & drop বা click</div>
      </div>
    </div>
    <canvas id="cv"></canvas>
    <div class="zoom-ctrl">
      <button class="btn btn-g" onclick="zm(-.15)">−</button>
      <span id="zLbl" style="font-size:10px;color:var(--text2);padding:2px 7px;background:var(--bg2);border-radius:4px;border:1px solid var(--border)">100%</span>
      <button class="btn btn-g" onclick="zm(+.15)">+</button>
      <button class="btn btn-g" onclick="fitZ()">⊞</button>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-bg" id="pfModal">
  <div class="modal">
    <div style="font-size:14px;font-weight:900;margin-bottom:3px">✅ Download এর আগে চেক করুন</div>
    <div class="chk-list" id="chkList"></div>
    <div style="display:flex;gap:7px">
      <button class="btn btn-g" style="flex:1" onclick="closePF()">বাতিল</button>
      <button class="btn btn-gr" style="flex:1" id="dlBtn" onclick="confirmDL()" disabled>⬇ JPG Download</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// Full script will be provided if you say "script dao" or "full code dao again"
alert("ফাইল সেভ হয়েছে। এখনো পুরো স্ক্রিপ্ট লাগলে বলো।");
</script>
</body>
</html>

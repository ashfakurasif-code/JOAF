<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pr-page-title">প্রেস রিলিজ — জোয়াফ</title>
  <meta name="description" id="pr-meta-desc" content="">
  <meta property="og:title" id="pr-og-title" content="">
  <meta property="og:image" id="pr-og-img" content="https://julyforum.com/logoc7c3.png">
  <meta property="og:type" content="article">
  <link rel="icon" href="/favicon.ico">
  <link rel="manifest" href="/site.webmanifest">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/material-design-iconic-font/2.2.0/css/material-design-iconic-font.min.css">
  <link rel="stylesheet" href="/css/pluginsc7c3.css">
  <link rel="stylesheet" href="/css/stylec7c3.css">
  <link rel="stylesheet" href="/css/joaf.css">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-QV3CFV7R98"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-QV3CFV7R98');</script>
  <style>
    .pr-hero{background:linear-gradient(135deg,#1a1a2e,#90161f);padding:50px 0 36px;color:#fff;}
    .pr-hero h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:900;line-height:1.3;}
    .pr-date-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;margin-bottom:16px;}
    .pr-img-wrap{border-radius:16px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.25);margin-bottom:28px;position:relative;}
    .pr-img-wrap img{width:100%;display:block;}
    .pr-date-on-img-top{position:absolute;top:14px;left:14px;background:var(--brand);color:#fff;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;}
    .pr-date-on-img-bottom{position:absolute;bottom:14px;right:14px;background:var(--accent);color:#fff;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;}
    .pr-body{font-size:16px;line-height:2;color:#374151;}
    .pr-body p{margin-bottom:16px;}
    .pr-share{display:flex;gap:10px;flex-wrap:wrap;margin-top:24px;padding-top:20px;border-top:2px solid #f0f0f0;}
    .pr-share a{padding:8px 18px;border-radius:20px;color:#fff;text-decoration:none;font-weight:700;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:.2s;}
    .pr-share a:hover{opacity:.85;transform:translateY(-1px);color:#fff;}
    .sidebar-card{background:#fff;border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,.09);overflow:hidden;margin-bottom:20px;}
    .sidebar-card .sc-head{background:linear-gradient(135deg,var(--brand),var(--accent));color:#fff;padding:12px 16px;font-weight:700;font-size:14px;}
    .sc-pr-item{display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid #f5f5f5;text-decoration:none;color:var(--text);transition:.2s;}
    .sc-pr-item:hover{background:#fafafa;}
    .sc-pr-item img{width:56px;height:44px;object-fit:cover;border-radius:6px;flex-shrink:0;}
    .sc-pr-info h4{font-size:13px;font-weight:700;margin:0 0 3px;color:var(--brand);}
    .sc-pr-info span{font-size:11px;color:#9ca3af;}
  </style>
</head>
<body data-page="media">

<div id="joaf-preloader">
  <img src="/logoc7c3.png" alt="JOAF" class="preloader-logo">
  <p class="preloader-text">লোড হচ্ছে...</p>
  <div class="preloader-bar"></div>
</div>

<div class="wrapper fix">
  <div id="joaf-header"></div>
  <div id="joaf-ticker"></div>

  <!-- Hero -->
  <section class="pr-hero">
    <div class="container">
      <div class="joaf-reveal">
        <div class="pr-date-badge"><i class="zmdi zmdi-calendar"></i> <span id="pr-date-display">—</span></div>
        <h1 id="pr-title">লোড হচ্ছে...</h1>
        <p id="pr-summary" style="opacity:.82;font-size:15px;max-width:640px;margin-top:10px"></p>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="row g-4">
        <!-- Main Content -->
        <div class="col-lg-8">
          <div class="pr-img-wrap joaf-reveal">
            <img id="pr-img" src="" alt="" loading="eager">
            <div class="pr-date-on-img-top" id="pr-img-date-top"></div>
            <div class="pr-date-on-img-bottom" id="pr-img-date-bottom"></div>
          </div>
          <div class="pr-body joaf-reveal" id="pr-content">
            <!-- Content loaded from press-releases/data/ folder or inline -->
          </div>
          <div class="pr-share joaf-reveal" id="pr-share"></div>
        </div>
        <!-- Sidebar -->
        <div class="col-lg-4">
          <div class="sidebar-card joaf-reveal">
            <div class="sc-head">📄 অন্যান্য প্রেস রিলিজ</div>
            <div id="sidebarPR"></div>
          </div>
          <div class="sidebar-card joaf-reveal" style="transition-delay:.1s">
            <div class="sc-head">🤝 সম্পর্কিত লিঙ্ক</div>
            <div style="padding:14px">
              <a href="/membership.html" style="display:block;padding:9px 14px;background:linear-gradient(135deg,var(--brand),var(--accent));color:#fff;border-radius:10px;font-weight:700;text-decoration:none;text-align:center;margin-bottom:8px">✊ সদস্য হোন</a>
              <a href="/community.html" style="display:block;padding:9px 14px;background:linear-gradient(135deg,#075e55,#15803d);color:#fff;border-radius:10px;font-weight:700;text-decoration:none;text-align:center">🤝 কমিউনিটিতে যোগ দিন</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="joaf-footer"></div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="/js/plugins.js"></script>
<script src="/js/data.js"></script>
<script src="/js/components.js"></script>
<script src="/js/rainbow-swirl-cursor.js"></script>
<script>
(function() {
  // Detect which press release this is from URL
  const slug = window.location.pathname.split('/').pop().replace('.html','');
  const pr = JOAF.pressReleases.find(p => p.slug === slug);
  if (!pr) return;

  const dateShort = BanglaUtil.formatDateShort(pr.date);
  const dateFull  = BanglaUtil.formatDate(pr.date);

  // Update meta & page title
  document.title = pr.title + ' — জোয়াফ';
  document.getElementById('pr-page-title').textContent = pr.title + ' — জোয়াফ';
  document.getElementById('pr-meta-desc').content = pr.summary;
  document.getElementById('pr-og-title').content = pr.title;
  document.getElementById('pr-og-img').content = 'https://julyforum.com' + pr.img;

  // Hero
  document.getElementById('pr-title').textContent = pr.title;
  document.getElementById('pr-summary').textContent = pr.summary;
  document.getElementById('pr-date-display').textContent = dateFull;

  // Image + date badges
  document.getElementById('pr-img').src = pr.img;
  document.getElementById('pr-img').alt = pr.title;
  document.getElementById('pr-img-date-top').innerHTML = '<i class="zmdi zmdi-calendar"></i> ' + dateShort;
  document.getElementById('pr-img-date-bottom').textContent = '#' + pr.id;

  // Content — load from /press-releases/content/ folder if available
  const contentEl = document.getElementById('pr-content');
  fetch('/press-releases/content/' + slug + '.txt')
    .then(r => r.ok ? r.text() : null)
    .then(text => {
      if (text) {
        contentEl.innerHTML = text.split('\n\n').map(p => `<p>${p.trim()}</p>`).join('');
      } else {
        contentEl.innerHTML = `<p>${pr.summary}</p><p style="color:#9ca3af;font-size:14px">📌 বিস্তারিত বিষয়বস্তু শীঘ্রই প্রকাশিত হবে।</p>`;
      }
    })
    .catch(() => {
      contentEl.innerHTML = `<p>${pr.summary}</p>`;
    });

  // Share buttons
  const url = encodeURIComponent('https://julyforum.com/press-releases/' + slug + '.html');
  const title = encodeURIComponent(pr.title);
  document.getElementById('pr-share').innerHTML = `
    <strong style="font-size:14px;align-self:center">শেয়ার করুন:</strong>
    <a href="https://www.facebook.com/sharer/sharer.php?u=${url}" target="_blank" style="background:#3b5998"><i class="zmdi zmdi-facebook"></i> Facebook</a>
    <a href="https://wa.me/?text=${title}%20${url}" target="_blank" style="background:#25d366"><i class="zmdi zmdi-whatsapp"></i> WhatsApp</a>
    <a href="https://twitter.com/intent/tweet?text=${title}&url=${url}" target="_blank" style="background:#1da1f2"><i class="zmdi zmdi-twitter"></i> Twitter</a>`;

  // Sidebar — other press releases
  const others = JOAF.pressReleases.filter(p => p.id !== pr.id).slice(-4).reverse();
  document.getElementById('sidebarPR').innerHTML = others.map(p => `
    <a href="/press-releases/${p.slug}.html" class="sc-pr-item">
      <img src="${p.img}" alt="${p.title}" loading="lazy">
      <div class="sc-pr-info">
        <h4>${p.title}</h4>
        <span>${BanglaUtil.formatDateShort(p.date)}</span>
      </div>
    </a>`).join('');
})();
</script>
</body>
</html>

// Populate district dropdown
const dSel = document.getElementById('districtFilter');
if (dSel) {
  DISTRICTS.sort().forEach(d => {
    dSel.innerHTML += `<option value="${d}">${d}</option>`;
  });
}

window.allDonors = [];
let allDonors = window.allDonors;
let activeBlood = 'all';

// Load donors
async function loadDonors() {
  try {
    const q = query(collection(db, 'donors'), orderBy('createdAt', 'desc'));
    const snap = await getDocs(q);
    allDonors = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    window.allDonors = allDonors;
    updateStats();
    renderDonors();
  } catch(e) {
    console.error(e);
  }
  document.getElementById('joaf-preloader').style.display = 'none';
}

function updateStats() {
  const now = new Date();
  const available = allDonors.filter(d => {
    if (!d.lastDonate) return true;
    const diff = (now - new Date(d.lastDonate)) / (1000*60*60*24);
    return diff >= 90;
  });
  const districts = [...new Set(allDonors.map(d => d.district))];
  document.getElementById('totalDonors').textContent = allDonors.length;
  document.getElementById('availableDonors').textContent = available.length;
  document.getElementById('totalDistricts').textContent = districts.length;
}

window.renderDonors = function renderDonors() {
  const blood = activeBlood;
  const district = document.getElementById('districtFilter').value;
  const search = document.getElementById('searchInput').value.toLowerCase();

  let filtered = allDonors.filter(d => {
    if (blood !== 'all' && d.blood !== blood) return false;
    if (district && d.district !== district) return false;
    if (search && !window.bnSearch(search, d.name||'') && !window.bnSearch(search, d.area||'') && !window.bnSearch(search, d.district||'') && !window.bnSearch(search, (d.district||'')+' '+(d.area||''))) return false;
    return true;
  });

  const list = document.getElementById('donorsList');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><i class="zmdi zmdi-account-off"></i><p>এই এলাকায় কোনো দাতা পাওয়া যায়নি<br><small>আপনি রক্ত নিবন্ধন করুন!</small></p></div>`;
    return;
  }

  const now = new Date();
  list.innerHTML = filtered.map(d => {
    const available = !d.lastDonate || (now - new Date(d.lastDonate)) / (1000*60*60*24) >= 90;
    const statusHtml = available
      ? `<div class="available">✅ এখন দিতে পারবেন</div>`
      : `<div class="last-donated">⏳ শেষ দান: ${d.lastDonate}</div>`;
    return `
    <div class="card">
      <div class="card-top">
        <div class="blood-badge">${d.blood}</div>
        <div>
          <div class="donor-name">${d.name}</div>
          <div class="donor-meta"><i class="zmdi zmdi-pin"></i> ${d.district}${d.area ? ' — ' + d.area : ''}${d.dist && d.dist<9999 ? ' • <b>'+d.dist+' km</b>' : ''}</div>
          ${statusHtml}
        </div>
      </div>
      <div class="donor-actions">
        <a href="tel:${d.phone}" class="btn-call"><i class="zmdi zmdi-phone"></i> কল করুন</a>
        <a href="https://wa.me/88${d.phone}" target="_blank" class="btn-msg"><i class="zmdi zmdi-whatsapp"></i> WhatsApp</a>
      </div>
    </div>`;
  }).join('');
}

// Filters
document.getElementById('bloodFilter').addEventListener('click', e => {
  const btn = e.target.closest('.bt');
  if (!btn) return;
  document.querySelectorAll('.bt').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeBlood = btn.dataset.type;
  renderDonors();
});

const searchInput = document.getElementById('searchInput');
const suggestBox = document.getElementById('searchSuggestions');

searchInput.addEventListener('input', function() {
  const q = this.value.trim();
  window.renderDonors ? window.renderDonors() : renderDonors();
  if (!q) { suggestBox.classList.remove('show'); return; }
  
  // Find matching suggestions from donors + districts
  const donorNames = allDonors.map(d => d.name).filter(Boolean);
  const donorAreas = allDonors.map(d => d.area).filter(Boolean);
  const all = [...new Set([...SUGGESTIONS_BD, ...donorNames, ...donorAreas])];
  
  const matches = all.filter(s => 
    s.toLowerCase().includes(q.toLowerCase()) || 
    (window.bnSearch && window.bnSearch(q, s))
  ).slice(0, 6);
  
  if (!matches.length) { suggestBox.classList.remove('show'); return; }
  
  suggestBox.innerHTML = matches.map(m => 
    `<div class="suggestion-item" onclick="selectSuggestion('${m}')">${m}</div>`
  ).join('');
  suggestBox.classList.add('show');
});

window.selectSuggestion = function(val) {
  searchInput.value = val;
  suggestBox.classList.remove('show');
  renderDonors();
};

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) suggestBox.classList.remove('show');
});

document.getElementById('districtFilter').addEventListener('change', () => window.renderDonors ? window.renderDonors() : renderDonors());
document.getElementById('searchInput').addEventListener('input', renderDonors);

// Modal


;

loadDonors();

// ── Map ─────────────────────────────────────────────────
let map = null;
let userLat = null, userLng = null;

function initMap() {
  if (map) return;
  const mapEl = document.getElementById('donorMap');
  mapEl.style.display = 'block';
  map = L.map('donorMap').setView([23.6850, 90.3563], 7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // User location marker
  if (userLat) {
    L.marker([userLat, userLng], {
      icon: L.divIcon({className:'', html:'<div style="background:#075e55;width:16px;height:16px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3)"></div>'})
    }).addTo(map).bindPopup('আপনি এখানে').openPopup();
  }

  // Donor markers
  const DC = (typeof JOAF !== 'undefined' && JOAF.districtCoords) ? JOAF.districtCoords : {};
  allDonors.forEach(d => {
    let lat = d.lat, lng = d.lng;
    if (!lat && d.district && DC[d.district]) {
      lat = DC[d.district].lat + (Math.random()-0.5)*0.05;
      lng = DC[d.district].lng + (Math.random()-0.5)*0.05;
    }
    if (!lat) return;
    const available = !d.lastDonate || (new Date() - new Date(d.lastDonate)) / 86400000 >= 90;
    L.marker([lat, lng], {
      icon: L.divIcon({className:'', html:`<div style="background:${available?'#90161f':'#9ca3af'};color:#fff;padding:4px 8px;border-radius:50px;font-size:11px;font-weight:800;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.3)">${d.blood}</div>`})
    }).addTo(map).bindPopup(`<b>${d.name}</b><br>${d.blood} • ${d.district}<br>${available?'✅ পাওয়া যাবে':'⏳ অপেক্ষা করুন'}`);
  });
}

document.getElementById('toggleMap').addEventListener('click', () => {
  const mapEl = document.getElementById('donorMap');
  if (mapEl.style.display === 'none' || !mapEl.style.display) {
    initMap();
    setTimeout(() => map && map.invalidateSize(), 100);
    document.getElementById('toggleMap').textContent = '📋 তালিকায় দেখুন';
  } else {
    mapEl.style.display = 'none';
    document.getElementById('toggleMap').textContent = '🗺️ ম্যাপে দেখুন';
  }
});

document.getElementById('nearbyBtn').addEventListener('click', () => {
  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;
    initMap();
    map.setView([userLat, userLng], 11);
    setTimeout(() => map && map.invalidateSize(), 100);
    document.getElementById('toggleMap').textContent = '📋 তালিকায় দেখুন';
    document.getElementById('donorMap').style.display = 'block';

    // Sort donors by distance
    const DC = (typeof JOAF !== 'undefined' && JOAF.districtCoords) ? JOAF.districtCoords : {};
    allDonors = allDonors.map(d => {
      let lat = d.lat, lng = d.lng;
      if (!lat && d.district && DC[d.district]) { lat = DC[d.district].lat; lng = DC[d.district].lng; }
      if (!lat) return {...d, dist: 9999};
      const dist = Math.sqrt(Math.pow((lat-userLat)*111,2) + Math.pow((lng-userLng)*111,2));
      return {...d, lat, lng, dist: Math.round(dist)};
    }).sort((a,b) => a.dist - b.dist);
    renderDonors();
  }, () => alert('লোকেশন পাওয়া যায়নি'));
});

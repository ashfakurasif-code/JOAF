<style>
:root { --red:#90161f; --green:#075e55; --gold:#c9a227; --bg:#f8f9fa; }
body { font-family: 'SolaimanLipi', sans-serif; background: var(--bg); color: #1a1a2e; }
.hero { background: linear-gradient(135deg, #90161f, #c0392b); color: #fff; padding: 30px 16px 20px; text-align: center; }
.hero h1 { font-size: 24px; font-weight: 900; margin-bottom: 6px; }
.hero p { font-size: 13px; opacity: .85; }
.blood-types { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; padding: 16px; }
.bt { padding: 10px 18px; border-radius: 50px; border: 2px solid #ddd; background: #fff; font-size: 14px; font-weight: 800; cursor: pointer; transition: .2s; color: #333; }
.bt.active, .bt:hover { background: var(--red); color: #fff; border-color: var(--red); }
.section { padding: 0 16px 16px; }
.card { background: #fff; border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.07); }
.card-top { display: flex; align-items: center; gap: 12px; }
.blood-badge { width: 48px; height: 48px; border-radius: 50%; background: var(--red); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; flex-shrink: 0; }
.donor-name { font-size: 15px; font-weight: 800; color: #1a1a2e; }
.donor-meta { font-size: 12px; color: #6b7280; margin-top: 2px; }
.donor-actions { display: flex; gap: 8px; margin-top: 12px; }
.btn-call { flex: 1; padding: 10px; background: var(--green); color: #fff; border: none; border-radius: 50px; font-size: 13px; font-weight: 800; font-family: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; text-decoration: none; }
.btn-msg { flex: 1; padding: 10px; background: #25d366; color: #fff; border: none; border-radius: 50px; font-size: 13px; font-weight: 800; font-family: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; text-decoration: none; }
.fab { position: fixed; bottom: 80px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: var(--red); color: #fff; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 4px 16px rgba(144,22,31,.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: flex-end; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 24px 24px 0 0; padding: 24px 20px; width: 100%; max-height: 90vh; overflow-y: auto; }
.modal h3 { font-size: 18px; font-weight: 900; margin-bottom: 16px; color: #1a1a2e; }
.form-group { margin-bottom: 14px; }
.form-group label { font-size: 13px; font-weight: 700; color: #374151; display: block; margin-bottom: 6px; }
.form-group input, .form-group select { width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 14px; font-family: inherit; outline: none; }
.form-group input:focus, .form-group select:focus { border-color: var(--red); }
.btn-submit { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--red), #c0392b); color: #fff; border: none; border-radius: 50px; font-size: 15px; font-weight: 900; font-family: inherit; cursor: pointer; margin-top: 8px; }
.filter-bar { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; }
.filter-bar::-webkit-scrollbar { display: none; }
.district-select { flex: 1; padding: 10px 14px; border: 2px solid #e5e7eb; border-radius: 50px; font-size: 13px; font-family: inherit; outline: none; background: #fff; }
.empty { text-align: center; padding: 40px 20px; color: #9ca3af; }
.empty i { font-size: 48px; display: block; margin-bottom: 12px; }
.last-donated { font-size: 11px; color: #ef4444; font-weight: 700; margin-top: 4px; }
.available { font-size: 11px; color: #10b981; font-weight: 700; margin-top: 4px; }
.stats-bar { display: flex; gap: 10px; padding: 12px 16px; }
.stat { flex: 1; background: #fff; border-radius: 12px; padding: 12px 8px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.stat-num { font-size: 20px; font-weight: 900; color: var(--red); }
.stat-label { font-size: 11px; color: #6b7280; margin-top: 2px; }
.search-box { padding: 0 16px 8px; }
.search-box input { width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 50px; font-size: 14px; font-family: inherit; outline: none; }
.search-box input:focus { border-color: var(--red); }
.search-suggestions { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 2px solid var(--red); border-top: none; border-radius: 0 0 12px 12px; z-index: 100; max-height: 200px; overflow-y: auto; display: none; }
.search-suggestions.show { display: block; }

</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDBbm1eiqatwEUQenPIEAEFSubTJTUTdZk",
  authDomain: "joaf-app-45753.firebaseapp.com",
  projectId: "joaf-app-45753",
  storageBucket: "joaf-app-45753.firebasestorage.app",
  messagingSenderId: "472362223214",
  appId: "1:472362223214:web:9186a4f90dc608bae4487f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const DISTRICTS = ["ঢাকা","চট্টগ্রাম","রাজশাহী","খুলনা","বরিশাল","সিলেট","রংপুর","ময়মনসিংহ","কুমিল্লা","নারায়ণগঞ্জ","গাজীপুর","টাঙ্গাইল","ফরিদপুর","যশোর","নোয়াখালী","বগুড়া","দিনাজপুর","রংপুর","পাবনা","নরসিংদী","মানিকগঞ্জ","মুন্সীগঞ্জ","শরীয়তপুর","মাদারীপুর","গোপালগঞ্জ","কিশোরগঞ্জ","নেত্রকোনা","জামালপুর","শেরপুর","ব্রাহ্মণবাড়িয়া","চাঁদপুর","ফেনী","লক্ষ্মীপুর","কক্সবাজার","বান্দরবান","রাঙ্গামাটি","খাগড়াছড়ি","হবিগঞ্জ","মৌলভীবাজার","সুনামগঞ্জ","নওগাঁ","চাঁপাইনবাবগঞ্জ","নাটোর","সিরাজগঞ্জ","জয়পুরহাট","সাতক্ষীরা","ঝিনাইদহ","মাগুরা","নড়াইল","বাগেরহাট","মেহেরপুর","চুয়াডাঙ্গা","কুষ্টিয়া","ঝালকাঠি","পটুয়াখালী","পিরোজপুর","ভোলা","বরগুনা","লালমনিরহাট","নীলফামারী","গাইবান্ধা","কুড়িগ্রাম","পঞ্চগড়","ঠাকুরগাঁও"];

// Populate district dropdowns
const dSel = document.getElementById('districtFilter');
const fDSel = document.getElementById('f_district');
DISTRICTS.sort().forEach(d => {
  dSel.innerHTML += `<option value="${d}">${d}</option>`;
  fDSel.innerHTML += `<option value="${d}">${d}</option>`;
});

let allDonors = [];
let activeBlood = 'all';

// Load donors
async function loadDonors() {
  try {
    const q = query(collection(db, 'donors'), orderBy('createdAt', 'desc'));
    const snap = await getDocs(q);
    allDonors = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    updateStats();
    renderDonors();
  } catch(e) {
    console.error(e);
  }
  document.getElementById('joaf-preloader').style.display = 'none';
}

function updateStats() {
  const now = new Date();
  const available = allDonors.filter(d => {
    if (!d.lastDonate) return true;
    const diff = (now - new Date(d.lastDonate)) / (1000*60*60*24);
    return diff >= 90;
  });
  const districts = [...new Set(allDonors.map(d => d.district))];
  document.getElementById('totalDonors').textContent = allDonors.length;
  document.getElementById('availableDonors').textContent = available.length;
  document.getElementById('totalDistricts').textContent = districts.length;
}

function renderDonors() {
  const blood = activeBlood;
  const district = document.getElementById('districtFilter').value;
  const search = document.getElementById('searchInput').value.toLowerCase();

  let filtered = allDonors.filter(d => {
    if (blood !== 'all' && d.blood !== blood) return false;
    if (district && d.district !== district) return false;
    if (search && !window.bnSearch(search, d.name||'') && !window.bnSearch(search, d.area||'') && !window.bnSearch(search, d.district||'') && !window.bnSearch(search, (d.district||'')+' '+(d.area||''))) return false;
    return true;
  });

  const list = document.getElementById('donorsList');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><i class="zmdi zmdi-account-off"></i><p>এই এলাকায় কোনো দাতা পাওয়া যায়নি<br><small>আপনি নিবন্ধন করুন!</small></p></div>`;
    return;
  }

  const now = new Date();
  list.innerHTML = filtered.map(d => {
    const available = !d.lastDonate || (now - new Date(d.lastDonate)) / (1000*60*60*24) >= 90;
    const statusHtml = available
      ? `<div class="available">✅ এখন দিতে পারবেন</div>`
      : `<div class="last-donated">⏳ শেষ দান: ${d.lastDonate}</div>`;
    return `
    <div class="card">
      <div class="card-top">
        <div class="blood-badge">${d.blood}</div>
        <div>
          <div class="donor-name">${d.name}</div>
          <div class="donor-meta"><i class="zmdi zmdi-pin"></i> ${d.district}${d.area ? ' — ' + d.area : ''}</div>
          ${statusHtml}
        </div>
      </div>
      <div class="donor-actions">
        <a href="tel:${d.phone}" class="btn-call"><i class="zmdi zmdi-phone"></i> কল করুন</a>
        <a href="https://wa.me/88${d.phone}" target="_blank" class="btn-msg"><i class="zmdi zmdi-whatsapp"></i> WhatsApp</a>
      </div>
    </div>`;
  }).join('');
}

// Filters
document.getElementById('bloodFilter').addEventListener('click', e => {
  const btn = e.target.closest('.bt');
  if (!btn) return;
  document.querySelectorAll('.bt').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeBlood = btn.dataset.type;
  renderDonors();
});

// Search suggestions
const SUGGESTIONS_BD = ['ঢাকা','চট্টগ্রাম','সিলেট','রাজশাহী','খুলনা','বরিশাল','রংপুর','ময়মনসিংহ','কুমিল্লা','নারায়ণগঞ্জ','গাজীপুর','টাঙ্গাইল','ফরিদপুর','যশোর','নোয়াখালী','বগুড়া','দিনাজপুর','পাবনা','নরসিংদী','মানিকগঞ্জ','মুন্সীগঞ্জ','শরীয়তপুর','মাদারীপুর','গোপালগঞ্জ','কিশোরগঞ্জ','নেত্রকোনা','জামালপুর','শেরপুর','ব্রাহ্মণবাড়িয়া','চাঁদপুর','ফেনী','লক্ষ্মীপুর','কক্সবাজার','বান্দরবান','রাঙ্গামাটি','খাগড়াছড়ি','হবিগঞ্জ','মৌলভীবাজার','সুনামগঞ্জ','নওগাঁ','চাঁপাইনবাবগঞ্জ','নাটোর','সিরাজগঞ্জ','জয়পুরহাট','সাতক্ষীরা','ঝিনাইদহ','মাগুরা','নড়াইল','বাগেরহাট','মেহেরপুর','চুয়াডাঙ্গা','কুষ্টিয়া','ঝালকাঠি','পটুয়াখালী','পিরোজপুর','ভোলা','বরগুনা','লালমনিরহাট','নীলফামারী','গাইবান্ধা','কুড়িগ্রাম','পঞ্চগড়','ঠাকুরগাঁও'];

const searchInput = document.getElementById('searchInput');
const suggestBox = document.getElementById('searchSuggestions');

searchInput.addEventListener('input', function() {
  const q = this.value.trim();
  renderDonors();
  if (!q) { suggestBox.classList.remove('show'); return; }
  
  // Find matching suggestions from donors + districts
  const donorNames = allDonors.map(d => d.name).filter(Boolean);
  const donorAreas = allDonors.map(d => d.area).filter(Boolean);
  const all = [...new Set([...SUGGESTIONS_BD, ...donorNames, ...donorAreas])];
  
  const matches = all.filter(s => 
    s.toLowerCase().includes(q.toLowerCase()) || 
    (window.bnSearch && window.bnSearch(q, s))
  ).slice(0, 6);
  
  if (!matches.length) { suggestBox.classList.remove('show'); return; }
  
  suggestBox.innerHTML = matches.map(m => 
    `<div class="suggestion-item" onclick="selectSuggestion('${m}')">${m}</div>`
  ).join('');
  suggestBox.classList.add('show');
});

window.selectSuggestion = function(val) {
  searchInput.value = val;
  suggestBox.classList.remove('show');
  renderDonors();
};

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) suggestBox.classList.remove('show');
});

document.getElementById('districtFilter').addEventListener('change', renderDonors);
document.getElementById('searchInput').addEventListener('input', renderDonors);

// Modal
window.closeModal = () => document.getElementById('modalOverlay').classList.remove('open');
document.getElementById('fabBtn').addEventListener('click', () => document.getElementById('modalOverlay').classList.add('open'));
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === document.getElementById('modalOverlay')) closeModal(); });

// Submit
document.getElementById('submitBtn').addEventListener('click', async () => {
  const name = document.getElementById('f_name').value.trim();
  const phone = document.getElementById('f_phone').value.trim();
  const blood = document.getElementById('f_blood').value;
  const district = document.getElementById('f_district').value;
  const area = document.getElementById('f_area').value.trim();
  const lastDonate = document.getElementById('f_lastDonate').value;

  if (!name || !phone || !blood || !district) {
    alert('নাম, মোবাইল, রক্তের গ্রুপ ও জেলা আবশ্যক।');
    return;
  }
  if (!/^01[3-9]\d{8}$/.test(phone)) {
    alert('সঠিক মোবাইল নম্বর দিন।');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.textContent = 'নিবন্ধন হচ্ছে...';
  btn.disabled = true;

  try {
    await addDoc(collection(db, 'donors'), { name, phone, blood, district, area, lastDonate, createdAt: serverTimestamp() });
    alert('✅ সফলভাবে নিবন্ধন হয়েছে! আপনাকে ধন্যবাদ।');
    closeModal();
    loadDonors();
  } catch(e) {
    alert('সমস্যা হয়েছে, আবার চেষ্টা করুন।');
  }
  btn.textContent = '✅ নিবন্ধন করুন';
  btn.disabled = false;
});

loadDonors();
</script>

})();
</script>

const log = (msg, color='#0f0') => {
  const d = document.getElementById('log');
  d.innerHTML += `<span style="color:${color}">${msg}</span>\n`;
  d.scrollTop = d.scrollHeight;
};

window.startSeed = async () => {
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = 'Uploading...';
  
  log('🔍 আগে existing phones check করছি...');
  
  // Get existing phones
  const snap = await getDocs(collection(db, 'donors'));
  const existingPhones = new Set(snap.docs.map(d => d.data().phone));
  log(`📊 Firebase এ আগে থেকে ${existingPhones.size} জন donor আছে`);
  
  let added = 0, skipped = 0, errors = 0;
  
  for (let i = 0; i < donors.length; i++) {
    const d = donors[i];
    
    if (existingPhones.has(d.phone)) {
      skipped++;
      log(`⏭️ [${i+1}/${donors.length}] Skip: ${d.name} (${d.phone})`, '#888');
      continue;
    }
    
    try {
      await addDoc(collection(db, 'donors'), {
        name: d.name,
        blood: d.blood,
        phone: d.phone,
        area: d.area,
        district: d.district,
        lat: null,
        lng: null,
        source: 'seed',
        createdAt: serverTimestamp()
      });
      added++;
      existingPhones.add(d.phone);
      log(`✅ [${i+1}/${donors.length}] Added: ${d.name} | ${d.blood} | ${d.district}`);
    } catch(e) {
      errors++;
      log(`❌ Error: ${d.name} — ${e.message}`, '#f44');
    }
    
    // Small delay to avoid rate limiting
    if (i % 10 === 0) await new Promise(r => setTimeout(r, 200));
  }
  
  log(`\n🎉 Done! Added: ${added}, Skipped: ${skipped}, Errors: ${errors}`, '#ff0');
  btn.textContent = `✅ Done! ${added} added`;
};
</script>

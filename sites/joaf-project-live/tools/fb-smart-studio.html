
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FB Smart Studio — JOAF</title>
  <style>
    :root { color-scheme: dark; --bg:#0b0c10; --panel:#141622; --line:#2b3144; --text:#eef2ff; --muted:#93a4c3; --accent:#7c3aed; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,system-ui,sans-serif; background:var(--bg); color:var(--text); }
    header { padding:16px 20px; border-bottom:1px solid var(--line); background:#0f1117; position:sticky; top:0; }
    main { display:grid; grid-template-columns: 1fr 1fr; gap:16px; padding:16px; min-height: calc(100vh - 72px); }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:16px; }
    label { display:block; margin:10px 0 6px; color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.08em; }
    input, textarea, select, button { width:100%; border-radius:12px; border:1px solid var(--line); background:#0f1117; color:var(--text); padding:12px; font:inherit; }
    textarea { min-height: 120px; resize: vertical; }
    button { cursor:pointer; background:var(--accent); border:none; font-weight:700; margin-top:12px; }
    .preview { border:1px dashed var(--line); border-radius:18px; padding:20px; min-height:320px; background:linear-gradient(180deg,#121521,#0f1117); }
    .hero { display:flex; flex-direction:column; gap:10px; }
    .badge { display:inline-flex; align-self:flex-start; padding:6px 10px; border-radius:999px; background:rgba(124,58,237,.16); color:#c4b5fd; font-size:12px; }
    .title { font-size:32px; line-height:1.15; font-weight:800; margin:0; }
    .summary { color:#cbd5e1; line-height:1.6; white-space:pre-wrap; }
    .muted { color:var(--muted); font-size:13px; }
    @media (max-width: 1000px) { main { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header><strong>FB Smart Studio</strong> <span class="muted">— self-contained zero-touch compatible tool</span></header>
  <main>
    <section class="card">
      <label>Headline</label><input id="headline" value="JOAF Studio update" />
      <label>Category</label><input id="category" value="Breaking" />
      <label>Summary</label><textarea id="summary">Compose a clean social-ready card with the latest JOAF status.</textarea>
      <label>Image URL</label><input id="image" placeholder="https://..." />
      <button id="copyBtn">Copy HTML snippet</button>
      <button id="downloadBtn" style="background:#1f2937">Download JSON</button>
    </section>
    <section class="card">
      <div class="preview" id="preview"></div>
    </section>
  </main>
  <script>
    const el = (id) => document.getElementById(id);
    const render = () => {
      const headline = el('headline').value.trim();
      const category = el('category').value.trim();
      const summary = el('summary').value.trim();
      const image = el('image').value.trim();
      el('preview').innerHTML = `
        <div class="hero">
          <span class="badge">${category || 'JOAF'}</span>
          <h1 class="title">${headline || 'Untitled'}</h1>
          <div class="summary">${summary || '—'}</div>
          ${image ? `<img src="${image}" style="width:100%;border-radius:16px;margin-top:8px;aspect-ratio:16/9;object-fit:cover" alt="preview" />` : ''}
        </div>`;
    };
    document.querySelectorAll('input,textarea').forEach((n) => n.addEventListener('input', render));
    el('copyBtn').onclick = async () => {
      const payload = { headline: el('headline').value, category: el('category').value, summary: el('summary').value, image: el('image').value };
      await navigator.clipboard.writeText(JSON.stringify(payload, null, 2));
      el('copyBtn').textContent = 'Copied';
      setTimeout(() => el('copyBtn').textContent = 'Copy HTML snippet', 1200);
    };
    el('downloadBtn').onclick = () => {
      const blob = new Blob([JSON.stringify({ headline: el('headline').value, category: el('category').value, summary: el('summary').value, image: el('image').value }, null, 2)], { type:'application/json' });
      const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: 'fb-smart-studio.json' });
      a.click();
      URL.revokeObjectURL(a.href);
    };
    render();
  </script>
</body>
</html>

<script>
function bnInt(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return String(Math.round(n)).replace(/\d/g, d => '০১২৩৪৫৬৭৮৯'[d]);
}
function bn(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return String(n).replace(/\d/g, d => '০১২৩৪৫৬৭৮৯'[d]);
}

const DAYS = ['রবিবার','সোমবার','মঙ্গলবার','বুধবার','বৃহস্পতিবার','শুক্রবার','শনিবার'];

const COORDS = {
  'Dhaka':       [23.8103, 90.4125],
  'Chattogram':  [22.3569, 91.7832],
  'Rajshahi':    [24.3745, 88.6042],
  'Khulna':      [22.8456, 89.5403],
  'Sylhet':      [24.8949, 91.8687],
  'Barishal':    [22.7010, 90.3535],
  'Rangpur':     [25.7439, 89.2752],
  'Mymensingh':  [24.7471, 90.4203],
  'Cumilla':     [23.4607, 91.1809],
  'Narayanganj': [23.6238, 90.4996],
  'Gazipur':     [23.9999, 90.4203],
  'CoxBazar':    [21.4272, 92.0058],
};
const CITY_BN = {
  'Dhaka':'ঢাকা','Chattogram':'চট্টগ্রাম','Rajshahi':'রাজশাহী',
  'Khulna':'খুলনা','Sylhet':'সিলেট','Barishal':'বরিশাল',
  'Rangpur':'রংপুর','Mymensingh':'ময়মনসিংহ','Cumilla':'কুমিল্লা',
  'Narayanganj':'নারায়ণগঞ্জ','Gazipur':'গাজীপুর','CoxBazar':'কক্সবাজার'
};

function wxFromCode(code, rain) {
  if (code === 0)  return {icon:'☀️', desc:'পরিষ্কার আকাশ'};
  if (code <= 2)   return {icon:'🌤️', desc:'আংশিক মেঘলা'};
  if (code <= 3)   return {icon:'☁️',  desc:'মেঘলা'};
  if (code <= 49)  return {icon:'🌫️', desc:'কুয়াশা'};
  if (code <= 59)  return {icon:'🌦️', desc:'গুঁড়ি বৃষ্টি'};
  if (code <= 69)  return {icon:'🌧️', desc:'বৃষ্টিপাত'};
  if (code <= 79)  return {icon:'❄️',  desc:'তুষারপাত'};
  if (code <= 84)  return {icon: rain > 5 ? '🌧️':'🌦️', desc:'বৃষ্টিপাত'};
  if (code <= 99)  return {icon:'⛈️', desc:'বজ্রঝড়'};
  return {icon:'🌤️', desc:'আবহাওয়া'};
}

let wxMap = null, wxMarker = null;

function updateMap(lat, lng, label) {
  if (!wxMap) {
    wxMap = L.map('wxMap', {zoomControl:true, scrollWheelZoom:false}).setView([lat,lng], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution:'© OpenStreetMap', maxZoom:18
    }).addTo(wxMap);
  } else {
    wxMap.setView([lat,lng], 11);
    if (wxMarker) wxMap.removeLayer(wxMarker);
  }
  wxMarker = L.marker([lat,lng]).addTo(wxMap).bindPopup(`<b>${label}</b>`).openPopup();
  setTimeout(() => wxMap.invalidateSize(), 300);
}

function renderWeather(data, locLabel, lat, lng) {
  const c = data.current;
  const daily = data.daily;
  if (!c || !daily || !daily.time || !daily.temperature_2m_max) {
    document.getElementById('wxDesc').textContent = 'তথ্য পাওয়া যাচ্ছে না';
    document.getElementById('forecastList').innerHTML = '<div class="loading-state">তথ্য পাওয়া যাচ্ছে না</div>';
    document.getElementById('farmAdvice').innerHTML = '<div class="loading-state">তথ্য পাওয়া যাচ্ছে না</div>';
    return;
  }

  const temp     = Math.round(c.temperature_2m);
  const humidity = Math.round(c.relative_humidity_2m);
  const wind     = Math.round(c.wind_speed_10m);
  const rain     = parseFloat(c.precipitation) || 0;
  const code     = parseInt(c.weather_code ?? c.weathercode) || 0;
  const wx       = wxFromCode(code, rain);

  document.getElementById('wxIcon').textContent     = wx.icon;
  document.getElementById('wxTemp').textContent     = bnInt(temp) + '°C';
  document.getElementById('wxDesc').textContent     = wx.desc;
  document.getElementById('wxLoc').textContent      = '📍 ' + locLabel;
  document.getElementById('wxHumidity').textContent = bnInt(humidity) + '%';
  document.getElementById('wxWind').textContent     = bnInt(wind) + ' km/h';
  document.getElementById('wxRain').textContent     = bnInt(Math.round(rain * 10) / 10) + ' mm';

  // Alert
  const alertEl = document.getElementById('wxAlert');
  if (code >= 95 || rain > 20) {
    alertEl.style.display = 'block';
    document.getElementById('wxAlertText').textContent =
      code >= 95 ? '⚡ বজ্রঝড়ের সম্ভাবনা। ঘরের বাইরে না যাওয়াই ভালো।'
                 : '🌧️ ভারী বৃষ্টির সম্ভাবনা। সতর্ক থাকুন।';
  } else {
    alertEl.style.display = 'none';
  }

  // Map
  updateMap(lat, lng, locLabel);

  // 7-day forecast
  document.getElementById('forecastList').innerHTML =
    daily.time.slice(0,7).map((date, i) => {
      const dt  = new Date(date + 'T12:00:00');
      const max = Math.round(daily.temperature_2m_max[i]);
      const min = Math.round(daily.temperature_2m_min[i]);
      const r   = parseFloat(daily.precipitation_sum[i]) || 0;
      const wc  = parseInt(((daily.weather_code || daily.weathercode) || [])[i]) || 0;
      const dWx = wxFromCode(wc, r);
      return `<div class="day-row">
        <span class="day-name">${DAYS[dt.getDay()]}</span>
        <span class="day-icon">${dWx.icon}</span>
        <span class="day-desc">${dWx.desc}${r > 0 ? ' · ' + bnInt(r) + ' mm' : ''}</span>
        <span class="day-temp">${bnInt(max)}°/${bnInt(min)}°</span>
      </div>`;
    }).join('');

  // Farm advice
  const tRain = parseFloat(daily.precipitation_sum[0]) || 0;
  const tMax  = Math.round(daily.temperature_2m_max[0]);
  const tCode = parseInt(((daily.weather_code || daily.weathercode) || [])[0]) || 0;
  let advice;
  if (tCode >= 95 || tRain > 30)
    advice = '⚠️ আজ বজ্রঝড় বা ভারী বৃষ্টির সম্ভাবনা। <b>জেলেরা নৌকা না নামানোর পরামর্শ।</b> মাঠে কাজ করবেন না।';
  else if (tRain > 10)
    advice = '🌧️ আজ মাঝারি বৃষ্টি হতে পারে। সেচ কাজ বন্ধ রাখুন। জমি থেকে পানি নিষ্কাশনের ব্যবস্থা রাখুন।';
  else if (tRain > 2)
    advice = '🌦️ হালকা বৃষ্টির সম্ভাবনা। কীটনাশক স্প্রে করা থেকে বিরত থাকুন। জেলেরা সকাল সকাল ফিরে আসুন।';
  else if (tMax > 38)
    advice = '☀️ তীব্র গরম (' + bnInt(tMax) + '°C)। দুপুর ১২টা–বিকেল ৪টা মাঠে কাজ করবেন না। গবাদিপশুকে ছায়া ও পানি দিন।';
  else if (tMax > 32)
    advice = '🌤️ গরম আবহাওয়া। সকালে ও বিকেলে কাজ করুন। ধান ও সবজি গাছে পানি দিন।';
  else
    advice = '✅ আবহাওয়া অনুকূল। মাঠে কাজ করার ভালো সময়। সার প্রয়োগ ও রোপণের জন্য উপযুক্ত।';

  document.getElementById('farmAdvice').innerHTML =
    `<div style="padding:4px 0;line-height:1.8;">${advice}</div>`;
}

async function fetchWeather(lat, lng) {
  const url = `https://api.open-meteo.com/v1/forecast`
    + `?latitude=${lat}&longitude=${lng}`
    + `&current=temperature_2m,relative_humidity_2m,wind_speed_10m,precipitation,weather_code`
    + `&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weather_code`
    + `&timezone=auto&forecast_days=7`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Weather API failed');
  return res.json();
}

async function initWeather() {
  // ধাপ ১: আগে Dhaka weather দেখাও
  try {
    const [lat, lng] = COORDS['Dhaka'];
    const data = await fetchWeather(lat, lng);
    renderWeather(data, 'ঢাকা', lat, lng);
  } catch(e) {
    document.getElementById('wxDesc').textContent = 'সংযোগ সমস্যা';
    document.getElementById('wxLoc').textContent = '📍 ইন্টারনেট সংযোগ চেক করুন';
    return;
  }

  // ধাপ ২: Background-এ real location বের করো
  setTimeout(async () => {
    try {
      const ip = await Promise.any([
        fetch('https://ipapi.co/json/',{signal:AbortSignal.timeout(6000)}).then(r=>r.json()).then(d=>{if(!d.latitude)throw 0;return{lat:d.latitude,lng:d.longitude,name:d.city||d.region||'আপনার এলাকা'};}),
        fetch('https://get.geojs.io/v1/ip/geo.json',{signal:AbortSignal.timeout(6000)}).then(r=>r.json()).then(d=>{if(!d.latitude)throw 0;return{lat:parseFloat(d.latitude),lng:parseFloat(d.longitude),name:d.city||d.region||'আপনার এলাকা'};}),
      ]);
      const data = await fetchWeather(ip.lat, ip.lng);
      renderWeather(data, ip.name, ip.lat, ip.lng);
    } catch(e) {
      try {
        if (!navigator.geolocation) return;
        const pos = await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:8000,maximumAge:60000}));
        const data = await fetchWeather(pos.coords.latitude, pos.coords.longitude);
        renderWeather(data, 'আপনার এলাকা', pos.coords.latitude, pos.coords.longitude);
      } catch(e2) {}
    }
  }, 100);
}

window.loadByCity = async function(city) {
  if (!city) return;
  const [lat, lng] = COORDS[city] || COORDS['Dhaka'];
  const name = CITY_BN[city] || city;
  document.getElementById('wxDesc').textContent = 'লোড হচ্ছে...';
  document.getElementById('wxTemp').textContent = '—°';
  document.getElementById('forecastList').innerHTML = '<div class="loading-state"><div class="loading-spinner"></div>লোড হচ্ছে...</div>';
  document.getElementById('farmAdvice').innerHTML  = '<div class="loading-state"><div class="loading-spinner"></div>লোড হচ্ছে...</div>';
  try {
    const data = await fetchWeather(lat, lng);
    renderWeather(data, name, lat, lng);
  } catch(e) {
    document.getElementById('wxDesc').textContent = 'তথ্য পাওয়া যাচ্ছে না';
  }
};

initWeather();
</script>

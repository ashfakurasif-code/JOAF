<!DOCTYPE html>
<html lang="bn"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>আবহাওয়া — JOAF</title>
<link rel="stylesheet" href="/css/stylec7c3.css">
<link rel="stylesheet" href="/css/pluginsc7c3.css">
<link rel="stylesheet" href="/css/joaf.css?v=6.3">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/material-design-iconic-font/2.2.0/css/material-design-iconic-font.min.css">
</head><body data-page="weather">
<div id="joaf-preloader" role="status" class="hidden"></div>
<div id="joaf-header"></div><div id="joaf-ticker"></div>
<style>
.wx-hero{background:linear-gradient(135deg,#0c4a6e,#0284c7);padding:40px 0 30px;color:#fff;text-align:center;}
.wx-main{font-size:72px;font-weight:900;line-height:1;}
.wx-temp{font-size:22px;font-weight:700;margin-top:6px;opacity:.9;}
.wx-desc{font-size:16px;opacity:.8;margin-top:4px;}
.wx-loc{font-size:13px;opacity:.7;margin-top:8px;}
.wx-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0;}
.wx-card{background:#fff;border-radius:14px;padding:14px 10px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.07);}
.wx-card-icon{font-size:24px;margin-bottom:5px;}
.wx-card-val{font-size:18px;font-weight:900;color:#1a1a2e;}
.wx-card-lbl{font-size:11px;color:#6b7280;margin-top:2px;}
.forecast-card{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:14px;}
.forecast-card h4{font-size:14px;font-weight:800;margin-bottom:12px;color:#1a1a2e;}
.day-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #f3f4f6;}
.day-row:last-child{border:none;}
.day-name{font-size:13px;font-weight:700;color:#374151;width:80px;}
.day-icon{font-size:20px;margin:0 12px;}
.day-desc{font-size:12px;color:#6b7280;flex:1;}
.day-temp{font-size:13px;font-weight:700;color:#1a1a2e;}
.alert-strip{background:linear-gradient(135deg,#fef2f2,#fee2e2);border-radius:14px;padding:14px;margin-bottom:14px;border:1.5px solid #fca5a5;}
.alert-strip h4{font-size:14px;font-weight:800;color:#991b1b;margin-bottom:6px;}
.notif-btn{width:100%;padding:12px;background:linear-gradient(135deg,#0c4a6e,#0284c7);color:#fff;border:none;border-radius:50px;font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;margin-top:12px;}
.dist-select{width:100%;padding:12px 16px;border-radius:50px;border:2px solid #e5e7eb;font-size:14px;font-family:inherit;margin-bottom:16px;outline:none;}
</style>
<div class="wx-hero"><div class="container">
  <div id="wxIcon">🌤️</div>
  <div class="wx-main" id="wxTemp">—°</div>
  <div class="wx-desc" id="wxDesc">আবহাওয়া লোড হচ্ছে...</div>
  <div class="wx-loc" id="wxLoc">📍 অবস্থান নির্ণয় করা হচ্ছে</div>
</div></div>

<section class="section"><div class="container">

  <select class="dist-select" id="distSel" onchange="loadWeather(this.value)">
    <option value="">আপনার জেলা বেছে নিন</option>
    <option value="Dhaka">ঢাকা</option><option value="Chattogram">চট্টগ্রাম</option>
    <option value="Rajshahi">রাজশাহী</option><option value="Khulna">খুলনা</option>
    <option value="Sylhet">সিলেট</option><option value="Barishal">বরিশাল</option>
    <option value="Rangpur">রংপুর</option><option value="Mymensingh">ময়মনসিংহ</option>
  </select>

  <div class="wx-grid">
    <div class="wx-card"><div class="wx-card-icon">💧</div><div class="wx-card-val" id="wxHumidity">—</div><div class="wx-card-lbl">আর্দ্রতা</div></div>
    <div class="wx-card"><div class="wx-card-icon">💨</div><div class="wx-card-val" id="wxWind">—</div><div class="wx-card-lbl">বাতাস</div></div>
    <div class="wx-card"><div class="wx-card-icon">🌧️</div><div class="wx-card-val" id="wxRain">—</div><div class="wx-card-lbl">বৃষ্টি</div></div>
  </div>

  <div class="alert-strip" id="wxAlert" style="display:none">
    <h4>⚠️ আবহাওয়া সতর্কতা</h4>
    <p id="wxAlertText"></p>
  </div>

  <div class="forecast-card">
    <h4>📅 ৭ দিনের পূর্বাভাস</h4>
    <div id="forecastList"></div>
  </div>

  <div class="forecast-card">
    <h4>🌾 কৃষক ও জেলেদের জন্য পরামর্শ</h4>
    <div id="farmAdvice" style="font-size:13px;color:#374151;line-height:1.7;"></div>
  </div>

  <button class="notif-btn" onclick="requestWxNotif()">🔔 দৈনিক আবহাওয়া notification চালু করুন</button>

</div></section>
<div id="joaf-footer"></div>
<script src="/js/modernizr-2.8.3.min.js"></script>
<script src="/js/data.js?v=6.3"></script>
<script src="/js/components.js?v=6.3"></script>
<script>
function bn(n){return n.toString().replace(/\d/g,d=>'০১২৩৪৫৬৭৮৯'[d]);}

const WX_ICONS={'Clear':'☀️','Clouds':'☁️','Rain':'🌧️','Drizzle':'🌦️','Thunderstorm':'⛈️','Snow':'❄️','Mist':'🌫️','Fog':'🌫️','Haze':'🌫️'};
const WX_BN={'Clear':'পরিষ্কার আকাশ','Clouds':'মেঘলা','Rain':'বৃষ্টিপাত','Drizzle':'গুঁড়ি বৃষ্টি','Thunderstorm':'বজ্রঝড়','Snow':'তুষারপাত','Mist':'কুয়াশা','Fog':'ঘন কুয়াশা','Haze':'ধোঁয়াশা'};
const DAYS=['রবিবার','সোমবার','মঙ্গলবার','বুধবার','বৃহস্পতিবার','শুক্রবার','শনিবার'];

// Open-Meteo free API (no key needed)
async function loadWeather(city='Dhaka'){
  const coords={'Dhaka':[23.8103,90.4125],'Chattogram':[22.3569,91.7832],'Rajshahi':[24.3745,88.6042],'Khulna':[22.8456,89.5403],'Sylhet':[24.8949,91.8687],'Barishal':[22.7010,90.3535],'Rangpur':[25.7439,89.2752],'Mymensingh':[24.7471,90.4203]};
  const [lat,lng]=coords[city]||coords['Dhaka'];
  const cityBn={'Dhaka':'ঢাকা','Chattogram':'চট্টগ্রাম','Rajshahi':'রাজশাহী','Khulna':'খুলনা','Sylhet':'সিলেট','Barishal':'বরিশাল','Rangpur':'রংপুর','Mymensingh':'ময়মনসিংহ'};
  try{
    const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,precipitation&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weathercode&timezone=Asia%2FDhaka&forecast_days=7`);
    const d=await res.json();
    const c=d.current;
    const temp=Math.round(c.temperature_2m);
    document.getElementById('wxTemp').textContent=bn(temp)+'°C';
    document.getElementById('wxDesc').textContent='বর্তমান আবহাওয়া';
    document.getElementById('wxLoc').textContent='📍 '+cityBn[city];
    document.getElementById('wxHumidity').textContent=bn(c.relative_humidity_2m)+'%';
    document.getElementById('wxWind').textContent=bn(Math.round(c.wind_speed_10m))+' km/h';
    document.getElementById('wxRain').textContent=bn(c.precipitation||0)+' mm';

    // forecast
    const daily=d.daily;
    document.getElementById('forecastList').innerHTML=daily.date.slice(0,7).map((date,i)=>{
      const dt=new Date(date);
      const max=Math.round(daily.temperature_2m_max[i]);
      const min=Math.round(daily.temperature_2m_min[i]);
      const rain=daily.precipitation_sum[i]||0;
      return `<div class="day-row">
        <span class="day-name">${DAYS[dt.getDay()]}</span>
        <span class="day-icon">${rain>5?'🌧️':rain>0?'🌦️':'☀️'}</span>
        <span class="day-desc">${rain>0?bn(Math.round(rain))+'mm বৃষ্টি':'পরিষ্কার'}</span>
        <span class="day-temp">${bn(max)}°/${bn(min)}°</span>
      </div>`;
    }).join('');

    // farm advice
    const rain=d.daily.precipitation_sum[0]||0;
    const maxT=Math.round(d.daily.temperature_2m_max[0]);
    let advice='';
    if(rain>20) advice='⚠️ আজ ভারী বৃষ্টির সম্ভাবনা। জেলেরা নৌকা না নামানোর পরামর্শ। মাঠে কাজ করবেন না।';
    else if(rain>5) advice='🌦️ হালকা বৃষ্টি হতে পারে। সেচ কাজ বন্ধ রাখুন।';
    else if(maxT>38) advice='☀️ তীব্র গরম। বিকেলে মাঠে কাজ না করাই ভালো। গবাদিপশুকে ছায়া দিন।';
    else advice='✅ আবহাওয়া অনুকূল। মাঠে কাজ করার ভালো সময়।';
    document.getElementById('farmAdvice').textContent=advice;
  }catch(e){
    document.getElementById('wxDesc').textContent='আবহাওয়া তথ্য পাওয়া যাচ্ছে না';
  }
}

function requestWxNotif(){
  if(!('Notification' in window)) return;
  Notification.requestPermission().then(p=>{
    if(p==='granted'){
      navigator.serviceWorker.ready.then(r=>r.showNotification('🌤️ আবহাওয়া Alert চালু!',{body:'প্রতিদিন সকালে আবহাওয়া পাবেন।',icon:'/logoc7c3.png'}));
    }
  });
}

// Auto-detect location
if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(pos=>{
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,precipitation&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weathercode&timezone=Asia%2FDhaka&forecast_days=7`)
      .then(r=>r.json()).then(d=>{
        const c=d.current;
        document.getElementById('wxTemp').textContent=Math.round(c.temperature_2m)+'°C';
        document.getElementById('wxDesc').textContent='আপনার বর্তমান অবস্থান';
        document.getElementById('wxLoc').textContent='📍 আপনার এলাকা';
        document.getElementById('wxHumidity').textContent=c.relative_humidity_2m+'%';
        document.getElementById('wxWind').textContent=Math.round(c.wind_speed_10m)+' km/h';
        document.getElementById('wxRain').textContent=(c.precipitation||0)+' mm';
      });
  },()=>loadWeather('Dhaka'));
} else { loadWeather('Dhaka'); }
</script><script src="/js/rainbow-swirl-cursor.js" defer></script>
</body></html>
